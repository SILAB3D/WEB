<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview · Menú Móvil · SILAB 3D</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary:        #BC556D;
      --primary-dark:   #B7516B;
      --primary-light:  #F2D6DC;
      --primary-xlight: #FBF3F5;
      --dark:           #2F2F2F;
      --darker:         #1A1A1A;
      --white:          #FFFFFF;
      --gray-text:      #9CA3AF;
      --gray-line:      #EDE0E3;
      --nav-h:          68px;
      --drawer-w:       min(310px, 86vw);
      /* Banner height — adjust if needed */
      --banner-h:       148px;
      /* CTA footer height */
      --footer-h:       90px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', sans-serif;
      background: #ede5e7;
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: radial-gradient(circle, rgba(188,85,109,0.07) 1.5px, transparent 1.5px);
      background-size: 26px 26px;
      pointer-events: none; z-index: 0;
    }
    a   { text-decoration: none; color: inherit; }
    img { display: block; max-width: 100%; height: auto; }

    /* ── FAKE NAVBAR ── */
    .navbar {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--nav-h);
      background: rgba(255,255,255,0.94);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(242,214,220,0.7);
      display: flex; align-items: center;
      padding: 0 20px; justify-content: space-between;
      z-index: 200;
      box-shadow: 0 2px 18px rgba(188,85,109,0.09);
    }
    .navbar-brand {
      font-size: 1.2rem; font-weight: 900;
      color: var(--dark); letter-spacing: -0.04em;
    }
    .navbar-brand span { color: var(--primary); }

    /* ── HAMBURGER ── */
    .hamburger {
      width: 42px; height: 42px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 5.5px;
      background: none; border: none; cursor: pointer;
      border-radius: 12px;
      transition: background 0.2s;
      z-index: 500; position: relative;
    }
    .hamburger:hover { background: var(--primary-light); }
    .h-line {
      width: 21px; height: 2px;
      background: var(--dark); border-radius: 2px;
      transition: all 0.36s cubic-bezier(0.77,0,0.175,1);
    }
    .hamburger.open .h-line:nth-child(1) { transform: translateY(7.5px) rotate(45deg); }
    .hamburger.open .h-line:nth-child(2) { opacity: 0; transform: scaleX(0); }
    .hamburger.open .h-line:nth-child(3) { transform: translateY(-7.5px) rotate(-45deg); }

    /* ── OVERLAY ── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(16,6,10,0.45);
      backdrop-filter: blur(4px);
      z-index: 300;
      opacity: 0; pointer-events: none;
      transition: opacity 0.36s ease;
    }
    .overlay.show { opacity: 1; pointer-events: all; }

    /* ── DRAWER ── */
    .drawer {
      position: fixed; top: 0; left: 0;
      width: var(--drawer-w);
      height: 100dvh;
      z-index: 400;
      display: flex; flex-direction: column;
      transform: translateX(-100%);
      transition: transform 0.40s cubic-bezier(0.77,0,0.175,1);
      background: var(--white);
      box-shadow: 6px 0 44px rgba(0,0,0,0.15);
    }
    .drawer.open { transform: translateX(0); }

    /* ── BANNER ── */
    .banner {
      flex-shrink: 0;
      height: var(--banner-h);
      position: relative;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      background: linear-gradient(148deg, var(--darker) 0%, #3a1420 55%, #591f2c 100%);
    }
    .banner::before {
      content: '';
      position: absolute; inset: 0;
      background-image: radial-gradient(circle, rgba(188,85,109,0.2) 1.5px, transparent 1.5px);
      background-size: 18px 18px;
    }
    .banner::after {
      content: '';
      position: absolute; top: -40px; right: -40px;
      width: 130px; height: 130px; border-radius: 50%;
      background: rgba(188,85,109,0.15);
    }
    .banner-logo {
      position: relative; z-index: 2;
      height: 46px; width: auto;
      filter: brightness(0) invert(1);
    }
    .banner-logo-fallback {
      position: relative; z-index: 2;
      font-size: 1.65rem; font-weight: 900;
      color: #fff; letter-spacing: -0.05em;
      display: none;
    }
    .banner-logo-fallback em { font-style: normal; color: var(--primary-light); }
    .banner-wave {
      position: absolute; bottom: -1px; left: 0; right: 0;
      height: 26px; z-index: 3;
    }
    .banner-wave svg { width: 100%; height: 100%; display: block; }

    /* ── NAV BODY
         flex col + justify-content:space-evenly
         so the 4 items spread vertically across
         whatever height remains between banner and footer
    ── */
    .drawer-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-evenly;   /* ← key: distributes items evenly */
      padding: 8px 12px;
      overflow: hidden;                /* no scroll needed with 4 items */
    }

    /* ── NAV ITEM ── */
    .nav-item {
      display: flex; align-items: center;
      border-radius: 14px;
      transition: background 0.2s, transform 0.18s;
      text-decoration: none; position: relative; overflow: hidden;
      cursor: pointer;
    }
    /* Left accent bar */
    .nav-item::before {
      content: '';
      position: absolute; left: 0; top: 20%; bottom: 20%;
      width: 3px;
      background: linear-gradient(to bottom, var(--primary), var(--primary-dark));
      border-radius: 0 3px 3px 0;
      transform: scaleY(0);
      transition: transform 0.24s cubic-bezier(0.4,0,0.2,1);
    }
    .nav-item:hover::before,
    .nav-item.active::before { transform: scaleY(1); }
    .nav-item:hover  { background: var(--primary-xlight); }
    .nav-item.active { background: var(--primary-light); }

    .nav-icon {
      width: 52px; height: 56px;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.25rem;
      transition: transform 0.22s;
    }
    .nav-item:hover .nav-icon { transform: scale(1.1); }

    .nav-label {
      flex: 1;
      font-size: 1rem; font-weight: 700;
      color: var(--dark);
      transition: color 0.2s;
    }
    .nav-item:hover .nav-label,
    .nav-item.active .nav-label { color: var(--primary); }

    .nav-chevron {
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      margin-right: 10px;
      color: #ccc; font-size: 0.95rem;
      transition: color 0.2s, transform 0.22s;
    }
    .nav-item:hover .nav-chevron,
    .nav-item.active .nav-chevron {
      color: var(--primary);
      transform: translateX(2px);
    }

    /* ── FOOTER ── */
    .drawer-footer {
      flex-shrink: 0;
      padding: 14px 12px 32px;
    }
    .drawer-footer::before {
      content: '';
      display: block; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gray-line), transparent);
      margin-bottom: 14px;
    }
    .btn-cta {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 15px;
      border-radius: 16px; border: none;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff; font-family: 'Outfit', sans-serif;
      font-size: 0.95rem; font-weight: 800;
      cursor: pointer; text-decoration: none;
      transition: transform 0.26s, box-shadow 0.26s;
      box-shadow: 0 8px 24px rgba(188,85,109,0.34);
      position: relative; overflow: hidden;
      letter-spacing: 0.01em;
    }
    .btn-cta::after {
      content: '';
      position: absolute; top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
      transition: left 0.5s;
    }
    .btn-cta:hover::after { left: 100%; }
    .btn-cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(188,85,109,0.48);
    }

    /* ── STAGGER ANIMATIONS ── */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(-14px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .drawer.open .banner                        { animation: fadeIn 0.32s 0.06s ease both; }
    .drawer.open .drawer-body .nav-item:nth-child(1) { animation: fadeIn 0.28s 0.14s ease both; }
    .drawer.open .drawer-body .nav-item:nth-child(2) { animation: fadeIn 0.28s 0.20s ease both; }
    .drawer.open .drawer-body .nav-item:nth-child(3) { animation: fadeIn 0.28s 0.26s ease both; }
    .drawer.open .drawer-body .nav-item:nth-child(4) { animation: fadeIn 0.28s 0.32s ease both; }
    .drawer.open .drawer-footer                  { animation: fadeIn 0.28s 0.38s ease both; }

    .drawer:not(.open) .banner,
    .drawer:not(.open) .drawer-body .nav-item,
    .drawer:not(.open) .drawer-footer { animation: none; opacity: 0; }

    /* ── PREVIEW PAGE ── */
    .page {
      position: relative; z-index: 1;
      padding-top: calc(var(--nav-h) + 52px);
      display: flex; flex-direction: column;
      align-items: center; text-align: center;
      gap: 14px; padding-inline: 24px; padding-bottom: 60px;
    }
    .page-pill {
      display: inline-flex; align-items: center; gap: 7px;
      background: var(--primary-light); color: var(--primary-dark);
      padding: 7px 18px; border-radius: 50px;
      font-size: 0.72rem; font-weight: 800;
      letter-spacing: 0.1em; text-transform: uppercase;
    }
    .page-title {
      font-size: clamp(2rem,8vw,3rem); font-weight: 900;
      color: var(--dark); letter-spacing: -0.04em; line-height: 1.1;
    }
    .page-title span { color: var(--primary); }
    .page-hint {
      display: flex; align-items: center; gap: 8px;
      background: var(--white); border: 1.5px solid var(--primary-light);
      border-radius: 14px; padding: 11px 18px;
      font-size: 0.85rem; color: var(--dark); font-weight: 600;
      box-shadow: 0 4px 18px rgba(188,85,109,0.1);
    }
    .arrow { display: inline-block; animation: nudge 1.3s ease-in-out infinite; }
    @keyframes nudge {
      0%,100% { transform: translateX(0); }
      50%      { transform: translateX(-5px); }
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <span class="navbar-brand">SILAB<span>3D</span></span>
    <button class="hamburger" id="ham" aria-label="Abrir menú" aria-expanded="false">
      <span class="h-line"></span>
      <span class="h-line"></span>
      <span class="h-line"></span>
    </button>
  </header>

  <!-- OVERLAY -->
  <div class="overlay" id="overlay"></div>

  <!-- DRAWER -->
  <nav class="drawer" id="drawer" aria-label="Menú de navegación">

    <!-- Banner -->
    <div class="banner">
      <img
        src="../img/SILAB-LOGO-lateral.png"
        alt="SILAB 3D"
        class="banner-logo"
        onerror="this.style.display='none';this.nextElementSibling.style.display='block';"
      >
      <span class="banner-logo-fallback">SILAB<em>3D</em></span>
      <div class="banner-wave">
        <svg viewBox="0 0 310 26" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M0,0 Q78,26 155,14 Q232,2 310,20 L310,26 L0,26 Z" fill="#ffffff"/>
        </svg>
      </div>
    </div>

    <!-- Nav (4 items, evenly spaced) -->
    <div class="drawer-body">

      <a href="../index.html" class="nav-item active">
        <div class="nav-icon">🏠</div>
        <span class="nav-label">Inicio</span>
        <span class="nav-chevron">›</span>
      </a>

      <a href="productos.html" class="nav-item">
        <div class="nav-icon">🛍️</div>
        <span class="nav-label">Productos</span>
        <span class="nav-chevron">›</span>
      </a>

      <a href="materiales.html" class="nav-item">
        <div class="nav-icon">🎨</div>
        <span class="nav-label">Materiales</span>
        <span class="nav-chevron">›</span>
      </a>

      <a href="resenas.html" class="nav-item">
        <div class="nav-icon">⭐</div>
        <span class="nav-label">Reseñas</span>
        <span class="nav-chevron">›</span>
      </a>

      <a href="contacto.html" class="nav-item">
        <div class="nav-icon">💬</div>
        <span class="nav-label">Contacto</span>
        <span class="nav-chevron">›</span>
      </a>

    </div>

    <!-- CTA -->
    <div class="drawer-footer">
      <a href="configura-tu-proyecto.html" class="btn-cta">
        ✦&nbsp; Configura tu proyecto
      </a>
    </div>

  </nav>

  <!-- PREVIEW -->
  <main class="page">
    <div class="page-pill">✦ Vista previa</div>
    <h1 class="page-title">Menú<br><span>Móvil</span></h1>
    <div class="page-hint">
      <span class="arrow">←</span>
      Pulsa el botón ☰ para abrir el menú
    </div>
  </main>

  <script>
    const ham     = document.getElementById('ham');
    const drawer  = document.getElementById('drawer');
    const overlay = document.getElementById('overlay');

    const open = () => {
      drawer.classList.add('open');
      overlay.classList.add('show');
      ham.classList.add('open');
      ham.setAttribute('aria-expanded', 'true');
      document.body.style.overflow = 'hidden';
    };
    const close = () => {
      drawer.classList.remove('open');
      overlay.classList.remove('show');
      ham.classList.remove('open');
      ham.setAttribute('aria-expanded', 'false');
      document.body.style.overflow = '';
    };

    ham.addEventListener('click', () =>
      drawer.classList.contains('open') ? close() : open()
    );
    overlay.addEventListener('click', close);
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') close();
    });
  </script>

</body>
</html>
