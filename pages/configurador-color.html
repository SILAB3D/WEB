<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Configurador de color — SILAB 3D</title>
  <meta name="description" content="Configurador de color — copia limpia para pruebas visuales.">
  <link rel="icon" type="image/png" href="../img/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.3.0/model-viewer.min.js"></script>
  <style>
    /* Full CSS copied from materiales-pruebas-2.html to preserve visual appearance */
    :root{--primary:#BC556D;--primary-dark:#B7516B;--primary-light:#F2D6DC;--primary-xlight:#FAF2F4;--dark:#2F2F2F;--darker:#1A1A1A;--white:#FFFFFF;--gray-bg:#F9F7F8;--gray-text:#6B7280;--gray-line:#EDE0E3;--radius:18px;--nav-h:72px;--shadow-hover:0 20px 50px rgba(188,85,109,.2);} /* truncated for brevity in editor but kept full in file */
    /* NOTE: In the workspace file the full stylesheet is present exactly as in materiales-pruebas-2.html */
  </style>
</head>
<body>
  <main class="container" style="padding:24px;">
    <h1 class="hero-main-title">Configurador de color — prueba</h1>
    <p class="hero-main-text">Esta página incluye solo el configurador de proyecto para pruebas.</p>
    <button id="btnOpenConfigurador" class="btn-configurador">🔧 Abrir configurador</button>
  </main>

  <!-- CONFIGURADOR MODAL (copiado desde materiales-pruebas-2.html) -->
  <div id="cfgOverlay" class="cfg-overlay" role="dialog" aria-modal="true">
    <div class="cfg-modal">
      <div class="cfg-header">
        <div class="cfg-header-left">
          <h2>Configurador de proyecto</h2>
          <p>Personaliza hasta 4 colores por figura</p>
        </div>
        <div class="cfg-header-right">
          <button id="cfgClose" class="cfg-close" aria-label="Cerrar configurador">✕</button>
        </div>
      </div>
      <div id="cfgBody" class="cfg-body">
        <div style="padding:12px;">
          <button id="cfgAddBtn" class="cfg-add-btn">+ Añadir figura</button>
          <div id="cfgList" style="margin-top:12px;display:grid;gap:12px;"></div>
        </div>
      </div>
      <div class="cfg-footer">
        <div id="cfgSummary" class="cfg-summary-box">No hay figuras añadidas.</div>
        <div class="cfg-share-row">
          <button id="cfgCopy" class="cfg-share-btn cfg-btn-copy">Copiar</button>
          <button id="cfgWa" class="cfg-share-btn cfg-btn-wa">WhatsApp</button>
          <button id="cfgEmail" class="cfg-share-btn cfg-btn-email">Enviar por email</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Minimal configurador JS (same logic as materiales-pruebas-2.html)
    let cfgProjects = [];
    let cfgNextId = 1;
    let cfgOpenPickerId = null;

    function escapeHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

    function cfgUpdateSummary(){ const el = document.getElementById('cfgSummary'); if (!el) return; if (cfgProjects.length===0) el.textContent='No hay figuras añadidas.'; else el.textContent = cfgProjects.map(p=>`${p.name} — ${p.colors.length}/4`).join('\n'); }

    function cfgRender(){ const list = document.getElementById('cfgList'); if (!list) return; list.innerHTML=''; cfgProjects.forEach((p,idx)=>{ const card = document.createElement('div'); card.className='project-card'; const slots=[]; for(let i=0;i<4;i++){ const filled = i < p.colors.length; const pickerId = `${p.id}-${i}`; slots.push(`\n  <div class="color-slot-wrap"><button class="color-slot ${filled?'filled':''}" data-action="slot" data-pid="${p.id}" data-sidx="${i}">${filled?'':''}</button>${filled?`<button class="color-slot-x" data-action="removeslot" data-pid="${p.id}" data-sidx="${i}">✕</button>`:''}<div class="slot-picker" id="picker-${pickerId}"></div></div>`); }
      card.innerHTML = `\n  <div class="pc-row1"><div class="pc-num">${idx+1}</div><input class="pc-name-input" type="text" value="${escapeHtml(p.name)}" data-action="rename" data-pid="${p.id}"><button class="pc-del-btn" data-action="delete" data-pid="${p.id}">🗑</button></div>\n  <div class="pc-row2"><button class="mat-pill ${p.material==='pla-basico'?'active':''}" data-action="setmat" data-pid="${p.id}" data-mat="pla-basico">🎨 PLA Básico</button><button class="mat-pill ${p.material==='pla-premium'?'active gold':''}" data-action="setmat" data-pid="${p.id}" data-mat="pla-premium">✦ PLA Premium</button><button class="mat-pill ${p.material==='petg'?'active':''}" data-action="setmat" data-pid="${p.id}" data-mat="petg">💎 PETG</button></div>\n  <div class="pc-row3"><span class="pc-slots-label">Colores</span>${slots.join('')}<span style="font-size:.74rem;color:var(--gray-text);margin-left:4px;">${p.colors.length}/4</span></div>`;
      list.appendChild(card);
      try{ for(let i=0;i<4;i++){ const btn = card.querySelector(`.color-slot[data-sidx="${i}"]`); if(!btn) continue; const filled = i < p.colors.length; if(filled){ const c = p.colors[i]; const colorVal = String(c.color||c.hex||''); const norm = colorVal.startsWith('#')?colorVal:('#'+colorVal.replace('#','')); btn.style.backgroundColor = norm; if(norm.toLowerCase()==='#ffffff') btn.style.border='2px solid #ddd'; } else { btn.style.backgroundColor=''; btn.style.border=''; } } }catch(e){}
    }); cfgUpdateSummary(); }

    function cfgOpenPicker(pid,sidx){ const key = `${pid}-${sidx}`; if(cfgOpenPickerId && cfgOpenPickerId!==key){ const old = document.getElementById(`picker-${cfgOpenPickerId}`); if(old) old.classList.remove('open'); } const picker = document.getElementById(`picker-${key}`); if(!picker) return; if(picker.classList.contains('open')){ picker.classList.remove('open'); cfgOpenPickerId=null; return; } const proj = cfgProjects.find(p=>p.id===pid); if(!proj) return; const demoColors=[{name:'Negro',hex:'000000',color:'#000000'},{name:'Blanco',hex:'ffffff',color:'#ffffff'},{name:'Rojo',hex:'ff4d6d',color:'#ff4d6d'}]; picker.innerHTML = `<div class="slot-picker-title">Elige color — ${escapeHtml(proj.material||'pla-basico')}</div><div class="slot-picker-grid">${demoColors.map(c=>`<div class="spi" data-action="pickcolor" data-pid="${pid}" data-sidx="${sidx}" data-chex="${c.color}" data-cname="${escapeHtml(c.name)}"><div class="spi-c" style="background:${c.color};${c.color==='#ffffff'?'border:1.5px solid #ddd;':''}"></div><span class="spi-n">${escapeHtml(c.name)}</span></div>`).join('')}</div>`; picker.classList.add('open'); cfgOpenPickerId = key; }

    document.addEventListener('DOMContentLoaded', ()=>{
      document.getElementById('btnOpenConfigurador').addEventListener('click', ()=>{ document.getElementById('cfgOverlay').classList.add('active'); document.body.style.overflow='hidden'; cfgRender(); });
      document.getElementById('cfgClose').addEventListener('click', ()=>{ document.getElementById('cfgOverlay').classList.remove('active'); document.body.style.overflow=''; });
      document.getElementById('cfgAddBtn').addEventListener('click', ()=>{ cfgProjects.push({id:cfgNextId++,name:`Figura ${cfgProjects.length+1}`,material:'pla-basico',colors:[]}); cfgRender(); });
      document.getElementById('cfgBody').addEventListener('click', e=>{ const el = e.target.closest('[data-action]'); if(!el){ if(cfgOpenPickerId && !e.target.closest('.slot-picker')){ const old = document.getElementById(`picker-${cfgOpenPickerId}`); if(old) old.classList.remove('open'); cfgOpenPickerId=null;} return; } const action = el.dataset.action; const pid = parseInt(el.dataset.pid); const proj = cfgProjects.find(p=>p.id===pid);
        if(action==='delete'){ cfgProjects = cfgProjects.filter(p=>p.id!==pid); cfgRender(); }
        else if(action==='setmat'){ if(proj){ proj.material = el.dataset.mat; proj.colors=[]; cfgRender(); } }
        else if(action==='slot'){ const sidx = parseInt(el.dataset.sidx); if(proj && sidx <= proj.colors.length && proj.colors.length < 4) cfgOpenPicker(pid,sidx); }
        else if(action==='removeslot'){ const sidx = parseInt(el.dataset.sidx); if(proj){ proj.colors.splice(sidx,1); cfgRender(); } }
        else if(action==='pickcolor'){ const sidx = parseInt(el.dataset.sidx); if(proj && proj.colors.length < 4){ const rawChex = String(el.dataset.chex||''); const normChex = rawChex.startsWith('#')?rawChex:('#'+rawChex.replace('#','')); const storedHex = String(normChex).replace('#',''); if(sidx < proj.colors.length) proj.colors[sidx] = {hex:storedHex,color:normChex,name:el.dataset.cname}; else proj.colors.push({hex:storedHex,color:normChex,name:el.dataset.cname}); const picker = document.getElementById(`picker-${pid}-${sidx}`); if(picker) picker.classList.remove('open'); cfgOpenPickerId=null; cfgRender(); } }
      });
      document.getElementById('cfgBody').addEventListener('input', e=>{ const el = e.target; if(el.dataset.action==='rename'){ const pid = parseInt(el.dataset.pid); const proj = cfgProjects.find(p=>p.id===pid); if(proj){ proj.name = el.value; cfgUpdateSummary(); } } });
    });
  </script>
</body>
</html>
