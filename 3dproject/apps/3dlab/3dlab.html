<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3DLab — SILAB3D</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script type="module" src="../../firebase/dpcloud.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07080F; --glass:rgba(255,255,255,.04); --border:rgba(255,255,255,.08);
  --t1:#E8EBF4; --t2:#7A8099; --t3:#3A3D52; --ac:#8B7CFF; --ac2:#6C5CE7;
}
[data-theme=light]{ --bg:#F5F6FA; --glass:rgba(0,0,0,.03); --border:rgba(0,0,0,.10); --t1:#1A1C24; --t2:#5A6172; --t3:#AEB4C2; }
html,body{height:100%;font-family:'Outfit',system-ui,sans-serif;background:var(--bg);color:var(--t1)}
body{height:100vh;overflow:hidden}
button{font-family:inherit;cursor:pointer}
input,textarea{font-family:inherit}
/* shell */
#dp-shell{position:fixed;top:0;left:0;right:0;height:44px;display:flex;align-items:center;gap:10px;padding:0 14px;z-index:9500;background:rgba(10,11,18,.72);-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);border-bottom:1px solid rgba(255,255,255,.08)}
[data-theme=light] #dp-shell{background:rgba(255,255,255,.80);border-bottom:1px solid rgba(0,0,0,.08)}
#dp-shell .dp-back{display:flex;align-items:center;gap:6px;height:30px;padding:0 13px 0 9px;border-radius:9px;border:1px solid rgba(255,255,255,.14);background:transparent;color:#E8EBF4;font:500 13px 'Outfit',sans-serif;cursor:pointer}
#dp-shell .dp-back:hover{background:rgba(255,255,255,.07)}
[data-theme=light] #dp-shell .dp-back{color:#1A1C24;border-color:rgba(0,0,0,.16)}
#dp-shell .dp-appicon{width:27px;height:27px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:rgba(139,124,255,.16);border:1px solid rgba(139,124,255,.34)}
#dp-shell .dp-title{font-size:13px;font-weight:600;color:#E8EBF4}
[data-theme=light] #dp-shell .dp-title{color:#1A1C24}
#dp-shell .dp-sp{flex:1}
#dp-shell .dp-toggle{width:32px;height:32px;border-radius:9px;border:1px solid rgba(255,255,255,.14);background:transparent;color:#E8EBF4;display:flex;align-items:center;justify-content:center;cursor:pointer}
[data-theme=light] #dp-shell .dp-toggle{color:#1A1C24;border-color:rgba(0,0,0,.16)}
/* top */
.top{position:fixed;top:44px;left:0;right:0;height:54px;z-index:80;display:flex;align-items:center;gap:12px;padding:0 16px;background:var(--glass);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.burger{width:34px;height:34px;border-radius:9px;border:1px solid var(--border);background:transparent;color:var(--t1);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.burger:hover{background:var(--glass)}
.chip{width:30px;height:30px;border-radius:9px;background:rgba(139,124,255,.16);border:1px solid rgba(139,124,255,.34);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tname{font-weight:700;font-size:16px;letter-spacing:-.2px}
.sp{flex:1}
/* layout */
.layout{position:fixed;top:52px;left:0;right:0;bottom:0;display:flex}
.side{width:300px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;background:#0E1018}
.dash-btn{margin:14px 14px 4px;height:38px;width:calc(100% - 28px);padding:0 13px;border:1px solid var(--border);border-radius:11px;background:transparent;color:var(--t1);font:600 13px 'Outfit';display:flex;align-items:center;gap:9px;cursor:pointer}
.dash-btn:hover{background:var(--glass)}
.dash-btn.on{background:rgba(139,124,255,.14);border-color:rgba(139,124,255,.34);color:var(--ac)}
.dash-btn svg{flex-shrink:0}
.side .cta{margin:4px 14px 8px;height:38px;border:none;border-radius:11px;background:linear-gradient(120deg,var(--ac),var(--ac2));color:#fff;font:600 13px 'Outfit';display:flex;align-items:center;justify-content:center;gap:7px}
.side-h{font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--t2);padding:8px 18px 4px}
.tree{flex:1;overflow:auto;padding:4px 8px 18px}
.tree-empty,.tempty{color:var(--t2);font-size:12.5px;padding:10px 14px}
.tempty{padding:5px 14px 5px 40px;font-size:11.5px;color:var(--t3)}
.trow{display:flex;align-items:center;gap:7px;padding:7px 8px;border-radius:9px;cursor:pointer;position:relative;user-select:none}
.trow:hover{background:var(--glass)}
.trow.on{background:rgba(139,124,255,.14)}
.trow.lvl1{padding-left:20px}
.trow.lvl2{padding-left:34px}
.tcaret{width:14px;height:14px;display:flex;align-items:center;justify-content:center;color:var(--t2);transition:transform .15s;flex-shrink:0}
.tcaret.op{transform:rotate(90deg)}
.tcaret-sp{width:14px;flex-shrink:0}
.tic{width:18px;height:18px;display:flex;align-items:center;justify-content:center;color:var(--ac);flex-shrink:0}
.tlabel{flex:1;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tacts{display:none;gap:2px;flex-shrink:0}
.trow:hover .tacts{display:flex}
.tact{width:22px;height:22px;border:none;background:transparent;color:var(--t2);border-radius:6px;font-size:12px;display:flex;align-items:center;justify-content:center}
.tact:hover{background:rgba(255,255,255,.10);color:var(--t1)}
.tact.dl:hover{color:#FF7A7A}
/* main */
.main{flex:1;overflow:auto}
.lab-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;color:var(--t2);padding:40px}
.lab-empty .le-ic{font-size:42px;margin-bottom:10px;color:var(--ac)}
.lab-empty h3{color:var(--t1);font-size:18px;margin-bottom:6px}
.lab-empty p{font-size:13.5px;max-width:360px;line-height:1.6}
.lab-bar{position:sticky;top:0;z-index:5;display:flex;align-items:center;gap:12px;padding:14px 22px;background:var(--bg);border-bottom:1px solid var(--border);flex-wrap:wrap}
.lab-bc{font-size:12px;color:var(--t2);font-weight:600}
.lab-bc span{opacity:.5;margin:0 3px}
.lab-tname{flex:0 1 320px;min-width:160px;background:transparent;border:1px solid transparent;border-radius:9px;color:var(--t1);font:700 18px 'Outfit';padding:6px 10px}
.lab-tname:hover{border-color:var(--border)}
.lab-tname:focus{outline:none;border-color:var(--ac);background:var(--glass)}
.tbtn{height:34px;padding:0 14px;border-radius:9px;border:1px solid var(--border);background:transparent;color:var(--t1);font:600 12.5px 'Outfit';display:flex;align-items:center;gap:6px}
.tbtn:hover{background:var(--glass)}
.tbtn.danger:hover{border-color:#FF7A7A;color:#FF7A7A}
.lab-body{padding:24px;display:flex;flex-direction:column;gap:18px;max-width:1180px}
.lab-cols{display:flex;flex-direction:column;gap:18px}
.lab-card.params{max-width:560px}
.lab-card.cond{min-width:0}
.lab-card{background:var(--glass);border:1px solid var(--border);border-radius:16px;padding:18px 20px}
.lab-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.lab-h h2{font-size:15px;font-weight:700}
.mini{height:32px;padding:0 13px;border-radius:9px;border:1px solid var(--ac);background:rgba(139,124,255,.12);color:var(--ac);font:600 12.5px 'Outfit'}
.mini:hover{background:rgba(139,124,255,.2)}
.lab-none{color:var(--t2);font-size:13px;padding:10px 2px}
table{border-collapse:collapse;width:100%}
.ptable td,.ptable th,.ctable td,.ctable th{border:1px solid var(--border);padding:0;text-align:left}
.ptable th,.ctable th{padding:9px 12px;font-size:11.5px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--t2);background:rgba(255,255,255,.02)}
.ptable td input,.ctable td input{width:100%;background:transparent;border:none;color:var(--t1);font:400 13.5px 'Outfit';padding:9px 12px;outline:none}
.ptable td input:focus,.ctable td input:focus{background:rgba(139,124,255,.08)}
.ptable td:last-child,.ctable td:last-child{width:38px;text-align:center}
.ptable th:last-child,.ctable th:last-child{width:38px}
.del{width:26px;height:26px;border:none;background:transparent;color:var(--t3);border-radius:7px;font-size:13px}
.del:hover{background:rgba(255,122,122,.14);color:#FF7A7A}
.lab-scroll{overflow:auto;border-radius:10px}
.ctable th.vh{color:var(--ac)}
.ctable td.cv input{background:rgba(139,124,255,.16);font-weight:600;color:var(--t1)}
[data-theme=light] .ctable td.cv input{background:rgba(108,92,231,.14)}
.ctable td.cv input:focus{background:rgba(139,124,255,.26)}
.lab-hint{font-size:12px;color:var(--t3);margin-top:12px;line-height:1.5}
.est-block{border:1px solid var(--border);border-radius:12px;padding:12px 12px 14px;margin-bottom:16px;background:rgba(255,255,255,.015)}
.est-block:last-of-type{margin-bottom:6px}
.est-head{display:flex;align-items:center;gap:9px;margin-bottom:10px;flex-wrap:wrap}
.est-ic{display:inline-flex;color:var(--ac);opacity:.9}
.est-name{flex:1;min-width:150px;background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--t1);font:700 15px 'Outfit';padding:4px 2px;outline:none}
.est-name:focus{border-bottom-color:var(--ac)}
.est-acts{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.est-acts .del{width:26px;height:26px;border-radius:7px}
.est-empty{color:var(--t3);font-size:13px;padding:10px 2px}
/* cabeceras de parametros editables */
.lab-hbtns{display:flex;gap:8px}
.ctable th.ph{padding:0;min-width:128px;white-space:nowrap}
.ctable th.ph .phn{width:calc(100% - 22px);background:transparent;border:none;color:var(--t2);font:700 11.5px 'Outfit';text-transform:uppercase;letter-spacing:.4px;padding:9px 2px 9px 12px;outline:none}
.ctable th.ph.vh .phn{color:var(--ac)}
.ctable th.ph .phn:focus{color:var(--t1)}
.thdel{width:18px;height:18px;border:none;background:transparent;color:var(--t3);border-radius:5px;font-size:13px;vertical-align:middle;line-height:1}
.thdel:hover{color:#FF7A7A;background:rgba(255,122,122,.14)}
/* dashboard */
.dash{padding:26px 24px;max-width:1180px}
.dash-head{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;flex-wrap:wrap;margin-bottom:18px}
.dash-head h1{font-size:22px;font-weight:800;letter-spacing:-.3px}
.dash-head p{color:var(--t2);font-size:13.5px;margin-top:4px}
.dash-stats{display:flex;gap:10px}
.dstat{background:var(--glass);border:1px solid var(--border);border-radius:12px;padding:10px 16px;text-align:center;min-width:78px}
.dstat b{display:block;font-size:20px;font-weight:800;color:var(--ac)}
.dstat span{font-size:11px;color:var(--t2)}
.dash-actions{margin-bottom:16px}
.dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:16px;align-items:start}
.dcard{background:var(--glass);border:1px solid var(--border);border-radius:16px;padding:16px 18px}
.dcard-h{display:flex;align-items:center;gap:9px;margin-bottom:8px}
.dic{color:var(--ac);display:flex;align-items:center}
.dic.sm svg{width:14px;height:14px}.dic.xs svg{width:13px;height:13px}
.dctitle{font-weight:700;font-size:15px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dmini{width:24px;height:24px;border:1px solid var(--border);background:transparent;color:var(--t2);border-radius:7px;font-size:15px;line-height:1;flex-shrink:0}
.dmini:hover{color:var(--ac);border-color:var(--ac)}
.dproj{border-top:1px solid var(--border);padding:10px 0 4px;margin-top:6px}
.dproj-h{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.dpname{font-weight:600;font-size:13px;flex:1;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dtests{display:flex;flex-wrap:wrap;gap:6px;padding-left:2px}
.dtest{display:inline-flex;align-items:center;gap:6px;background:rgba(139,124,255,.1);border:1px solid rgba(139,124,255,.22);color:var(--t1);border-radius:8px;padding:6px 10px;font:500 12.5px 'Outfit'}
.dtest:hover{background:rgba(139,124,255,.2)}
.dempty{color:var(--t3);font-size:12px;padding:4px 2px}.dempty.sm{padding-left:6px}
/* resultado (codigo de color) */
.mini.ghost{border-color:var(--border);background:transparent;color:var(--t1)}
.mini.ghost:hover{background:var(--glass);border-color:var(--ac)}
.ctable th.rh{width:98px;text-align:center}
.ctable td.rescell{text-align:center;width:98px;padding:0}
.resdot{width:20px;height:20px;border-radius:50%;border:2px solid var(--t3);background:transparent;cursor:pointer;vertical-align:middle;transition:transform .1s}
.resdot:hover{transform:scale(1.18)}
.resdot.r1{background:#FF6B6B;border-color:#FF6B6B}
.resdot.r2{background:#F4B740;border-color:#F4B740}
.resdot.r3{background:#34D399;border-color:#34D399}
/* presets de parametros */
.preset-pop{margin:-4px 0 16px;border:1px solid var(--border);border-radius:12px;padding:10px;background:rgba(139,124,255,.05)}
.pp-save{width:100%;text-align:left;border:1px dashed var(--ac);background:transparent;color:var(--ac);border-radius:9px;padding:9px 12px;font:600 12.5px 'Outfit'}
.pp-save:hover{background:rgba(139,124,255,.12)}
.pp-list{margin-top:8px;display:flex;flex-direction:column;gap:6px}
.pp-item{display:flex;align-items:center;gap:6px}
.pp-apply{flex:1;text-align:left;border:1px solid var(--border);background:var(--glass);color:var(--t1);border-radius:9px;padding:8px 12px;font:500 13px 'Outfit';display:flex;align-items:center;gap:8px}
.pp-apply:hover{border-color:var(--ac);background:rgba(139,124,255,.1)}
.pp-ic{color:var(--ac);font-weight:700}
.pp-n{color:var(--t2);font-size:11.5px;margin-left:auto}
.pp-del{width:30px;height:34px;border:1px solid var(--border);background:transparent;color:var(--t3);border-radius:9px;font-size:14px;flex-shrink:0}
.pp-del:hover{color:#FF7A7A;border-color:#FF7A7A}
.pp-empty{margin-top:8px;color:var(--t2);font-size:12.5px;padding:4px 2px}
@media(min-width:761px){body.side-off .side{display:none}}
/* descripción del test + comentarios de columnas + reordenar estudios */
.lab-descwrap{margin-bottom:2px}
.lab-descin{width:100%;background:var(--glass);border:1px solid var(--border);border-radius:12px;color:var(--t1);font:400 13.5px 'Outfit',sans-serif;padding:11px 14px;outline:none;resize:none;line-height:1.5;min-height:44px;overflow:hidden}
.lab-descin:focus{border-color:var(--ac)}
.lab-descin::placeholder{color:var(--t3)}
.ctable th.ph{padding:0;min-width:142px;white-space:normal}
.ph-row{display:flex;align-items:center}
.ctable th.ph .ph-row .phn{flex:1;min-width:0;width:auto}
.ph-cm{font-weight:400;text-transform:none;letter-spacing:0;color:var(--t3);font-size:10.5px;padding:0 10px 7px 12px;white-space:normal;line-height:1.3}
.thcm{width:20px;height:22px;border:none;background:transparent;color:var(--t3);border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.thcm:hover{background:rgba(255,255,255,.08);color:var(--t1)}
.thcm.has{color:var(--ac)}
.ctable td.actcell{width:84px;padding:0}
.ctable thead th:last-child{width:84px}
.rowacts{display:flex;align-items:center;justify-content:center;gap:1px}
.rmv{width:22px;height:26px;border:none;background:transparent;color:var(--t3);border-radius:6px;font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.rmv:hover{background:rgba(139,124,255,.16);color:var(--ac)}
.ctable td.studycell{vertical-align:top;background:rgba(139,124,255,.06);border-right:1px solid var(--border);min-width:160px;padding:0}
[data-theme=light] .ctable td.studycell{background:rgba(108,92,231,.05)}
.stwrap{display:flex;flex-direction:column;gap:6px;padding:7px 10px}
.stname{background:transparent;border:1px solid transparent;border-radius:8px;color:var(--t1);font:700 13.5px 'Outfit';padding:6px 8px;width:100%;outline:none}
.stname:hover{border-color:var(--border)}
.stname:focus{border-color:var(--ac);background:var(--glass)}
.stacts{display:flex;gap:2px}
.addprint{align-self:flex-start;border:1px dashed var(--ac);background:rgba(139,124,255,.10);color:var(--ac);border-radius:8px;padding:5px 10px;font:600 11.5px 'Outfit';cursor:pointer}
.addprint:hover{background:rgba(139,124,255,.2)}
.ctable th.cmh{min-width:150px}
.ctable td.cmcell input{font-style:italic;color:var(--t2)}
.ctable td.cmcell input:focus{font-style:normal;color:var(--t1)}
.ctable td.actcell{width:40px;text-align:center;padding:0}
.ctable thead th:last-child{width:40px}
@media(max-width:760px){
  .layout{top:52px}
  .side{position:fixed;top:52px;bottom:0;left:0;z-index:60;width:82vw;max-width:300px;transform:translateX(0);transition:transform .25s ease;box-shadow:8px 0 30px rgba(0,0,0,.4)}
  body.side-off .side{transform:translateX(-101%)}
  .lab-body{padding:16px 12px}
  /* barra del test: no fija, titulo a linea completa, botones repartidos sin recortes */
  .lab-bar{position:static;padding:10px 12px;gap:8px}
  .lab-bar .lab-bc{width:100%;order:-1}
  .lab-bar .lab-tname{flex:1 1 100%;font-size:16px;min-width:0}
  .lab-bar .sp{display:none}
  .lab-bar .tbtn{flex:1 1 0;justify-content:center;padding:0 8px;font-size:12px;min-width:0}
  /* cabeceras de tarjeta: los botones pueden envolver bajo el titulo */
  .lab-card{padding:14px 12px}
  .lab-card.params{max-width:100%}
  .lab-h{flex-wrap:wrap;gap:8px}
  .lab-hbtns{flex-wrap:wrap;width:100%}
  /* bloque de estudio: nombre a linea completa, acciones debajo */
  .est-head{gap:8px}
  .est-name{flex:1 1 100%;min-width:0}
  .est-acts{width:100%}
  /* tablas: columnas mas estrechas + scroll horizontal contenido */
  .lab-scroll{-webkit-overflow-scrolling:touch}
  .ctable th.ph{min-width:104px}
  .ctable td.studycell{min-width:130px}
  .ctable th.cmh{min-width:118px}
}
/* desplegables (select/option) legibles en movil */
select{color:var(--t1)}
option{background-color:#161922;color:#E8EBF4}
[data-theme=light] option{background-color:#ffffff;color:#1A1C24}
[data-theme=light] .side{background:#FFFFFF}
/* === banner unificado === */
.appbar{position:fixed;top:0;left:0;right:0;height:52px;z-index:9500;display:flex;align-items:center;gap:9px;padding:0 14px;background:rgba(10,11,18,.82);-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);border-bottom:1px solid rgba(255,255,255,.08)}
[data-theme=light] .appbar{background:rgba(255,255,255,.86);border-bottom:1px solid rgba(0,0,0,.08)}
.appbar .chip{flex-shrink:0}
.ab-name{font-weight:700;font-size:15px;letter-spacing:-.2px}
.ab-back{display:flex;align-items:center;gap:6px;height:32px;padding:0 12px 0 9px;border-radius:9px;border:1px solid var(--border);background:transparent;color:var(--t1);font:500 12.5px 'Outfit',sans-serif;flex-shrink:0}
.ab-back:hover{background:var(--glass)}
.ab-sp{flex:1}
.ab-theme{width:34px;height:34px;border-radius:9px;border:1px solid var(--border);background:transparent;color:var(--t1);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ab-theme:hover{background:var(--glass)}
@media(max-width:640px){ .ab-bktx{display:none} .ab-back{padding:0 9px} .ab-name{display:none} .ablbl{display:none} }
/* === matriz de purga (3DLab) === */
.pg-intro{font-size:13px;color:var(--t2);line-height:1.5;margin-bottom:2px}
.pg-chips{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.pg-chip{display:inline-flex;align-items:center;gap:7px;background:var(--glass);border:1px solid var(--border);border-radius:20px;padding:5px 5px 5px 11px;font-size:13px;color:var(--t1)}
.pg-dot{width:13px;height:13px;border-radius:50%;border:1px solid rgba(255,255,255,.25);display:inline-block;flex-shrink:0}
.pg-x{width:20px;height:20px;border:none;background:transparent;color:var(--t3);border-radius:50%;cursor:pointer;font-size:14px;line-height:1}
.pg-x:hover{background:rgba(255,122,122,.16);color:#FF7A7A}
.pg-add{display:inline-flex;gap:6px;align-items:center}
.pg-newc{background:var(--glass);border:1px solid var(--border);border-radius:9px;color:var(--t1);font:400 13px 'Outfit',sans-serif;padding:7px 11px;width:160px;outline:none}
.pg-newc:focus{border-color:var(--ac)}
.pg-table{border-collapse:collapse;width:auto}
.pg-table th,.pg-table td{border:1px solid var(--border)}
.pg-table th{font-size:11.5px;font-weight:600;color:var(--t2);padding:8px 11px;white-space:nowrap;background:rgba(255,255,255,.02)}
.pg-table th .pg-dot{margin-right:6px;vertical-align:middle}
.pg-corner{color:var(--t3)!important;font-weight:500!important;font-style:italic}
.pg-table td{width:74px;padding:0}
.pg-table td input{width:100%;background:transparent;border:none;color:var(--t1);font:500 13px 'Outfit',sans-serif;padding:9px 6px;text-align:center;outline:none}
.pg-table td input:focus{background:rgba(139,124,255,.10)}
.pg-diag{background:rgba(255,255,255,.03);text-align:center;color:var(--t3)}

.cond-modal{position:fixed;top:52px;left:0;right:0;bottom:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;animation:condIn .18s ease both}
@keyframes condIn{from{opacity:0;transform:scale(.985)}to{opacity:1;transform:scale(1)}}
.cond-modal-body .ctable{animation:condFade .22s ease both}
@keyframes condFade{from{opacity:0}to{opacity:1}}
.cond-modal-bar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
.cond-modal-bar h3{font-size:15.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.cm-acts{display:flex;gap:8px;align-items:center;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
.cond-collapse{background:rgba(139,124,255,.14);border-color:rgba(139,124,255,.34);color:var(--ac)}
.cond-collapse:hover{background:rgba(139,124,255,.22)}
.cond-modal-body{flex:1;overflow:auto;padding:18px 20px 40px}
.cm-scroll{overflow:visible}
.cond-modal-body .ctable td input,.cond-modal-body .ctable .cmcell input{font-size:14px}
.ctable td input{padding:5px 10px;font-size:13px}
.ctable .resdot{width:17px;height:17px;border-width:2px}
.ctable td.cmcell input{padding:5px 10px}
.lab-hbtns .mini.ghost{transition:background .15s,border-color .15s,color .15s}
.cond-collapse{transition:background .15s,border-color .15s}
</style>
<style>.dash-head h1{font-family:'DM Serif Display',serif;font-style:italic;font-weight:400}</style>
</head>
<body>
<div class="appbar">
  <button class="burger" onclick="document.body.classList.toggle('side-off')" title="Mostrar u ocultar el menú"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg></button>
  <span class="chip"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#8B7CFF" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3h6M10 3v6.5L5.2 18a2 2 0 0 0 1.8 3h10a2 2 0 0 0 1.8-3L14 9.5V3"/><path d="M8.5 14h7"/></svg></span>
  <span class="ab-name">3DLab</span>
  <button class="ab-back" onclick="dpHome()" title="Volver a 3DProject"><svg width="12" height="12" viewBox="0 0 13 13" fill="none"><path d="M8 2.5L3.5 6.5L8 10.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg> <span class="ab-bktx">3DProject</span></button>
  <span class="ab-sp"></span>
  <button class="ab-theme" onclick="window.DPHelp&&DPHelp.open()" title="Cómo usar esta app" aria-label="Ayuda" style="width:34px;height:34px;padding:0;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9.3"/><path d="M9.3 9.2a2.8 2.8 0 0 1 5.4 1c0 1.9-2.7 2.2-2.7 4"/><circle cx="12" cy="17.3" r=".6" fill="currentColor"/></svg></button>
  <button class="ab-theme" id="dpThemeBtn" onclick="dpToggleTheme()" title="Cambiar tema" aria-label="Tema"></button>
</div>
<div class="layout">
  <aside class="side" id="side">
    <button class="dash-btn" id="dashBtn" onclick="goDashboard()"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8M5 10v9a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-9"/></svg> Panel</button>
    <button class="dash-btn" id="purgeBtn" onclick="openPurge()"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg> Matriz de purga</button>
    <button class="cta" onclick="addMod()"><svg width="13" height="13" viewBox="0 0 12 12" fill="none"><path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/></svg> Nueva modalidad</button>
    <div class="side-h">Modalidades</div>
    <div class="tree" id="tree"></div>
  </aside>
  <main class="main" id="main"></main>
</div>
<script>
/* ===== tema / shell ===== */
function ic(t){return t==='dark'
  ?'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4.3"/><path d="M12 2.5v2M12 19.5v2M2.5 12h2M19.5 12h2M5 5l1.4 1.4M17.6 17.6L19 19M19 5l-1.4 1.4M6.4 17.6L5 19"/></svg>'
  :'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>';}
function applyTheme(t){t=(t==='light')?'light':'dark';document.documentElement.setAttribute('data-theme',t);try{localStorage.setItem('dp3-theme',t);}catch(e){}var b=document.getElementById('dpThemeBtn');if(b)b.innerHTML=ic(t);if(window.self!==window.top){try{window.parent.postMessage({__dp3:true,type:'theme',theme:t},'*');}catch(e){}}}
window.dpToggleTheme=function(){applyTheme((document.documentElement.getAttribute('data-theme')||'dark')==='dark'?'light':'dark');};
window.dpHome=function(){if(window.self!==window.top){try{window.parent.postMessage({__dp3:true,type:'home'},'*');}catch(e){}}else{window.location.href='../../index.html';}};
window.addEventListener('message',function(e){var d=e.data;if(d&&d.__dp3&&d.type==='theme'&&d.theme){applyTheme(d.theme);}});
(function(){var p=null;try{p=new URLSearchParams(location.search).get('dptheme');}catch(e){}var s=null;try{s=localStorage.getItem('dp3-theme');}catch(e){}applyTheme(p||s||'dark');})();

/* ===== iconos ===== */
var icMod='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>';
var icFolder='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>';
var icFile='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5M9 13h6M9 17h4"/></svg>';
var icFlask='<svg width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3h6M10 3v6.5L5.2 18a2 2 0 0 0 1.8 3h10a2 2 0 0 0 1.8-3L14 9.5V3"/><path d="M8.5 14h7"/></svg>';
function caret(op){return '<span class="tcaret'+(op?' op':'')+'"><svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M4 2.5L8 6L4 9.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg></span>';}

/* ===== estado ===== */
var S={mods:[],sel:{m:null,p:null,t:null}};
var expanded={};
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escAttr(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function norm(){ if(!Array.isArray(S.mods))S.mods=[]; if(!S.sel||typeof S.sel!=='object')S.sel={m:null,p:null,t:null};
  if(!Array.isArray(S.paramPresets))S.paramPresets=[];
  if(!S.purge||typeof S.purge!=='object')S.purge={colors:[],grid:{}}; if(!Array.isArray(S.purge.colors))S.purge.colors=[]; if(!S.purge.grid||typeof S.purge.grid!=='object')S.purge.grid={}; if(S.sel&&typeof S.sel.purge!=='boolean')S.sel.purge=false;
  S.mods.forEach(function(m){ if(!Array.isArray(m.projs))m.projs=[]; m.projs.forEach(function(p){ if(!Array.isArray(p.tests))p.tests=[]; p.tests.forEach(function(t){ normTest(t); }); }); });
}
function normTest(t){
  if(!Array.isArray(t.params))t.params=[];
  if(typeof t.desc!=='string')t.desc=(t.desc==null?'':String(t.desc));
  if(!Array.isArray(t.estudios)){ var mc=Array.isArray(t.cols)?t.cols:[]; var mi=Array.isArray(t.studies)?t.studies:[]; t.estudios=(mc.length||mi.length)?[{id:uid(),name:'Estudio 1',cols:mc,imps:mi}]:[]; }
  delete t.cols; delete t.studies;
  t.estudios.forEach(function(est){
    if(!est.id)est.id=uid();
    if(typeof est.name!=='string')est.name=(est.name==null?'Estudio':String(est.name));
    if(!Array.isArray(est.cols))est.cols=[];
    if(!Array.isArray(est.imps))est.imps=(Array.isArray(est.studies)?est.studies:[]);
    delete est.studies;
    est.imps.forEach(function(imp){
      if(!imp.id)imp.id=uid();
      if(typeof imp.name!=='string')imp.name=(imp.name==null?'Impresión':String(imp.name));
      if(!Array.isArray(imp.prints)){ if(!imp.vals||typeof imp.vals!=='object')imp.vals={}; imp.prints=[{id:uid(),ident:(imp.ident||''),result:(typeof imp.result==='number'?imp.result:0),vals:imp.vals,comment:(imp.comment||'')}]; delete imp.ident; delete imp.vals; delete imp.result; }
      imp.prints.forEach(function(pr){ if(!pr.id)pr.id=uid(); if(typeof pr.ident!=='string')pr.ident=(pr.ident==null?'':String(pr.ident)); if(!pr.vals||typeof pr.vals!=='object')pr.vals={}; if(typeof pr.result!=='number')pr.result=0; if(typeof pr.comment!=='string')pr.comment=(pr.comment==null?'':String(pr.comment)); });
    });
  });
}

/* ===== finders ===== */
function findMod(id){return S.mods.filter(function(m){return m.id===id;})[0];}
function findProj(m,id){return m?m.projs.filter(function(p){return p.id===id;})[0]:null;}
function findTest(p,id){return p?p.tests.filter(function(t){return t.id===id;})[0]:null;}
function curMod(){return findMod(S.sel.m);}
function curProj(){return findProj(curMod(),S.sel.p);}
function curTest(){return findTest(curProj(),S.sel.t);}

/* ===== expandir ===== */
function toggle(id){expanded[id]=!expanded[id];renderTree();}
function toggleP(mId,pId){expanded[pId]=!expanded[pId];renderTree();}

/* ===== CRUD árbol ===== */
function addMod(){ if(!loaded)return; var n=prompt('Nombre de la modalidad:'); if(n==null)return; n=n.trim(); if(!n)return; var m={id:uid(),name:n,projs:[]}; S.mods.push(m); expanded[m.id]=true; if(S.sel)S.sel.purge=false; save(); renderTree(); renderMain(); }
function renMod(id){ var m=findMod(id); if(!m)return; var n=prompt('Renombrar modalidad:',m.name); if(n==null)return; m.name=n.trim()||m.name; save(); renderTree(); renderMain(); }
function delMod(id){ var m=findMod(id); if(!m)return; if(!confirm('¿Eliminar la modalidad "'+m.name+'" con todos sus proyectos y tests?'))return; S.mods=S.mods.filter(function(x){return x.id!==id;}); if(S.sel.m===id)S.sel={m:null,p:null,t:null}; save(); renderTree(); renderMain(); }
function addProj(mId){ var m=findMod(mId); if(!m)return; var n=prompt('Nombre del proyecto:'); if(n==null)return; n=n.trim(); if(!n)return; var p={id:uid(),name:n,tests:[]}; m.projs.push(p); expanded[mId]=true; expanded[p.id]=true; save(); renderTree(); renderMain(); }
function renProj(mId,pId){ var p=findProj(findMod(mId),pId); if(!p)return; var n=prompt('Renombrar proyecto:',p.name); if(n==null)return; p.name=n.trim()||p.name; save(); renderTree(); renderMain(); }
function delProj(mId,pId){ var m=findMod(mId); var p=findProj(m,pId); if(!p)return; if(!confirm('¿Eliminar el proyecto "'+p.name+'" y sus tests?'))return; m.projs=m.projs.filter(function(x){return x.id!==pId;}); if(S.sel.p===pId){S.sel.p=null;S.sel.t=null;} save(); renderTree(); renderMain(); }
function addTest(mId,pId){ var p=findProj(findMod(mId),pId); if(!p)return; var n=prompt('Nombre del test:'); if(n==null)return; n=n.trim(); if(!n)return; var t={id:uid(),name:n,desc:'',params:[],estudios:[]}; p.tests.push(t); expanded[mId]=true; expanded[pId]=true; S.sel={m:mId,p:pId,t:t.id}; save(); renderTree(); renderMain(); }
function renTest(mId,pId,tId){ var t=findTest(findProj(findMod(mId),pId),tId); if(!t)return; var n=prompt('Renombrar test:',t.name); if(n==null)return; t.name=n.trim()||t.name; save(); renderTree(); if(S.sel.t===tId)renderMain(); }
function delTest(mId,pId,tId){ var p=findProj(findMod(mId),pId); var t=findTest(p,tId); if(!t)return; if(!confirm('¿Eliminar el test "'+t.name+'"?'))return; p.tests=p.tests.filter(function(x){return x.id!==tId;}); if(S.sel.t===tId)S.sel.t=null; save(); renderTree(); renderMain(); }
function selectTest(mId,pId,tId){ S.sel={m:mId,p:pId,t:tId}; renderTree(); renderMain(); if(window.innerWidth<=760)document.body.classList.add('side-off'); }
function renTestInline(v){ var t=curTest(); if(!t)return; t.name=(v||'').trim()||t.name; save(); renderTree(); }

/* ===== parámetros ===== */
var RES=['Sin evaluar','Inaceptable','Mejorable','Perfecto'];
function findEst(t,eid){ return t?(t.estudios||[]).filter(function(x){return x.id===eid;})[0]:null; }
function findImp(est,iid){ return est?(est.imps||[]).filter(function(x){return x.id===iid;})[0]:null; }
function findPrint(imp,pid){ return imp?(imp.prints||[]).filter(function(x){return x.id===pid;})[0]:null; }
function getPrint(eid,iid,pid){ return findPrint(findImp(findEst(curTest(),eid),iid),pid); }
function cyclePrintResult(eid,iid,pid){ var pr=getPrint(eid,iid,pid); if(!pr)return; pr.result=((pr.result||0)+1)%4; save(); renderMain(); }
/* presets de parametros definidos */
var presetOpen=false;
function togglePresets(){ presetOpen=!presetOpen; renderMain(); }
function presetPanel(){ if(!presetOpen)return ''; var pr=S.paramPresets||[]; var x='<div class="preset-pop"><button class="pp-save" onclick="savePreset()">+ Guardar parámetros actuales como preset</button>'; if(pr.length){ x+='<div class="pp-list">'; pr.forEach(function(pp){ x+='<div class="pp-item"><button class="pp-apply" onclick="applyPreset(\''+pp.id+'\')" title="Aplicar este preset al test"><span class="pp-ic">&#9656;</span>'+esc(pp.name)+'<span class="pp-n">'+pp.params.length+' parám.</span></button><button class="pp-del" title="Eliminar preset" onclick="delPreset(\''+pp.id+'\')">&times;</button></div>'; }); x+='</div>'; } else { x+='<div class="pp-empty">No hay presets guardados todavía.</div>'; } x+='</div>'; return x; }
function savePreset(){ var t=curTest(); if(!t)return; if(!t.params.length){ alert('Este test no tiene parámetros que guardar.'); return; } var n=prompt('Nombre del preset de parámetros:'); if(n==null)return; n=n.trim(); if(!n)return; if(!Array.isArray(S.paramPresets))S.paramPresets=[]; S.paramPresets.push({id:uid(),name:n,params:t.params.map(function(pp){return {name:pp.name,val:pp.val};})}); presetOpen=true; save(); renderMain(); }
function applyPreset(id){ var t=curTest(); if(!t)return; var pr=(S.paramPresets||[]).filter(function(x){return x.id===id;})[0]; if(!pr)return; if(t.params.length && !confirm('Se reemplazarán los parámetros definidos del test por el preset "'+pr.name+'". ¿Continuar?'))return; t.params=pr.params.map(function(pp){return {id:uid(),name:pp.name,val:pp.val};}); presetOpen=false; save(); renderMain(); }
function delPreset(id){ if(!Array.isArray(S.paramPresets))return; var pr=S.paramPresets.filter(function(x){return x.id===id;})[0]; if(!pr)return; if(!confirm('¿Eliminar el preset "'+pr.name+'"?'))return; S.paramPresets=S.paramPresets.filter(function(x){return x.id!==id;}); save(); renderMain(); }
function addParam(){ var t=curTest(); if(!t)return; t.params.push({id:uid(),name:'Parámetro '+(t.params.length+1),val:''}); save(); renderMain(); }
function setParamName(id,v){ var t=curTest(); if(!t)return; var p=t.params.filter(function(x){return x.id===id;})[0]; if(p){p.name=v;save();} }
function setParamVal(id,v){ var t=curTest(); if(!t)return; var p=t.params.filter(function(x){return x.id===id;})[0]; if(p){p.val=v;save();} }
function delParam(id){ var t=curTest(); if(!t)return; t.params=t.params.filter(function(x){return x.id!==id;}); save(); renderMain(); }
function addCol(eid){ var est=findEst(curTest(),eid); if(!est)return; if(!Array.isArray(est.cols))est.cols=[]; var c={id:uid(),name:'Parámetro '+(est.cols.length+1)}; est.cols.push(c); (est.imps||[]).forEach(function(imp){ (imp.prints||[]).forEach(function(pr){ if(pr.vals[c.id]==null)pr.vals[c.id]=''; }); }); save(); renderMain(); }
function setColName(eid,cid,v){ var est=findEst(curTest(),eid); if(!est)return; var c=(est.cols||[]).filter(function(x){return x.id===cid;})[0]; if(c){c.name=v;save();} }
function delCol(eid,cid){ var est=findEst(curTest(),eid); if(!est)return; est.cols=(est.cols||[]).filter(function(x){return x.id!==cid;}); (est.imps||[]).forEach(function(imp){ (imp.prints||[]).forEach(function(pr){ delete pr.vals[cid]; }); }); save(); renderMain(); }
function setTestDesc(v){ var t=curTest(); if(!t)return; t.desc=v; save(); }
function growLD(el){ try{ el.style.height='auto'; el.style.height=(el.scrollHeight)+'px'; }catch(e){} }
function moveEstudio(eid,dir){ var t=curTest(); if(!t)return; var a=t.estudios; var i=a.findIndex(function(x){return x.id===eid;}); if(i<0)return; var j=i+dir; if(j<0||j>=a.length)return; var tmp=a[i]; a[i]=a[j]; a[j]=tmp; save(); renderMain(); }
function moveImp(eid,iid,dir){ var est=findEst(curTest(),eid); if(!est)return; var a=est.imps; var i=a.findIndex(function(x){return x.id===iid;}); if(i<0)return; var j=i+dir; if(j<0||j>=a.length)return; var tmp=a[i]; a[i]=a[j]; a[j]=tmp; save(); renderMain(); }

/* ===== estudios / impresiones / identificadores ===== */
function newPrint(est){ var pr={id:uid(),ident:'',result:0,vals:{},comment:''}; ((est&&est.cols)||[]).forEach(function(c){ pr.vals[c.id]=''; }); return pr; }
function addEstudio(){ var t=curTest(); if(!t)return; if(!Array.isArray(t.estudios))t.estudios=[]; var est={id:uid(),name:'Estudio '+(t.estudios.length+1),cols:[],imps:[]}; est.imps.push({id:uid(),name:'Impresión 1',prints:[newPrint(est)]}); t.estudios.push(est); save(); renderMain(); }
function delEstudio(eid){ var t=curTest(); if(!t)return; var est=findEst(t,eid); if(!est)return; if(!confirm('¿Eliminar el estudio "'+(est.name||'')+'" con todas sus impresiones?'))return; t.estudios=t.estudios.filter(function(x){return x.id!==eid;}); save(); renderMain(); }
function setEstName(eid,v){ var est=findEst(curTest(),eid); if(est){est.name=v;save();} }
function addImp(eid){ var est=findEst(curTest(),eid); if(!est)return; if(!Array.isArray(est.imps))est.imps=[]; est.imps.push({id:uid(),name:'Impresión '+(est.imps.length+1),prints:[newPrint(est)]}); save(); renderMain(); }
function delImp(eid,iid){ var est=findEst(curTest(),eid); if(!est)return; est.imps=(est.imps||[]).filter(function(x){return x.id!==iid;}); save(); renderMain(); }
function setImpName(eid,iid,v){ var imp=findImp(findEst(curTest(),eid),iid); if(imp){imp.name=v;save();} }

function varyMap(est){
  var map={};
  (est.imps||[]).forEach(function(imp){ map[imp.id]={}; var prints=imp.prints||[];
    (est.cols||[]).forEach(function(p){ var d={}; prints.forEach(function(pr){ d[(pr.vals[p.id]!=null?String(pr.vals[p.id]):'')]=1; }); map[imp.id][p.id]=(prints.length>1 && Object.keys(d).length>1); });
  });
  return map;
}

function applyCellRaw(eid,r,c,val){ var g=condGrids[eid]; if(!g)return; var row=g.rows[r], col=g.cols[c]; if(!row||!col)return; var est=findEst(curTest(),eid); if(!est)return; var imp=findImp(est,row.iid); if(!imp)return; var pr=findPrint(imp,row.pid); if(!pr)return; if(col.field==='ident')pr.ident=val; else if(col.field==='comment')pr.comment=val; else if(col.field==='param'){ if(!pr.vals||typeof pr.vals!=='object')pr.vals={}; pr.vals[col.cid]=val; } }
function condPaste(ev,eid,r,c){ var cd=ev.clipboardData||window.clipboardData; if(!cd)return; var txt=cd.getData('text'); if(txt==null)txt=''; ev.preventDefault(); var rows=txt.replace(/\r/g,'').split('\n'); if(rows.length>1 && rows[rows.length-1]==='')rows.pop(); for(var i=0;i<rows.length;i++){ var cells=rows[i].split('\t'); for(var j=0;j<cells.length;j++){ applyCellRaw(eid,r+i,c+j,cells[j]); } } save(); renderMain(); }
function condKey(ev){
  if((ev.ctrlKey||ev.metaKey) && (ev.key==='c'||ev.key==='C'||ev.key==='x'||ev.key==='X')){ var el0=ev.target; if(el0&&el0.selectionStart===el0.selectionEnd){ try{ el0.select(); }catch(e){} } return; }
  if(ev.key==='Enter'){ ev.preventDefault(); condMove(ev.target, ev.shiftKey?-1:1, 0); return; }
  if(ev.key==='Tab'){ ev.preventDefault(); condMove(ev.target, 0, ev.shiftKey?-1:1); return; }
}
function condMove(el, dr, dc){
  if(!el||!el.getAttribute||!el.closest)return;
  var table=el.closest('table'); if(!table)return;
  var r=parseInt(el.getAttribute('data-r'),10), c=parseInt(el.getAttribute('data-c'),10);
  if(isNaN(r)||isNaN(c))return;
  var t=table.querySelector('input[data-r="'+(r+dr)+'"][data-c="'+(c+dc)+'"]');
  if(!t && dc>0) t=table.querySelector('input[data-r="'+(r+1)+'"][data-c="0"]');
  if(!t && dc<0){ var prev=[].slice.call(table.querySelectorAll('input[data-r="'+(r-1)+'"]')); if(prev.length) t=prev.reduce(function(a,b){ return parseInt(b.getAttribute('data-c'),10)>parseInt(a.getAttribute('data-c'),10)?b:a; }); }
  if(t){ t.focus(); try{ t.select(); }catch(e){} }
}
function refreshCondHighlights(){
  var _t=curTest(); if(!_t)return;
  [].forEach.call(document.querySelectorAll('table.ctable[data-eid]'), function(table){
    var eid=table.getAttribute('data-eid'); var est=findEst(_t,eid); if(!est)return;
    var map=varyMap(est); var g=condGrids[eid]; if(!g)return;
    [].forEach.call(table.querySelectorAll('tbody input[data-r][data-c]'), function(inp){
      var R=parseInt(inp.getAttribute('data-r'),10), C=parseInt(inp.getAttribute('data-c'),10);
      var col=g.cols[C], row=g.rows[R]; if(!col||col.field!=='param'||!row)return;
      var hl=map[row.iid]&&map[row.iid][col.cid]; var td=inp.parentNode; if(td) td.classList.toggle('cv', !!hl);
    });
    var phs=table.querySelectorAll('thead th.ph');
    (est.cols||[]).forEach(function(pa,i){ if(phs[i]) phs[i].classList.toggle('vh', paramVariesAny(est,map,pa.id)); });
  });
}

      h+='<div class="est-block"><div class="est-head"><span class="est-ic">'+icFile+'</span><input class="est-name" value="'+escAttr(est.name)+'" onchange="setEstName(\''+est.id+'\',this.value)" placeholder="Estudio"><div class="est-acts">'
        +'<button class="rmv" title="Subir estudio" onclick="moveEstudio(\''+est.id+'\',-1)">▲</button>'
        +'<button class="rmv" title="Bajar estudio" onclick="moveEstudio(\''+est.id+'\',1)">▼</button>'
        +'<button class="mini ghost" onclick="toggleCondExpand(\''+est.id+'\')" title="Ver la tabla en grande">⤢ Expandir</button>'
        +'<button class="mini" onclick="addCol(\''+est.id+'\')">+ Parámetro</button>'
        +'<button class="mini" onclick="addImp(\''+est.id+'\')">+ Impresión</button>'
        +'<button class="del" title="Eliminar estudio" onclick="delEstudio(\''+est.id+'\')">&times;</button>'
        +'</div></div><div class="lab-scroll">'+condTableHTML(est,emap)+'</div></div>';
    });
  } else { h+='<div class="est-empty">Sin estudios. Cada estudio es una tabla independiente con sus propios parámetros. Añade el primero con <b>+ Estudio</b>.</div>'; }
  h+='<p class="lab-hint">Cada <b>estudio</b> es una tabla independiente con sus propios <b>parámetros</b> (columnas). Dentro, cada <b>impresión</b> agrupa varios <b>identificadores</b> en subfilas. <b>+ Estudio</b> crea una tabla nueva; <b>+ Impresión</b> añade un grupo; <b>+ Identificador</b> añade filas. Se resaltan los parámetros que <b>varían entre identificadores de la misma impresión</b>.</p>';
  h+='</section></div></div>';
  if(condExpanded){ var _est=findEst(t,condExpanded); if(_est){ h+=condModalHTML(_est,varyMap(_est)); } }
  main.innerHTML=h;
  var _d=document.querySelector('.lab-descin'); if(_d)growLD(_d);
}

/* ===== exportación ===== */
function csvCell(v){ v=(v==null?'':String(v)); if(/[",\n\r;]/.test(v))v='"'+v.replace(/"/g,'""')+'"'; return v; }
function download(name,content,mime){ try{ var b=new Blob(['﻿'+content],{type:mime+';charset=utf-8'}); var a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download=name; document.body.appendChild(a); a.click(); setTimeout(function(){URL.revokeObjectURL(a.href);a.remove();},800); }catch(e){alert('No se pudo descargar: '+e);} }
function safeName(n){ return (String(n||'test').replace(/[\\/:*?"<>|]+/g,'_').trim())||'test'; }
function exportCSV(){
  var t=curTest(); if(!t)return; var m=curMod(),p=curProj();
  var rows=[];
  rows.push(['Modalidad',m?m.name:'']); rows.push(['Proyecto',p?p.name:'']); rows.push(['Test',t.name]); rows.push(['Descripción',t.desc||'']); rows.push([]);
  rows.push(['PARÁMETROS DEFINIDOS']); rows.push(['Nombre','Valor']);
  t.params.forEach(function(pa){ rows.push([pa.name,pa.val]); }); rows.push([]);
  rows.push(['ESTUDIOS']);
  t.estudios.forEach(function(est){
    rows.push([]); rows.push(['Estudio: '+est.name]);
    rows.push(['Impresión','Identificador','Resultado'].concat((est.cols||[]).map(function(pa){return pa.name;})).concat(['Comentario']));
    (est.imps||[]).forEach(function(imp){ (imp.prints||[]).forEach(function(pr,pi){ rows.push([(pi===0?imp.name:''),pr.ident,RES[pr.result||0]].concat((est.cols||[]).map(function(pa){return pr.vals[pa.id]!=null?pr.vals[pa.id]:'';})).concat([pr.comment||''])); }); });
  });
  var csv=rows.map(function(r){return r.map(csvCell).join(',');}).join('\r\n');
  download(safeName(t.name)+'.csv', csv, 'text/csv');
}
function exportPDF(){
  var t=curTest(); if(!t)return; var m=curMod(),p=curProj();
  var JS=window.jspdf&&window.jspdf.jsPDF; if(!JS){ alert('No se pudo cargar el generador de PDF. Reintenta en unos segundos.'); return; }
  var doc=new JS({orientation:'landscape',unit:'mm',format:'a4'});
  doc.setFontSize(17); doc.setTextColor(30,30,40); doc.text(String(t.name||'Test'),14,16);
  doc.setFontSize(10); doc.setTextColor(120,120,130); doc.text((m?m.name:'')+'   /   '+(p?p.name:''),14,22.5);
  var _dy=28; if(t.desc&&String(t.desc).trim()){ doc.setFontSize(9); doc.setTextColor(90,90,100); var _dl=doc.splitTextToSize('Descripción: '+String(t.desc),270); doc.text(_dl,14,28); _dy=28+_dl.length*4.2+3; }
  doc.autoTable({ startY:_dy, head:[['Parámetro','Valor']], body:t.params.map(function(pa){return [String(pa.name),String(pa.val==null?'':pa.val)];}),
    theme:'grid', headStyles:{fillColor:[124,108,231],textColor:255}, styles:{fontSize:9,cellPadding:2.5}, margin:{left:14,right:14} });
  t.estudios.forEach(function(est){
    var emap=varyMap(est); var cols=est.cols||[];
    var yy=(doc.lastAutoTable?doc.lastAutoTable.finalY:_dy)+10; if(yy>188){ doc.addPage(); yy=18; }
    doc.setFontSize(12); doc.setTextColor(70,40,150); doc.text('Estudio: '+String(est.name||''),14,yy);
    var head=[['Impresión','Identificador','Resultado'].concat(cols.map(function(pa){return String(pa.name);})).concat(['Comentario'])];
    var body=[], meta=[];
    (est.imps||[]).forEach(function(imp){ var prints=imp.prints&&imp.prints.length?imp.prints:[]; var n=prints.length||1;
      prints.forEach(function(pr,pi){ var row=[];
        if(pi===0) row.push({content:String(imp.name),rowSpan:n,styles:{valign:'top',fontStyle:'bold',fillColor:[244,242,255],textColor:[70,40,150]}});
        row.push(String(pr.ident)); row.push(RES[pr.result||0]);
        cols.forEach(function(pa){ row.push(String(pr.vals[pa.id]==null?'':pr.vals[pa.id])); });
        row.push(String(pr.comment||''));
        body.push(row); meta.push({iid:imp.id,pr:pr});
      });
    });
    doc.autoTable({ startY:yy+3, head:head, body:body,
      theme:'grid', headStyles:{fillColor:[124,108,231],textColor:255}, styles:{fontSize:9,cellPadding:2.5}, margin:{left:14,right:14},
      didParseCell:function(data){ if(data.section!=='body')return; var mt=meta[data.row.index]; if(!mt)return; if(data.column.index===2){ var rc=[null,[255,107,107],[244,183,64],[52,211,153]][mt.pr.result||0]; if(rc){ data.cell.styles.fillColor=rc; data.cell.styles.textColor=[255,255,255]; data.cell.styles.fontStyle='bold'; } } var col=data.column.index-3; if(col>=0 && col<cols.length && emap[mt.iid] && emap[mt.iid][cols[col].id]){ data.cell.styles.fillColor=[238,234,255]; data.cell.styles.textColor=[70,40,150]; data.cell.styles.fontStyle='bold'; } } });
  });
  doc.save(safeName(t.name)+'.pdf');
}

/* ===== solo-nube (Firebase) ===== */
var saveT=null, myTs=0, loaded=false;
function save(){ if(!loaded)return; clearTimeout(saveT); saveT=setTimeout(cloudPush,600); }
function cloudPush(){ try{ if(window.DPCloud&&window.DPCloud.configured&&window.DPCloud.currentUser&&window.DPCloud.currentUser()){ myTs=Date.now(); window.DPCloud.saveState('3dlab',S,myTs).catch(function(e){console.warn('[3DLab] guardado en nube falló:',e&&(e.message||e));}); } else if(window.DPCloud&&window.DPCloud.configured){ console.warn('[3DLab] sin sesión de Firebase: no se puede guardar.'); } }catch(e){} }
(function(){
  function _msg(hh,pp){ if(loaded)return; var el=document.getElementById('main'); if(el)el.innerHTML='<div class="lab-empty"><div class="le-ic">&#9729;&#65039;</div><h3>'+hh+'</h3><p>'+pp+'</p></div>'; var tr=document.getElementById('tree'); if(tr)tr.innerHTML=''; }
  _msg('Cargando tus datos…','Conectando con tu cuenta de Firebase.');
  var _sub=false, _first=true;
  function applyRemote(d){
    if(_first){ _first=false;
      if(d&&d.data&&typeof d.data==='object'){ S=d.data; }
      norm(); loaded=true; renderTree(); renderMain(); return;
    }
    if(!d||!d.data||typeof d.data!=='object')return;
    if((d.updated||0)<=myTs)return;
    S=d.data; norm(); renderTree(); renderMain();
  }
  function startCloud(){
    try{ window.DPCloud.onAuth(function(_u){ if(!_u||_sub)return; _sub=true;
      if(window.DPCloud.watchState){ window.DPCloud.watchState('3dlab', applyRemote); }
      else { window.DPCloud.loadState('3dlab').then(function(data){ applyRemote(data?{data:data,updated:Date.now()}:null); }).catch(function(){ loaded=true; renderTree(); renderMain(); }); }
    }); }catch(e){}
    setTimeout(function(){ if(!loaded)_msg('Inicia sesión para ver tus datos','Vuelve al inicio de la suite e inicia sesión. Si ya lo hiciste, recarga con Ctrl+Shift+R.'); }, 8000);
  }
  var w=0;(function c(){ if(window.DPCloud&&window.DPCloud.onAuth){ startCloud(); } else if(w<10000){ w+=150; setTimeout(c,150); } else { _msg('No se pudo conectar con Firebase','Recarga la página (Ctrl+Shift+R).'); } })();
})();
</script>

<script>

  var HDIC="<svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"9.3\"/><path d=\"M9.3 9.2a2.8 2.8 0 0 1 5.4 1c0 1.9-2.7 2.2-2.7 4\"/><circle cx=\"12\" cy=\"17.3\" r=\".6\" fill=\"currentColor\"/></svg>";
  function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function render(){
    var h='<div class="dph-modal" role="dialog" aria-modal="true" aria-label="Ayuda">';
    h+='<div class="dph-hd"><span class="dph-ic" style="background:'+(C.accent||'#5b8cff')+'">'+HDIC+'</span><div><div class="dph-ti">'+esc(C.title)+'</div><div class="dph-tg">'+esc(C.tagline||'')+'</div></div><button class="dph-x" aria-label="Cerrar" title="Cerrar">&times;</button></div>';

      if(s.list){ h+='<ul>'; s.list.forEach(function(x){ h+='<li>'+esc(x)+'</li>'; }); h+='</ul>'; }
      if(s.defs){ s.defs.forEach(function(d){ h+='<div class="dph-def"><b>'+esc(d[0])+'</b><span>'+esc(d[1])+'</span></div>'; }); }
      h+='</div>';
    });
    h+='</div></div>';

  }
  var veil=null;
  function ensure(){ if(veil) return;
    var st=document.createElement('style'); st.textContent=CSS; document.head.appendChild(st);

  }
  function open(){ ensure(); veil.innerHTML=render(); var x=veil.querySelector('.dph-x'); if(x)x.addEventListener('click',close); veil.classList.add('open'); }
