<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline' https://www.gstatic.com; connect-src *;" />
  <title>3DProject Admin — Login</title>
  <link rel="stylesheet" href="css/app.css" />
  <script type="module" src="../../../firebase/dpcloud.js"></script>
</head>
<body>
<div id="dp-shell">
  <button class="dp-back" onclick="dpHome()" title="Volver a 3DProject">
    <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M8 2.5L3.5 6.5L8 10.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
    3DProject
  </button>
  <span class="dp-appicon" style="background:rgba(52,211,153,.14);border:1px solid rgba(52,211,153,.30)"><svg viewBox="0 0 22 22" fill="none"><circle cx="11" cy="11" r="9" stroke="#34D399" stroke-width="1.4" fill="none"/><path d="M11 5.5V11L14.5 13.5" stroke="#34D399" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="11" cy="11" r="1.4" fill="#34D399"/></svg></span>
  <span class="dp-title">3DTracker</span>
  <span class="dp-sp"></span>
  <button class="dp-toggle" id="dpThemeBtn" onclick="dpToggleTheme()" title="Cambiar tema claro/oscuro" aria-label="Cambiar tema"></button>
</div>


  <div class="login-page">
    <div class="login-card">

      <div class="login-logo">
        <div class="logo-icon">🧊</div>
        <div>
          <span class="logo-name">3DProject</span>
          <span class="logo-sub">Panel de administración</span>
        </div>
      </div>

      <h1 class="login-title">Bienvenido</h1>
      <p class="login-subtitle">Introduce tus credenciales para acceder al panel.</p>

      <form id="login-form" autocomplete="off">
        <div class="form-group" style="margin-bottom:1rem;">
          <label class="form-label" for="username">Usuario</label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="admin"
            autocomplete="username"
            required
          />
        </div>

        <div class="form-group" style="margin-bottom:1.75rem;">
          <label class="form-label" for="password">Contraseña</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="login-btn">
          Iniciar sesión →
        </button>

        <p id="login-error" style="
          color: var(--error);
          font-size: 0.83rem;
          text-align: center;
          margin-top: 0.9rem;
          display: none;
        ">
          Credenciales incorrectas. Inténtalo de nuevo.
        </p>
      </form>

    </div>
  </div>

  <script src="js/web-bridge.js"></script>
  <script src="js/login.js"></script>

<script>
(function(){
  var KEY='dp3-theme';
  window.DP_LAUNCHER='../../../index.html';
  function inFrame(){return window.self!==window.top;}
  function param(){try{return new URLSearchParams(location.search).get('dptheme');}catch(e){return null;}}
  function store(t){try{localStorage.setItem(KEY,t);}catch(e){}}
  function stored(){try{return localStorage.getItem(KEY);}catch(e){return null;}}
  function ic(t){return t==='dark'
    ?'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4.3"/><path d="M12 2.5v2M12 19.5v2M2.5 12h2M19.5 12h2M5 5l1.4 1.4M17.6 17.6L19 19M19 5l-1.4 1.4M6.4 17.6L5 19"/></svg>'
    :'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>';}
  window.dpApplyTheme=function(t,bc){t=(t==='light')?'light':'dark';
    document.documentElement.setAttribute('data-theme',t);store(t);
    var b=document.getElementById('dpThemeBtn');if(b)b.innerHTML=ic(t);
    if(typeof window.dpOnTheme==='function'){try{window.dpOnTheme(t);}catch(e){}}
    if(bc&&inFrame()){try{window.parent.postMessage({__dp3:true,type:'theme',theme:t},'*');}catch(e){}}};
  window.dpToggleTheme=function(){var c=document.documentElement.getAttribute('data-theme')||'dark';window.dpApplyTheme(c==='dark'?'light':'dark',true);};
  window.dpHome=function(){if(inFrame()){try{window.parent.postMessage({__dp3:true,type:'home'},'*');}catch(e){}}else{window.location.href=window.DP_LAUNCHER;}};
  window.addEventListener('message',function(e){var d=e.data;if(d&&d.__dp3&&d.type==='theme'&&d.theme){window.dpApplyTheme(d.theme,false);}});
  window.dpApplyTheme(param()||stored()||document.documentElement.getAttribute('data-theme')||'dark',false);
})();
</script>

</body>
</html>
