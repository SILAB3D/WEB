<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seguimiento — 3DProject</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@1&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧊</text></svg>">
<script type="module" src="../../../firebase/dpcloud.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07080F; --glass:rgba(255,255,255,.04); --border:rgba(255,255,255,.08);
  --t1:#E8EBF4; --t2:#7A8099; --t3:#3A3D52; --green:#34D399; --green2:#2AB87D;
}
[data-theme=light]{
  --bg:#F5F6FA; --glass:rgba(0,0,0,.03); --border:rgba(0,0,0,.10);
  --t1:#1A1C24; --t2:#5A6172; --t3:#9AA0B0;
}
html,body{height:100%;font-family:'Outfit',system-ui,sans-serif;background:var(--bg);color:var(--t1)}
body{min-height:100vh;display:flex;flex-direction:column}
.orbs{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0}
.orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:.12}
.orb1{width:460px;height:460px;background:var(--green);top:-150px;left:-90px}
.orb2{width:340px;height:340px;background:#4D9FFF;bottom:-120px;right:-80px;opacity:.07}
.bar{position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:10px;height:56px;padding:0 18px;background:rgba(8,9,16,.6);-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);border-bottom:1px solid var(--border)}
[data-theme=light] .bar{background:rgba(255,255,255,.7)}
.bar .logo{display:flex;align-items:center;gap:9px;text-decoration:none}
.bar .chip{width:30px;height:30px;border-radius:9px;background:rgba(52,211,153,.14);border:1px solid rgba(52,211,153,.3);display:flex;align-items:center;justify-content:center}
.bar .brand{font-family:'DM Serif Display',serif;font-style:italic;font-size:19px;color:var(--t1)}
.bar .sp{flex:1}
.icon-btn{width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--t1);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s,border-color .15s}
.icon-btn:hover{background:var(--glass);border-color:rgba(255,255,255,.2)}
[data-theme=light] .icon-btn:hover{background:rgba(0,0,0,.05);border-color:rgba(0,0,0,.16)}
.wrap{position:relative;z-index:1;flex:1;width:100%;max-width:640px;margin:0 auto;padding:34px 20px 60px}
.center{text-align:center;padding:70px 0;color:var(--t2)}
.spinner{width:38px;height:38px;border-radius:50%;border:3px solid var(--border);border-top-color:var(--green);margin:0 auto 16px;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.errbox{text-align:center;background:var(--glass);border:1px solid var(--border);border-radius:20px;padding:46px 26px;margin-top:30px}
.errbox .ei{font-size:40px;margin-bottom:12px}
.errbox h2{font-size:20px;font-weight:600;margin-bottom:8px}
.errbox p{font-size:14px;font-weight:300;color:var(--t2);line-height:1.6;margin-bottom:20px}
.ghost{display:inline-flex;align-items:center;gap:7px;text-decoration:none;border:1px solid var(--border);border-radius:11px;padding:10px 16px;font-size:13.5px;font-weight:500;color:var(--t1);transition:background .15s,border-color .15s}
.ghost:hover{background:var(--glass);border-color:rgba(255,255,255,.2)}
[data-theme=light] .ghost:hover{background:rgba(0,0,0,.05)}
.ohead{margin-bottom:22px}
.ocode{display:inline-flex;align-items:center;gap:8px;font-family:ui-monospace,'SF Mono',monospace;font-size:14px;font-weight:600;color:var(--green);background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.25);border-radius:30px;padding:5px 14px}
.otitle{font-size:28px;font-weight:700;letter-spacing:-.5px;margin-top:14px}
.ometa{display:flex;flex-wrap:wrap;gap:14px;margin-top:8px;font-size:13px;color:var(--t2)}
.odesc{color:var(--t2);font-size:13.5px;line-height:1.6;margin-top:10px}
.prog{background:var(--glass);border:1px solid var(--border);border-radius:16px;padding:18px 20px;margin-bottom:22px}
.prow{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.prow .pl{font-size:13px;color:var(--t2);font-weight:500}
.prow .pp{font-size:18px;font-weight:700;color:var(--green)}
.ptrack{height:8px;border-radius:99px;background:var(--border);overflow:hidden}
.pfill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--green),var(--green2));width:0;transition:width .6s ease}
.tl-title{font-size:13px;font-weight:600;color:var(--t2);margin-bottom:14px;letter-spacing:.2px}
.step{display:flex;gap:14px;padding-bottom:18px;position:relative}
.step:not(:last-child)::before{content:'';position:absolute;left:13px;top:28px;bottom:0;width:2px;background:var(--border)}
.step.done:not(:last-child)::before{background:rgba(52,211,153,.4)}
.dot{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;border:2px solid var(--border);background:var(--bg);color:var(--t3);position:relative;z-index:1}
.step.done .dot{border-color:var(--green);background:var(--green);color:#06281D}
.step .body{padding-top:3px}
.step .sname{font-size:14.5px;font-weight:600}
.step.done .sname{color:var(--t1)}
.step.pending .sname{color:var(--t2)}
.step .smeta{font-size:12px;margin-top:3px}
.step.done .smeta{color:var(--green)}
.step.pending .smeta{color:var(--t3)}
.live{display:flex;align-items:center;gap:9px;margin-top:24px;font-size:12px;color:var(--t2)}
.live .pulse{width:9px;height:9px;border-radius:50%;background:var(--green);box-shadow:0 0 0 0 rgba(52,211,153,.5);animation:pulse 1.8s infinite}
@keyframes pulse{70%{box-shadow:0 0 0 7px rgba(52,211,153,0)}100%{box-shadow:0 0 0 0 rgba(52,211,153,0)}}
.live .upd{margin-left:auto;color:var(--t3)}
.again{display:block;text-align:center;margin-top:26px}
.again a{color:var(--t2);font-size:13px;text-decoration:none}
.again a:hover{color:var(--t1)}
.empty{text-align:center;color:var(--t2);font-size:13.5px;padding:20px;background:var(--glass);border:1px solid var(--border);border-radius:14px}
</style>
</head>
<body>
<div class="orbs"><div class="orb orb1"></div><div class="orb orb2"></div></div>
<header class="bar">
  <button class="icon-btn" title="Volver a 3DProject" aria-label="Volver" onclick="if(window.self!==window.top){try{parent.postMessage({__dp3:true,type:'home'},'*')}catch(e){}}else{location.href='../../../index.html'}"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M11 18l-6-6 6-6"/></svg></button>
  <a class="logo" href="index.html">
    <span class="chip"><svg width="17" height="17" viewBox="0 0 22 22" fill="none"><circle cx="11" cy="11" r="9" stroke="#34D399" stroke-width="1.5" fill="none"/><path d="M11 5.7V11l3.4 2.4" stroke="#34D399" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
    <span class="brand">3DProject</span>
  </a>
  <div class="sp"></div>
  <button class="icon-btn" id="themeBtn" onclick="toggleTheme()" title="Cambiar tema" aria-label="Cambiar tema"></button>
</header>
<main class="wrap">
  <div id="st-loading" class="center">
    <div class="spinner"></div>
    Cargando tu pedido…
  </div>
  <div id="st-error" class="errbox" style="display:none">
    <div class="ei">🔍</div>
    <h2>Pedido no encontrado</h2>
    <p id="e-msg">No hemos encontrado ningún pedido con ese código. Comprueba que lo has escrito correctamente.</p>
    <a class="ghost" href="index.html">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M11 18l-6-6 6-6"/></svg>
      Buscar otro pedido
    </a>
  </div>
  <div id="st-data" style="display:none">
    <div class="ohead">
      <span class="ocode">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.7l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.7l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><path d="M3.3 7L12 12l8.7-5M12 22V12"/></svg>
        <span id="d-code"></span>
      </span>
      <h1 class="otitle" id="d-name"></h1>
      <div class="ometa">
        <span id="d-email"></span>
        <span id="d-date"></span>
      </div>
      <p class="odesc" id="d-desc" style="display:none"></p>
    </div>
    <div class="prog">
      <div class="prow"><span class="pl">Progreso del pedido</span><span class="pp" id="d-pct">0%</span></div>
      <div class="ptrack"><div class="pfill" id="d-bar"></div></div>
    </div>
    <p class="tl-title">ETAPAS DEL PROYECTO</p>
    <div id="d-steps"></div>
    <div class="live"><span class="pulse"></span> Actualización automática <span class="upd" id="d-upd"></span></div>
    <div class="again"><a href="index.html">← Buscar otro pedido</a></div>
  </div>
</main>
<script>
function ic(t){return t==='dark'
  ?'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4.3"/><path d="M12 2.5v2M12 19.5v2M2.5 12h2M19.5 12h2M5 5l1.4 1.4M17.6 17.6L19 19M19 5l-1.4 1.4M6.4 17.6L5 19"/></svg>'
  :'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>';}
function applyTheme(t){t=(t==='light')?'light':'dark';document.documentElement.setAttribute('data-theme',t);try{localStorage.setItem('dp3-theme',t);}catch(e){}var b=document.getElementById('themeBtn');if(b)b.innerHTML=ic(t);}
function toggleTheme(){applyTheme((document.documentElement.getAttribute('data-theme')||'dark')==='dark'?'light':'dark');}
(function(){var t='dark';try{t=localStorage.getItem('dp3-theme')||'dark';}catch(e){}applyTheme(t);})();
function esc(s){var d=document.createElement('div');d.appendChild(document.createTextNode(s==null?'':String(s)));return d.innerHTML;}
function fmt(iso){if(!iso)return'';try{return new Date(iso).toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});}catch(e){return'';}}
function show(s){
  document.getElementById('st-loading').style.display=(s==='loading')?'':'none';
  document.getElementById('st-error').style.display  =(s==='error')  ?'':'none';
  document.getElementById('st-data').style.display   =(s==='data')   ?'':'none';
}
function checkSvg(){return '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>';}
function renderSteps(steps){
  var c=document.getElementById('d-steps');
  if(!steps||!steps.length){c.innerHTML='<div class="empty">Tu pedido se ha registrado. Pronto añadiremos las etapas de seguimiento.</div>';return;}
  var arr=steps.slice().sort(function(a,b){return (a.order_index||0)-(b.order_index||0);});
  c.innerHTML=arr.map(function(s){
    var done=s.status==='done';
    return '<div class="step '+(done?'done':'pending')+'">'
      +'<div class="dot">'+(done?checkSvg():'')+'</div>'
      +'<div class="body"><div class="sname">'+esc(s.step_name)+'</div>'
      +'<div class="smeta">'+(done?('✓ Completado'+(s.updated_at?' · '+fmt(s.updated_at):'')):'En espera')+'</div></div></div>';
  }).join('');
}
function render(o){
  document.getElementById('d-code').textContent=o.order_code||'';
  document.getElementById('d-name').textContent=o.customer_name||'Tu pedido';
  document.getElementById('d-email').innerHTML='✉️ '+esc(o.customer_email||'');
  document.getElementById('d-date').innerHTML=o.created_at?('📅 '+fmt(o.created_at)):'';
  var de=document.getElementById('d-desc');
  if(o.description){de.textContent=o.description;de.style.display='';}else{de.style.display='none';}
  var steps=o.order_steps||[];
  var total=steps.length, done=steps.filter(function(s){return s.status==='done';}).length;
  var pct=total===0?0:Math.round(done/total*100);
  document.getElementById('d-pct').textContent=pct+'%';
  document.getElementById('d-bar').style.width=pct+'%';
  renderSteps(steps);
  document.getElementById('d-upd').textContent='Actualizado '+new Date().toLocaleTimeString('es-ES');
  document.title=pct+'% — '+(o.order_code||'Pedido')+' · 3DProject';
}
var code=(new URLSearchParams(location.search).get('code')||'').trim().toUpperCase();
var timer=null, first=true;
if(!/^3DP-[A-Z0-9]{5,}$/.test(code)){ location.href='index.html'; }
async function load(){
  try{
    if(!window.DPCloud) throw new Error('conexion');
    if(window.DPCloud.ready) await window.DPCloud.ready;
    var o=await window.DPCloud.getOrderByCode(code);
    if(!o){
      if(first){ show('error'); document.getElementById('e-msg').innerHTML='No hemos encontrado ningún pedido con el código <b>'+esc(code)+'</b>. Comprueba que lo has escrito correctamente.'; if(timer)clearInterval(timer); }
      first=false; return;
    }
    show('data'); render(o); first=false;
  }catch(e){
    if(first){ show('error'); document.getElementById('e-msg').textContent='No se ha podido conectar con el servicio de seguimiento. Inténtalo de nuevo en unos segundos.'; }
    first=false;
  }
}
show('loading');
var waited=0;
(function waitCloud(){
  if(window.DPCloud){ load(); if(window.DPCloud.watchOrderByCode){ window.DPCloud.watchOrderByCode(code, load); } else { timer=setInterval(load,5000); } }
  else if(waited<10000){ waited+=200; setTimeout(waitCloud,200); }
  else { show('error'); document.getElementById('e-msg').textContent='No se ha podido cargar el servicio. Abre la aplicación con el servidor local (ver guía).'; }
})();
window.addEventListener('beforeunload',function(){if(timer)clearInterval(timer);});
</script>
</body>
</html>
