<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3DBilling — SILAB3D</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script type="module" src="../../firebase/dpcloud.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07080F; --glass:rgba(255,255,255,.04); --border:rgba(255,255,255,.08);
  --t1:#E8EBF4; --t2:#7A8099; --t3:#3A3D52; --ac:#F4B740; --ac2:#E89A2B;
}
[data-theme=light]{ --bg:#F5F6FA; --glass:rgba(0,0,0,.03); --border:rgba(0,0,0,.10); --t1:#1A1C24; --t2:#5A6172; --t3:#AEB4C2; }
html,body{height:100%;font-family:'Outfit',system-ui,sans-serif;background:var(--bg);color:var(--t1)}
body{height:100vh;overflow:hidden}
button{font-family:inherit;cursor:pointer}
input,textarea{font-family:inherit}
#dp-shell{position:fixed;top:0;left:0;right:0;height:44px;display:flex;align-items:center;gap:10px;padding:0 14px;z-index:9500;background:rgba(10,11,18,.72);-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);border-bottom:1px solid rgba(255,255,255,.08)}
[data-theme=light] #dp-shell{background:rgba(255,255,255,.80);border-bottom:1px solid rgba(0,0,0,.08)}
#dp-shell .dp-back{display:flex;align-items:center;gap:6px;height:30px;padding:0 13px 0 9px;border-radius:9px;border:1px solid rgba(255,255,255,.14);background:transparent;color:#E8EBF4;font:500 13px 'Outfit',sans-serif;cursor:pointer}
#dp-shell .dp-back:hover{background:rgba(255,255,255,.07)}
[data-theme=light] #dp-shell .dp-back{color:#1A1C24;border-color:rgba(0,0,0,.16)}
#dp-shell .dp-appicon{width:27px;height:27px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:rgba(244,183,64,.16);border:1px solid rgba(244,183,64,.32)}
#dp-shell .dp-title{font-size:13px;font-weight:600;color:#E8EBF4}
[data-theme=light] #dp-shell .dp-title{color:#1A1C24}
#dp-shell .dp-sp{flex:1}
#dp-shell .dp-toggle{width:32px;height:32px;border-radius:9px;border:1px solid rgba(255,255,255,.14);background:transparent;color:#E8EBF4;display:flex;align-items:center;justify-content:center;cursor:pointer}
[data-theme=light] #dp-shell .dp-toggle{color:#1A1C24;border-color:rgba(0,0,0,.16)}
.top{position:fixed;top:44px;left:0;right:0;height:54px;z-index:80;display:flex;align-items:center;gap:12px;padding:0 16px;background:var(--glass);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.burger{width:34px;height:34px;border-radius:9px;border:1px solid var(--border);background:transparent;color:var(--t1);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.burger:hover{background:var(--glass)}
.chip{width:30px;height:30px;border-radius:9px;background:rgba(244,183,64,.16);border:1px solid rgba(244,183,64,.32);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tname{font-weight:700;font-size:16px;letter-spacing:-.2px}
.sp{flex:1}
.tbtn{height:36px;padding:0 15px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--t1);font:600 13px 'Outfit',sans-serif;display:flex;align-items:center;gap:7px}
.tbtn:hover{background:var(--glass)}
.tbtn.primary{border:none;background:linear-gradient(120deg,var(--ac),var(--ac2));color:#3a2400}
.layout{position:fixed;top:52px;left:0;right:0;bottom:0;display:flex}
.side{width:248px;flex-shrink:0;border-right:1px solid var(--border);background:#0E1118;display:flex;flex-direction:column;padding:14px 12px;overflow-y:auto;transition:margin-left .25s ease}
body.side-off .side{margin-left:-249px}
.cta{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:11px;border:none;border-radius:12px;background:linear-gradient(120deg,var(--ac),var(--ac2));color:#3a2400;font:700 13.5px 'Outfit',sans-serif;margin-bottom:14px}
.cta:hover{filter:brightness(1.05)}
.side-h{font-size:10.5px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--t2);margin:6px 4px 8px}
.rlist{display:flex;flex-direction:column;gap:5px;flex:1}
.ritem{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:10px;border:1px solid transparent;cursor:pointer;transition:background .15s}
.ritem:hover{background:var(--glass)}
.ritem.on{background:rgba(244,183,64,.1);border-color:rgba(244,183,64,.25)}
.ritem .ri-main{flex:1;min-width:0}
.ritem .ri-num{font-size:12.5px;font-weight:700}
.ritem .ri-sub{font-size:11px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ritem .ri-tot{font-size:12px;font-weight:700;color:var(--ac)}
.ritem .ri-del{opacity:0;border:none;background:transparent;color:var(--t2);font-size:14px;padding:2px 4px;border-radius:6px}
.ritem:hover .ri-del{opacity:1}
.ritem .ri-del:hover{color:#FF7A7A;background:rgba(255,77,77,.1)}
.side-bottom{margin-top:auto;padding-top:12px;border-top:1px solid var(--border)}
.side-bottom button{width:100%;display:flex;align-items:center;justify-content:center;gap:7px;padding:10px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--t2);font:600 12.5px 'Outfit',sans-serif}
.side-bottom button:hover{color:var(--t1);background:var(--glass)}
.main{flex:1;overflow-y:auto;padding:28px 24px 60px;display:flex;justify-content:center;align-items:flex-start}
.empty{margin:auto;text-align:center;color:var(--t2);max-width:340px}
.empty .e-ic{font-size:42px;margin-bottom:12px}
.empty h3{font-size:18px;color:var(--t1);margin-bottom:8px;font-weight:600}
.empty p{font-size:13.5px;line-height:1.6;margin-bottom:18px}
.sheet{width:760px;max-width:100%;background:#fff;color:#1a1a1a;border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.4);padding:42px 46px;font-size:14px}
.sheet .gr{white-space:pre-wrap;word-break:break-word;overflow-wrap:anywhere;overflow:hidden;resize:none;display:block;min-width:0}
.doc-head{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;padding-bottom:22px;border-bottom:2px solid #ECECEC}
.dh-brand{display:flex;gap:14px;align-items:center}
.dh-logo{width:74px;height:74px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dh-logo img{max-width:100%;max-height:100%;object-fit:contain}
.dh-company{font-family:'DM Serif Display',serif;font-size:24px;color:#111;letter-spacing:.5px}
.dh-slogan{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#888;margin-top:3px}
.dh-meta{text-align:right;flex-shrink:0;min-width:170px}
.dh-title{font-size:22px;font-weight:800;letter-spacing:1px;color:#111}
.dt-toggle{margin-top:7px;border:1px solid #ccc;background:#f5f5f7;color:#333;font:600 12px 'Outfit',sans-serif;padding:5px 10px;border-radius:8px;cursor:pointer;outline:none}
.dt-toggle option{color:#111;background:#fff}
.dt-toggle:hover{color:#111;border-color:#F4B740}
.doc-notes{margin-top:26px;border-top:1px solid #eee;padding-top:14px;display:flex;flex-direction:column;gap:7px}
.dn-row{display:flex;align-items:flex-start;gap:9px}
.dn-chk{margin-top:3px;flex-shrink:0;accent-color:#F4B740;width:15px;height:15px;cursor:pointer}
.dn-ta{flex:1;font-size:12px;color:#555;line-height:1.55;border:none;background:transparent;resize:none;outline:none;font-family:'Outfit',sans-serif;padding:0}
.dn-off .dn-ta{color:#bbb;text-decoration:line-through}
.dn-head{font-size:10.5px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:#999;margin-bottom:2px}
.dh-num textarea{border:none;text-align:right;font-family:ui-monospace,monospace;font-size:12px;color:#666;background:transparent;width:100%;margin-top:4px}
.dh-date input{border:none;text-align:right;font-size:12px;color:#666;background:transparent;font-family:inherit;width:100%;margin-top:2px}
.doc-client{display:flex;gap:24px;margin:18px 0 6px}
.dc-field{flex:1}
.dc-field label{display:block;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#999;margin-bottom:3px}
.dc-field textarea{width:100%;border:none;border-bottom:1px solid #E2E2E2;padding:4px 0;font-size:14px;color:#1a1a1a;background:transparent;line-height:1.4}
.dc-field textarea:focus{outline:none;border-bottom-color:var(--ac)}
table.lines{width:100%;border-collapse:collapse;margin-top:18px;table-layout:fixed}
table.lines th{font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:#999;text-align:left;padding:8px 8px;border-bottom:1.5px solid #E8E8E8}
table.lines th.num,table.lines td.num{text-align:right;width:96px}
table.lines th.u,table.lines td.u{text-align:center;width:62px}
table.lines th.x,table.lines td.x{width:30px}
table.lines td{padding:6px 8px;border-bottom:1px solid #F0F0F0;vertical-align:top}
table.lines textarea{width:100%;border:none;background:transparent;font-size:13.5px;color:#1a1a1a;font-family:inherit;line-height:1.45}
table.lines textarea:focus{outline:none}
table.lines td.num textarea{text-align:right;font-weight:600}
table.lines td.u textarea{text-align:center}
.cell-name textarea{font-weight:600}
.cell-sub textarea{color:#666;font-size:12.5px}
.row-del{border:none;background:transparent;color:#CFCFCF;font-size:15px;padding:2px}
.row-del:hover{color:#E5484D}
.add-line{margin-top:12px;display:inline-flex;align-items:center;gap:7px;padding:8px 14px;border:1px dashed #D5D5D5;border-radius:9px;background:transparent;color:#666;font:600 12.5px 'Outfit',sans-serif}
.add-line:hover{border-color:var(--ac);color:var(--ac2)}
.doc-total{display:flex;justify-content:flex-end;align-items:baseline;gap:16px;margin-top:26px;padding-top:18px;border-top:2px solid #ECECEC}
.dt-label{font-size:14px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#888}
.dt-value{font-size:34px;font-weight:800;color:#111;letter-spacing:-.5px}
.doc-note{margin-top:24px;font-size:10.5px;color:#9A9A9A;line-height:1.6;border-top:1px solid #F0F0F0;padding-top:14px}
.doc-note a{color:var(--ac2);text-decoration:none}
.veil{position:fixed;inset:0;background:rgba(7,8,15,.7);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);z-index:500;display:none;align-items:center;justify-content:center;padding:20px}
.veil.open{display:flex}
.modal{width:540px;max-width:100%;max-height:88vh;overflow:auto;background:#0F111C;border:1px solid var(--border);border-radius:20px;padding:26px}
[data-theme=light] .modal{background:#fff}
.modal h2{font-size:18px;font-weight:600;margin-bottom:4px}
.modal .m-sub{font-size:13px;color:var(--t2);margin-bottom:18px}
.preset-row{display:flex;align-items:center;gap:12px;padding:11px;border:1px solid var(--border);border-radius:12px;margin-bottom:9px;cursor:pointer}
.preset-row.on{border-color:var(--ac);background:rgba(244,183,64,.08)}
.preset-row .pr-logo{width:42px;height:42px;border-radius:8px;background:var(--glass);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.preset-row .pr-logo img{max-width:100%;max-height:100%;object-fit:contain}
.preset-row .pr-info{flex:1;min-width:0}
.preset-row .pr-name{font-weight:600;font-size:14px}
.preset-row .pr-meta{font-size:11.5px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.preset-row .pr-del{border:none;background:transparent;color:var(--t2);font-size:14px;padding:4px}
.preset-row .pr-del:hover{color:#FF7A7A}
.mfield{margin-bottom:12px}
.mfield label{display:block;font-size:12px;font-weight:600;color:var(--t2);margin-bottom:6px}
.mfield input{width:100%;background:var(--glass);border:1px solid var(--border);border-radius:10px;color:var(--t1);font-size:14px;padding:10px 12px;outline:none}
.mfield input:focus{border-color:var(--ac)}
.m-actions{display:flex;gap:10px;margin-top:8px}
.btn{padding:11px 16px;border-radius:11px;border:none;font:600 13.5px 'Outfit',sans-serif}
.btn.primary{background:linear-gradient(120deg,var(--ac),var(--ac2));color:#3a2400;flex:1}
.btn.ghost{background:transparent;border:1px solid var(--border);color:var(--t2)}
.btn.ghost:hover{color:var(--t1)}
.logo-up{display:flex;align-items:center;gap:12px}
.logo-up .prev{width:50px;height:50px;border:1px solid var(--border);border-radius:9px;display:flex;align-items:center;justify-content:center;overflow:hidden;background:var(--glass)}
.logo-up .prev img{max-width:100%;max-height:100%;object-fit:contain}
@media print{
  @page{margin:14mm}
  #dp-shell,.appbar,.top,.side,.docside,.dock-toggle,.add-line,.row-del,.veil,.side-bottom,.dt-toggle,.no-print,.dn-off{display:none!important}
  .main{margin-top:0!important;padding-top:0!important}
  body{height:auto;overflow:visible;background:#fff}
  .layout{position:static;display:block}
  .main{display:block;padding:0;overflow:visible}
  .sheet{width:100%;max-width:100%;box-shadow:none;border-radius:0;padding:0}
}
/* desplegables (select/option) legibles en movil */
select{color:var(--t1)}
option{background-color:#161922;color:#E8EBF4}
[data-theme=light] option{background-color:#ffffff;color:#1A1C24}
[data-theme=light] .side{background:#FFFFFF}
/* frases: 50% automatico + presets */
.dn-auto{font-size:12px;font-weight:700;color:#222;white-space:nowrap;align-self:center;margin-left:2px}
.dn-head{display:flex;align-items:center;justify-content:space-between;gap:10px}
.dn-pbtn{border:1px solid #D5D5D5;background:#fff;color:#666;border-radius:8px;padding:5px 11px;font:600 11px 'Outfit',sans-serif;cursor:pointer;text-transform:none;letter-spacing:0;flex-shrink:0}
.dn-pbtn:hover{border-color:var(--ac);color:var(--ac2)}
.dn-addrow{display:flex;gap:10px;flex-wrap:wrap}
.dn-pop{border:1px solid #E2E2E2;border-radius:10px;padding:9px;margin:8px 0 4px;background:#FAFAFB}
.dn-pp-save{width:100%;text-align:left;border:1px dashed #C9A23E;background:transparent;color:#9A7B2E;border-radius:8px;padding:8px 11px;font:600 12px 'Outfit',sans-serif;cursor:pointer}
.dn-pp-save:hover{background:rgba(244,183,64,.1)}
.dn-pp-list{margin-top:7px;display:flex;flex-direction:column;gap:5px}
.dn-pp-item{display:flex;gap:6px;align-items:center}
.dn-pp-apply{flex:1;text-align:left;border:1px solid #E2E2E2;background:#fff;color:#333;border-radius:8px;padding:7px 11px;font:500 12.5px 'Outfit',sans-serif;cursor:pointer;display:flex;align-items:center;gap:8px}
.dn-pp-apply:hover{border-color:var(--ac)}
.dn-pp-n{color:#999;font-size:11px;margin-left:auto}
.dn-pp-del{width:28px;height:32px;border:1px solid #E2E2E2;background:#fff;color:#bbb;border-radius:8px;font-size:13px;cursor:pointer;flex-shrink:0}
.dn-pp-del:hover{color:#E5484D;border-color:#E5484D}
.dn-pp-empty{margin-top:7px;color:#999;font-size:12px;padding:3px 2px}
/* panel derecho de presets (cabecera + frases) */
.docside{width:300px;flex-shrink:0;border-left:1px solid var(--border);background:#0E1118;overflow-y:auto;padding:16px 16px 40px;display:flex;flex-direction:column;gap:22px}
[data-theme=light] .docside{background:#FFFFFF}
.dock-h{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--t2);margin-bottom:5px}
.dock-sub{font-size:11.5px;color:var(--t3);margin-bottom:11px;line-height:1.5}
.dock-form{margin-top:12px;border-top:1px solid var(--border);padding-top:12px;display:flex;flex-direction:column;gap:9px}
.dock-form .mfield{margin-bottom:0}
.dock-empty{font-size:12px;color:var(--t3);padding:6px 2px}
@media(min-width:981px){.dock-toggle{display:none!important}}
@media(max-width:980px){
  .docside{position:fixed;top:52px;right:0;bottom:0;z-index:70;width:84vw;max-width:330px;transform:translateX(101%);transition:transform .25s ease;box-shadow:-8px 0 30px rgba(0,0,0,.45)}
  body.dock-open .docside{transform:translateX(0)}
}
/* === banner unificado === */
.appbar{position:fixed;top:0;left:0;right:0;height:52px;z-index:9500;display:flex;align-items:center;gap:9px;padding:0 14px;background:rgba(10,11,18,.82);-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);border-bottom:1px solid rgba(255,255,255,.08)}
[data-theme=light] .appbar{background:rgba(255,255,255,.86);border-bottom:1px solid rgba(0,0,0,.08)}
.ab-ic-btn{width:34px;height:34px;border-radius:9px;border:1px solid var(--border);background:transparent;color:var(--t1);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ab-ic-btn:hover{background:var(--glass)}
.ab-app{display:flex;align-items:center;gap:8px;flex-shrink:0}
.ab-appic{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:rgba(244,183,64,.16);border:1px solid rgba(244,183,64,.32)}
.ab-name{font-weight:700;font-size:15px;letter-spacing:-.2px}
.ab-back{display:flex;align-items:center;gap:6px;height:32px;padding:0 12px 0 9px;border-radius:9px;border:1px solid var(--border);background:transparent;color:var(--t1);font:500 12.5px 'Outfit',sans-serif;flex-shrink:0}
.ab-back:hover{background:var(--glass)}
.ab-sp{flex:1}
.ab-theme{width:34px;height:34px;border-radius:9px;border:1px solid var(--border);background:transparent;color:var(--t1);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ab-theme:hover{background:var(--glass)}
.tbtn.primary{border:none;background:linear-gradient(120deg,var(--ac),var(--ac2));color:#3a2400}
@media(max-width:760px){ .ablbl{display:none} .ab-name{display:none} .appbar .tbtn{padding:0 11px} }
@media(max-width:560px){ .ab-bktx{display:none} .ab-back{padding:0 9px} }
/* === árbol del panel izquierdo === */
.btree{flex:1;overflow-y:auto;padding:6px 4px 16px}
.bgrp{display:flex;align-items:center;gap:7px;padding:9px 8px 4px;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--t2);cursor:pointer;user-select:none}
.bgrp .bg-car{font-size:9px;color:var(--t3);transition:transform .15s;display:inline-block}
.bgrp.op .bg-car{transform:rotate(90deg)}
.bgrp .bg-n{margin-left:auto;color:var(--t3);font-weight:600}
.bgrp-empty{font-size:11.5px;color:var(--t3);padding:2px 8px 6px 22px}
.bitem{display:flex;align-items:center;gap:8px;padding:8px 9px;border-radius:9px;cursor:pointer;border:1px solid transparent}
.bitem:hover{background:var(--glass)}
.bitem.on{background:rgba(244,183,64,.1);border-color:rgba(244,183,64,.25)}
.bitem.dash{font-weight:600;font-size:13.5px;margin-bottom:2px}
.bitem.doc{margin-left:8px}
.bic{width:17px;height:17px;display:flex;align-items:center;justify-content:center;color:var(--ac);flex-shrink:0}
.bi-main{flex:1;min-width:0;display:flex;flex-direction:column}
.bi-num{font-size:12.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bi-sub{font-size:10.5px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bi-tot{font-size:11.5px;font-weight:700;color:var(--ac);flex-shrink:0}
.bi-del{opacity:0;border:none;background:transparent;color:var(--t2);font-size:13px;padding:2px 4px;border-radius:6px;flex-shrink:0}
.bitem:hover .bi-del{opacity:1}
.bi-del:hover{color:#FF7A7A;background:rgba(255,77,77,.1)}
/* === dashboard === */
.bdash{width:100%;max-width:920px;align-self:flex-start}
.bd-h1{font-size:22px;font-weight:800;letter-spacing:-.3px}
.bd-sub{color:var(--t2);font-size:13.5px;margin:4px 0 18px}
.bd-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:18px}
.bd-stat{background:var(--glass);border:1px solid var(--border);border-radius:14px;padding:14px 16px}
.bd-stat b{display:block;font-size:21px;font-weight:800;color:var(--ac)}
.bd-stat span{font-size:11.5px;color:var(--t2)}
.bd-actions{margin-bottom:22px}
.cta-d{height:40px;padding:0 18px;border:none;border-radius:11px;background:linear-gradient(120deg,var(--ac),var(--ac2));color:#3a2400;font:700 13px 'Outfit',sans-serif;display:inline-flex;align-items:center;gap:7px;cursor:pointer}
.bd-h2{font-size:14px;font-weight:700;margin-bottom:10px}
.bd-list{display:flex;flex-direction:column;gap:8px}
.bd-row{display:flex;align-items:center;gap:12px;background:var(--glass);border:1px solid var(--border);border-radius:12px;padding:11px 14px;cursor:pointer}
.bd-row:hover{border-color:var(--ac)}
.bd-rtype{font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--t3);font-weight:700;width:84px;flex-shrink:0}
.bd-rn{font-weight:700;font-size:13px;flex-shrink:0}
.bd-rc{color:var(--t2);font-size:12px;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bd-rt{font-weight:800;color:var(--ac);flex-shrink:0}
.bd-empty{color:var(--t2);font-size:13px;padding:14px 2px}
table.lines td.imp{font-weight:700;color:#111;text-align:right;font-size:13.5px;padding:6px 8px;vertical-align:top}
</style>
<style>
@media(max-width:760px){.side{position:fixed;top:52px;bottom:0;left:0;z-index:60;width:80vw;max-width:300px;margin-left:0;transform:translateX(0);transition:transform .25s ease;box-shadow:8px 0 30px rgba(0,0,0,.4)}body.side-off .side{transform:translateX(-101%);margin-left:0}.main{padding:18px 12px}.sheet{padding:24px 18px}}
@media(max-width:600px){
  .doc-head{flex-direction:column;gap:12px}
  .dh-meta{text-align:left;min-width:0}
  .doc-client{flex-direction:column;gap:12px;margin:14px 0 4px}
  table.lines{table-layout:auto;margin-top:14px}
  table.lines thead{display:none}
  table.lines,table.lines tbody,table.lines tr,table.lines td{display:block;width:auto}
  table.lines tr{position:relative;border:1px solid #E8E8E8;border-radius:12px;padding:8px 12px 10px;margin-bottom:12px;background:#fff}
  table.lines td{display:flex;align-items:center;gap:10px;width:auto!important;text-align:left;padding:7px 0;border-bottom:1px solid #F2F2F2}
  table.lines td.imp{border-bottom:none}
  table.lines td::before{content:attr(data-label);flex:0 0 92px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#999}
  table.lines td.cell-name,table.lines td.cell-sub{flex-direction:column;align-items:stretch;gap:3px}
  table.lines td.cell-name::before,table.lines td.cell-sub::before{flex:none}
  table.lines td.cell-name{padding-right:26px}
  table.lines td textarea{flex:1;width:100%;text-align:left!important;font-size:16px;font-weight:400}
  table.lines td.num textarea{font-weight:600}
  table.lines td.imp{font-size:15px;font-weight:700;color:#111}
  table.lines td.x{position:absolute;top:8px;right:10px;padding:0;border:none;width:auto!important}
  table.lines td.x::before{display:none}
  .add-line{width:100%;justify-content:center;margin-top:6px}
}
</style>
<style>@media(max-width:600px){.appbar{gap:5px;padding:0 8px}.appbar .tbtn{padding:0 9px}}</style>
</head>
<body>
<div class="appbar">
  <button class="ab-ic-btn" onclick="toggleSide()" title="Mostrar u ocultar el menú"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg></button>
  <span class="ab-app"><span class="ab-appic"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#F4B740" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2h9l3 3v17l-2.2-1.4L13.5 22 12 20.6 10.5 22 8.7 20.6 6 22z"/><path d="M9 8h6M9 12h6M9 16h3"/></svg></span><span class="ab-name">3DBilling</span></span>
  <button class="ab-back" onclick="dpHome()" title="Volver a 3DProject"><svg width="12" height="12" viewBox="0 0 13 13" fill="none"><path d="M8 2.5L3.5 6.5L8 10.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg> <span class="ab-bktx">3DProject</span></button>
  <span class="ab-sp"></span>
  <button class="tbtn dock-toggle" onclick="toggleDock()" title="Cabecera y frases (presets)">Presets</button>
  <button class="tbtn" onclick="duplicateReceipt()" id="btn-dup" title="Duplicar"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg> <span class="ablbl">Duplicar</span></button>
  <button class="tbtn primary" onclick="printPDF()" id="btn-print"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><path d="M6 14h12v8H6z"/></svg> <span class="ablbl">Imprimir / PDF</span></button>
  <button class="ab-theme" onclick="window.DPHelp&&DPHelp.open()" title="Cómo usar esta app" aria-label="Ayuda" style="width:34px;height:34px;padding:0;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9.3"/><path d="M9.3 9.2a2.8 2.8 0 0 1 5.4 1c0 1.9-2.7 2.2-2.7 4"/><circle cx="12" cy="17.3" r=".6" fill="currentColor"/></svg></button>
  <button class="ab-theme" id="dpThemeBtn" onclick="dpToggleTheme()" title="Cambiar tema" aria-label="Tema"></button>
</div>
<div class="layout">
  <aside class="side" id="side">
    <button class="cta" onclick="newReceipt()"><svg width="13" height="13" viewBox="0 0 12 12" fill="none"><path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/></svg> Nuevo recibo</button>
    <div class="btree" id="rlist"></div>
    <div class="side-bottom">
      <button onclick="toggleDock()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 7h18M3 12h18M3 17h18"/></svg> Cabecera (presets)</button>
    </div>
  </aside>
  <main class="main" id="main"></main>
  <aside class="docside" id="docside">
    <div class="dock-sec">
      <div class="dock-h">Cabecera del documento</div>
      <p class="dock-sub">Elige una cabecera para este documento o crea una nueva.</p>
      <div id="presetList"></div>
      <div class="dock-form">
        <div class="mfield"><label>Nombre del preset</label><input id="pf-name" placeholder="Ej: SILAB3D"></div>
        <div class="mfield"><label>Empresa</label><input id="pf-company" placeholder="SILAB3D"></div>
        <div class="mfield"><label>Lema</label><input id="pf-slogan" placeholder="INNOVACIÓN CAPA A CAPA"></div>
        <div class="mfield"><label>Logo</label><div class="logo-up"><span class="prev" id="pf-prev">—</span><button class="btn ghost" onclick="document.getElementById('pf-logo').click()">Cargar…</button><input type="file" id="pf-logo" accept="image/*" style="display:none"></div></div>
        <button class="btn primary" style="width:100%" onclick="savePreset()">Guardar cabecera</button>
      </div>
    </div>
    <div class="dock-sec">
      <div class="dock-h">Presets de frases</div>
      <p class="dock-sub">Guarda las frases del documento como preset y reutilízalas.</p>
      <div id="phrasePresetList"></div>
      <button class="btn primary" style="width:100%;margin-top:8px" onclick="savePhrasePreset()">Guardar frases actuales</button>
    </div>
  </aside>
</div>
<script>
function ic(t){return t==='dark'
  ?'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4.3"/><path d="M12 2.5v2M12 19.5v2M2.5 12h2M19.5 12h2M5 5l1.4 1.4M17.6 17.6L19 19M19 5l-1.4 1.4M6.4 17.6L5 19"/></svg>'
  :'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>';}
function applyTheme(t){t=(t==='light')?'light':'dark';document.documentElement.setAttribute('data-theme',t);try{localStorage.setItem('dp3-theme',t);}catch(e){}var b=document.getElementById('dpThemeBtn');if(b)b.innerHTML=ic(t);if(window.self!==window.top){try{window.parent.postMessage({__dp3:true,type:'theme',theme:t},'*');}catch(e){}}}
window.dpToggleTheme=function(){applyTheme((document.documentElement.getAttribute('data-theme')||'dark')==='dark'?'light':'dark');};
window.dpHome=function(){if(window.self!==window.top){try{window.parent.postMessage({__dp3:true,type:'home'},'*');}catch(e){}}else{window.location.href='../../index.html';}};
window.addEventListener('message',function(e){var d=e.data;if(d&&d.__dp3&&d.type==='theme'&&d.theme){applyTheme(d.theme);}});
(function(){var p=null;try{p=new URLSearchParams(location.search).get('dptheme');}catch(e){}var s=null;try{s=localStorage.getItem('dp3-theme');}catch(e){}applyTheme(p||s||'dark');})();
function grow(el){ el.style.height='auto'; el.style.height=(el.scrollHeight)+'px'; }
var SK='dp3_billing';
var S={receipts:[],presets:[],seq:0,cur:null};
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function load(){ try{var d=JSON.parse(localStorage.getItem(SK)); if(d&&typeof d==='object')S=d;}catch(e){} if(!Array.isArray(S.receipts))S.receipts=[]; if(!Array.isArray(S.presets))S.presets=[]; if(typeof S.seq!=='number')S.seq=0; if(!Array.isArray(S.phrasePresets))S.phrasePresets=[];
}
var saveT=null, myTs=0, loaded=false;
function save(){ if(!loaded)return; clearTimeout(saveT); saveT=setTimeout(cloudPush,700); }
function cloudPush(){ try{ if(window.DPCloud&&window.DPCloud.configured&&window.DPCloud.currentUser&&window.DPCloud.currentUser()){ myTs=Date.now(); window.DPCloud.saveState('billing',S,myTs).catch(function(e){console.warn('[3DBilling] guardado en nube falló:',e&&(e.message||e));}); } else if(window.DPCloud&&window.DPCloud.configured){ console.warn('[3DBilling] sin sesión de Firebase: no se puede guardar.'); } }catch(e){} }
function eur(n){ n=Number(n)||0; return n.toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2})+' €'; }
function esc(s){var d=document.createElement('div');d.appendChild(document.createTextNode(s==null?'':String(s)));return d.innerHTML;}
function preset(id){ return S.presets.filter(function(p){return p.id===id;})[0] || S.presets[0] || {company:'SILAB3D',slogan:'',logo:''}; }
function cur(){ return S.receipts.filter(function(r){return r.id===S.cur;})[0] || null; }
function lnUnits(l){ var u=l&&l.units; if(u===''||u==null)return 1; var n=Number(String(u).replace(',','.')); return isNaN(n)?1:n; }
function lnAmount(l){ var a=Number(String((l&&l.amount!=null)?l.amount:'').replace(',','.')); return isNaN(a)?0:a; }
function lineImporte(l){ return lnAmount(l)*lnUnits(l); }
function total(r){ var t=0; (r.lines||[]).forEach(function(l){ t+=lineImporte(l); }); return t; }
function todayISO(){ var d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function newReceipt(){ if(!loaded){return;} billView=null;
  S.seq=(S.seq||0)+1; var y=new Date().getFullYear(); var num='SL-'+y+'-'+String(S.seq).padStart(3,'0');
  var r={id:uid(),number:num,date:todayISO(),docType:'Recibo',presetId:(S.presets[0]&&S.presets[0].id)||'',notes:[{id:uid(),text:DEFAULT_TERMS,on:true}],client:{name:'',email:''},
    lines:[{name:'',desc:'',materials:'',units:1,amount:0}],created:Date.now()};
  S.receipts.unshift(r); S.cur=r.id; save(); renderSidebar(); renderSheet(); if(window.innerWidth<=760)document.body.classList.add('side-off');
}
function selectReceipt(id){ billView=null; S.cur=id; renderSidebar(); renderSheet(); if(window.innerWidth<=760)document.body.classList.add('side-off'); }
function deleteReceipt(id,ev){ if(ev)ev.stopPropagation(); if(!confirm('¿Eliminar este recibo?'))return; S.receipts=S.receipts.filter(function(r){return r.id!==id;}); if(S.cur===id)S.cur=(S.receipts[0]&&S.receipts[0].id)||null; save(); renderSidebar(); renderSheet(); }
function duplicateReceipt(){ var r=cur(); if(!r)return; S.seq=(S.seq||0)+1; var y=new Date().getFullYear(); var c=JSON.parse(JSON.stringify(r)); c.id=uid(); c.number='SL-'+y+'-'+String(S.seq).padStart(3,'0'); c.date=todayISO(); c.created=Date.now(); S.receipts.unshift(c); S.cur=c.id; save(); renderSidebar(); renderSheet(); }
function importFromCalc(){
  var raw=null; try{ raw=sessionStorage.getItem('dp3-billing-import'); }catch(e){}
  if(!raw)return; try{ sessionStorage.removeItem('dp3-billing-import'); }catch(e){}
  var p=null; try{ p=JSON.parse(raw); }catch(e){}
  if(!p||!Array.isArray(p.lines)||!p.lines.length)return;
  S.seq=(S.seq||0)+1; var y=new Date().getFullYear(); var num='SL-'+y+'-'+String(S.seq).padStart(3,'0');
  var r={id:uid(),number:num,date:todayISO(),docType:(p.docType==='Recibo'?'Recibo':'Presupuesto'),presetId:(S.presets[0]&&S.presets[0].id)||'',notes:[{id:uid(),text:DEFAULT_TERMS,on:true}],client:{name:(p.client&&p.client.name)||'',email:(p.client&&p.client.email)||''},
    lines:p.lines.map(function(l){ return {name:String(l.name||''),desc:String(l.desc||''),materials:String(l.materials||''),units:(l.units==null?1:l.units),amount:(Number(l.amount)||0)}; }),created:Date.now()};
  S.receipts.unshift(r); S.cur=r.id; billView=null; save(); renderSidebar(); renderSheet();
}
var billView='dash', billExp={r:true,p:true};
var IC_DASH='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>';
var IC_DOC='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/></svg>';
function toggleSide(){ document.body.classList.toggle('side-off'); }
function toggleGrp(k){ billExp[k]=!billExp[k]; renderSidebar(); }
function goDash(){ billView='dash'; renderSidebar(); renderSheet(); if(window.innerWidth<=760)document.body.classList.add('side-off'); }
function renderSidebar(){
  var el=document.getElementById('rlist'); if(!el)return;
  var recs=S.receipts.filter(function(r){return (r.docType||'Recibo')!=='Presupuesto';});
  var pres=S.receipts.filter(function(r){return (r.docType||'Recibo')==='Presupuesto';});
  function leaf(r){ return '<div class="bitem doc'+((billView!=='dash'&&r.id===S.cur)?' on':'')+'" onclick="selectReceipt(\''+r.id+'\')"><span class="bic">'+IC_DOC+'</span><span class="bi-main"><span class="bi-num">'+esc(r.number)+'</span><span class="bi-sub">'+esc(r.client&&r.client.name?r.client.name:'Sin cliente')+'</span></span><span class="bi-tot">'+eur(total(r))+'</span><button class="bi-del" onclick="deleteReceipt(\''+r.id+'\',event)" title="Eliminar">✕</button></div>'; }
  function grp(title,key,arr){ var op=billExp[key]; var x='<div class="bgrp'+(op?' op':'')+'" onclick="toggleGrp(\''+key+'\')"><span class="bg-car">▶</span>'+title+'<span class="bg-n">'+arr.length+'</span></div>'; if(op){ x+= arr.length?arr.map(leaf).join(''):'<div class="bgrp-empty">Ninguno</div>'; } return x; }
  var html='<div class="bitem dash'+(billView==='dash'?' on':'')+'" onclick="goDash()"><span class="bic">'+IC_DASH+'</span>Dashboard</div>';
  html+=grp('Recibos','r',recs)+grp('Presupuestos','p',pres);
  el.innerHTML=html;
}
function renderBillDash(){
  var main=document.getElementById('main'); if(!main)return;
  var recs=S.receipts.filter(function(r){return (r.docType||'Recibo')!=='Presupuesto';});
  var pres=S.receipts.filter(function(r){return (r.docType||'Recibo')==='Presupuesto';});
  var tR=recs.reduce(function(a,r){return a+total(r);},0), tP=pres.reduce(function(a,r){return a+total(r);},0);
  var recent=S.receipts.slice().sort(function(a,b){return String(b.date||'').localeCompare(String(a.date||''));}).slice(0,8);
  var h='<div class="bdash"><h1 class="bd-h1">Panel de 3DBilling</h1><p class="bd-sub">Resumen de tus recibos y presupuestos.</p>';
  h+='<div class="bd-stats"><div class="bd-stat"><b>'+recs.length+'</b><span>Recibos</span></div><div class="bd-stat"><b>'+pres.length+'</b><span>Presupuestos</span></div><div class="bd-stat"><b>'+eur(tR)+'</b><span>Total recibos</span></div><div class="bd-stat"><b>'+eur(tP)+'</b><span>Total presupuestos</span></div></div>';
  h+='<div class="bd-actions"><button class="cta-d" onclick="newReceipt()">＋ Nuevo documento</button></div>';
  h+='<h2 class="bd-h2">Documentos recientes</h2><div class="bd-list">';
  if(recent.length){ recent.forEach(function(r){ h+='<div class="bd-row" onclick="selectReceipt(\''+r.id+'\')"><span class="bd-rtype">'+esc(r.docType||'Recibo')+'</span><span class="bd-rn">'+esc(r.number)+'</span><span class="bd-rc">'+esc(r.client&&r.client.name?r.client.name:'Sin cliente')+'</span><span class="bd-rt">'+eur(total(r))+'</span></div>'; }); }
  else { h+='<div class="bd-empty">Aún no hay documentos. Crea el primero con “Nuevo documento”.</div>'; }
  h+='</div></div>';
  main.innerHTML=h;
}
function upd(field,val){ var r=cur(); if(!r)return; if(field==='client.name')r.client.name=val; else if(field==='client.email')r.client.email=val; else if(field==='date')r.date=val; else if(field==='number')r.number=val; save(); renderSidebar(); }
function updLine(i,field,val){ var r=cur(); if(!r||!r.lines[i])return; r.lines[i][field]=val; if(field==='amount'||field==='units'){ var ic=document.getElementById('imp-'+i); if(ic)ic.textContent=eur(lineImporte(r.lines[i])); var tv=document.getElementById('docTotal'); if(tv)tv.textContent=eur(total(r)); var _h=eur(total(r)*0.5); document.querySelectorAll('.dn-auto').forEach(function(el){ el.textContent=_h; }); renderSidebar(); } save(); }
function addLine(){ var r=cur(); if(!r)return; r.lines.push({name:'',desc:'',materials:'',units:1,amount:0}); save(); renderSheet(); }
function removeLine(i){ var r=cur(); if(!r)return; r.lines.splice(i,1); if(!r.lines.length)r.lines.push({name:'',desc:'',materials:'',units:1,amount:0}); save(); renderSheet(); renderSidebar(); }
function logoHTML(p){
  if(p&&p.logo){ return '<img src="'+p.logo+'" alt="logo">'; }
  return '<img src="logo.png" alt="logo" onerror="this.style.display=\'none\';this.nextSibling.style.display=\'flex\'">'
    +'<span style="display:none;align-items:center;justify-content:center;width:100%;height:100%;color:#bbb">'
    +'<svg width="58" height="58" viewBox="0 0 64 64" fill="none" stroke="#1a1a1a" stroke-width="2"><path d="M8 16H24M40 16h16M8 16v32M56 16v32M20 28h12M36 28h8M22 22h20v12l-6 6h-8l-6-6zM30 12h4v10h-4zM28 44h8M30 44l2 4 2-4M8 48h22l-6-6M56 48H40l-6 6"/></svg></span>';
}
function renderSheet(){
  var main=document.getElementById('main'); var r=cur();
  try{ renderPresetList(); renderPhrasePresetList(); }catch(e){}
  if(billView==='dash'||!r){ renderBillDash(); return; }
  var p=preset(r.presetId);
  if(!Array.isArray(r.notes)){ r.notes=[{id:uid(),text:DEFAULT_TERMS,on:true}]; save(); }
  var rows=r.lines.map(function(l,i){
    return '<tr>'
      +'<td class="cell-name" data-label="Pedido"><textarea rows="1" class="gr" placeholder="Nombre del pedido" oninput="grow(this);updLine('+i+',\'name\',this.value)">'+esc(l.name)+'</textarea></td>'
      +'<td class="cell-sub" data-label="Descripción"><textarea rows="1" class="gr" placeholder="Descripción" oninput="grow(this);updLine('+i+',\'desc\',this.value)">'+esc(l.desc)+'</textarea></td>'
      +'<td class="cell-sub" data-label="Material / color"><textarea rows="1" class="gr" placeholder="Material / color" oninput="grow(this);updLine('+i+',\'materials\',this.value)">'+esc(l.materials)+'</textarea></td>'
      +'<td class="u" data-label="Uds."><textarea rows="1" class="gr" oninput="grow(this);updLine('+i+',\'units\',this.value)">'+esc(l.units)+'</textarea></td>'
      +'<td class="num" data-label="P. unit."><textarea rows="1" class="gr" inputmode="decimal" placeholder="0,00" oninput="grow(this);updLine('+i+',\'amount\',this.value.replace(\',\',\'.\'))">'+esc(l.amount)+'</textarea></td>'
      +'<td class="num imp" id="imp-'+i+'" data-label="Importe">'+eur(lineImporte(l))+'</td>'
      +'<td class="x"><button class="row-del" onclick="removeLine('+i+')" title="Quitar">✕</button></td></tr>';
  }).join('');
  main.innerHTML='<div class="sheet">'
    +'<div class="doc-head"><div class="dh-brand"><div class="dh-logo">'+logoHTML(p)+'</div>'
      +'<div><div class="dh-company">'+esc(p.company||'SILAB3D')+'</div><div class="dh-slogan">'+esc(p.slogan||'')+'</div></div></div>'

      +'<div class="dh-num"><textarea rows="1" class="gr" oninput="grow(this);upd(\'number\',this.value)">'+esc(r.number)+'</textarea></div>'

    +'<div class="doc-client"><div class="dc-field"><label>Cliente</label><textarea rows="1" class="gr" placeholder="Nombre del cliente" oninput="grow(this);upd(\'client.name\',this.value)">'+esc(r.client.name)+'</textarea></div>'

    +'<table class="lines"><thead><tr><th>Pedido</th><th>Descripción</th><th>Material / color</th><th class="u">Uds.</th><th class="num">P. unit.</th><th class="num">Importe</th><th class="x"></th></tr></thead><tbody>'+rows+'</tbody></table>'
    +'<button class="add-line" onclick="addLine()"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg> Añadir pedido</button>'
    +'<div class="doc-total"><span class="dt-label">Total</span><span class="dt-value" id="docTotal">'+eur(total(r))+'</span></div>'

  setTimeout(function(){ document.querySelectorAll('.sheet .gr').forEach(function(t){ grow(t); }); },0);
}
function toggleDocType(){ var r=cur(); if(!r)return; r.docType=(r.docType==='Presupuesto')?'Recibo':'Presupuesto'; save(); renderSheet(); }
function setDocType(v){ var r=cur(); if(!r)return; r.docType=(v==='Presupuesto')?'Presupuesto':'Recibo'; save(); renderSheet(); }
var DEFAULT_TERMS='Nuestros términos y condiciones generales están disponibles en silab3d.com y se aplican a este documento.';
function phrasesHTML(r){
  var notes=Array.isArray(r.notes)?r.notes:[];
  var rows=notes.map(function(n){
    return '<div class="dn-row'+(n.on?'':' dn-off')+'">'
      +'<input type="checkbox" class="dn-chk no-print" '+(n.on?'checked':'')+' onchange="togglePhrase(\''+n.id+'\')" title="Incluir esta frase en el documento">'
      +'<textarea rows="1" class="gr dn-ta" placeholder="Escribe una frase…" oninput="grow(this);setPhraseText(\''+n.id+'\',this.value)">'+esc(n.text)+'</textarea>'
      +(n.auto==='pct50'?'<span class="dn-auto" title="50% del total (automático)">'+eur(total(r)*0.5)+'</span>':'')+'<button class="row-del no-print" onclick="delPhrase(\''+n.id+'\')" title="Quitar frase">✕</button></div>';
  }).join('');
  return '<div class="doc-notes"><div class="dn-head no-print">Frases del documento — marca la casilla para incluir cada frase</div>'+rows+'<div class="dn-addrow no-print"><button class="add-line" onclick="addPhrase()"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg> Añadir frase</button><button class="add-line" onclick="addPhrasePct()" title="Frase con el 50% del total, automático"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg> 50% del total</button></div></div>';
}
function addPhrase(){ var r=cur(); if(!r)return; if(!Array.isArray(r.notes))r.notes=[]; r.notes.push({id:uid(),text:'',on:true}); save(); renderSheet(); }
function setPhraseText(id,v){ var r=cur(); if(!r||!Array.isArray(r.notes))return; var n=r.notes.filter(function(x){return x.id===id;})[0]; if(n){ n.text=v; save(); } }
function togglePhrase(id){ var r=cur(); if(!r||!Array.isArray(r.notes))return; var n=r.notes.filter(function(x){return x.id===id;})[0]; if(n){ n.on=!n.on; save(); renderSheet(); } }
function delPhrase(id){ var r=cur(); if(!r)return; r.notes=(r.notes||[]).filter(function(x){return x.id!==id;}); save(); renderSheet(); }
function addPhrasePct(){ var r=cur(); if(!r)return; if(!Array.isArray(r.notes))r.notes=[]; r.notes.push({id:uid(),text:'Importe a abonar (50% del total):',on:true,auto:'pct50'}); save(); renderSheet(); }
var phrasePresetOpen=false;
function togglePhrasePresets(){ phrasePresetOpen=!phrasePresetOpen; renderSheet(); }
function phrasePresetPanel(){ if(!phrasePresetOpen)return ''; var pr=S.phrasePresets||[]; var x='<div class="dn-pop no-print"><button class="dn-pp-save" onclick="savePhrasePreset()">+ Guardar las frases actuales como preset</button>'; if(pr.length){ x+='<div class="dn-pp-list">'; pr.forEach(function(pp){ x+='<div class="dn-pp-item"><button class="dn-pp-apply" onclick="applyPhrasePreset(\''+pp.id+'\')">'+esc(pp.name)+'<span class="dn-pp-n">'+((pp.notes&&pp.notes.length)||0)+' frases</span></button><button class="dn-pp-del" onclick="delPhrasePreset(\''+pp.id+'\')" title="Eliminar preset">✕</button></div>'; }); x+='</div>'; } else { x+='<div class="dn-pp-empty">No hay presets de frases guardados.</div>'; } x+='</div>'; return x; }
function savePhrasePreset(){ var r=cur(); if(!r)return; var notes=Array.isArray(r.notes)?r.notes:[]; if(!notes.length){ alert('Este documento no tiene frases que guardar.'); return; } var n=prompt('Nombre del preset de frases:'); if(n==null)return; n=n.trim(); if(!n)return; if(!Array.isArray(S.phrasePresets))S.phrasePresets=[]; S.phrasePresets.push({id:uid(),name:n,notes:notes.map(function(x){return {text:x.text,on:x.on!==false,auto:x.auto||null};})}); save(); renderPhrasePresetList(); toggleOpenDock(); }
function applyPhrasePreset(id){ var r=cur(); if(!r)return; var pr=(S.phrasePresets||[]).filter(function(x){return x.id===id;})[0]; if(!pr)return; if((r.notes&&r.notes.length) && !confirm('Se reemplazar\u00e1n las frases actuales del documento por el preset "'+pr.name+'". \u00bfContinuar?'))return; r.notes=(pr.notes||[]).map(function(x){return {id:uid(),text:x.text,on:x.on!==false,auto:x.auto||null};}); save(); renderSheet(); renderPhrasePresetList(); }
function delPhrasePreset(id,ev){ if(ev)ev.stopPropagation(); if(!Array.isArray(S.phrasePresets))return; var pr=S.phrasePresets.filter(function(x){return x.id===id;})[0]; if(!pr)return; if(!confirm('\u00bfEliminar el preset "'+pr.name+'"?'))return; S.phrasePresets=S.phrasePresets.filter(function(x){return x.id!==id;}); save(); renderPhrasePresetList(); }
function renderPhrasePresetList(){ var el=document.getElementById('phrasePresetList'); if(!el)return; var pr=S.phrasePresets||[]; el.innerHTML = pr.length ? pr.map(function(p){ return '<div class="preset-row" onclick="applyPhrasePreset(\''+p.id+'\')"><div class="pr-info"><div class="pr-name">'+esc(p.name)+'</div><div class="pr-meta">'+((p.notes&&p.notes.length)||0)+' frases</div></div><button class="pr-del" onclick="delPhrasePreset(\''+p.id+'\',event)" title="Eliminar">\u2715</button></div>'; }).join('') : '<div class="dock-empty">A\u00fan no hay presets de frases.</div>'; }
function toggleDock(){ document.body.classList.toggle('dock-open'); }
function toggleOpenDock(){ if(window.innerWidth<=980) document.body.classList.add('dock-open'); }
function printPDF(){ var r=cur(); if(!r){alert('Crea o selecciona un recibo primero.');return;} var old=document.title; document.title=(r.number||'documento'); var restore=function(){document.title=old; window.removeEventListener('afterprint',restore);}; window.addEventListener('afterprint',restore); setTimeout(restore,2000); window.print(); }
var pfLogo='';
function openPresets(){ pfLogo=''; document.getElementById('pf-name').value=''; document.getElementById('pf-company').value=''; document.getElementById('pf-slogan').value=''; document.getElementById('pf-prev').textContent='—'; renderPresetList(); document.getElementById('presetVeil').classList.add('open'); }
function closePresets(){ document.getElementById('presetVeil').classList.remove('open'); }
function renderPresetList(){
  var r=cur(); var curId=r?r.presetId:null;
  document.getElementById('presetList').innerHTML=S.presets.map(function(p){
    var lg=p.logo?'<img src="'+p.logo+'">':'<span style="color:var(--t3);font-size:18px">🏷️</span>';
    return '<div class="preset-row'+(p.id===curId?' on':'')+'" onclick="applyPreset(\''+p.id+'\')">'
      +'<div class="pr-logo">'+lg+'</div>'
      +'<div class="pr-info"><div class="pr-name">'+esc(p.name)+'</div><div class="pr-meta">'+esc(p.company)+' · '+esc(p.slogan||'')+'</div></div>'
      +'<button class="pr-del" onclick="delPreset(\''+p.id+'\',event)" title="Eliminar">✕</button>'
      +'</div>';
  }).join('');
}
function applyPreset(id){ var r=cur(); if(r){ r.presetId=id; save(); renderSheet(); } renderPresetList(); }
function delPreset(id,ev){ if(ev)ev.stopPropagation(); if(!confirm('¿Eliminar este preset?'))return; S.presets=S.presets.filter(function(p){return p.id!==id;}); S.receipts.forEach(function(r){ if(r.presetId===id)r.presetId=(S.presets[0]&&S.presets[0].id)||''; }); save(); renderPresetList(); renderSheet(); }
function savePreset(){
  var name=document.getElementById('pf-name').value.trim(); var company=document.getElementById('pf-company').value.trim(); var slogan=document.getElementById('pf-slogan').value.trim();
  if(!name||!company){ alert('Pon al menos nombre del preset y empresa.'); return; }
  S.presets.push({id:uid(),name:name,company:company,slogan:slogan,logo:pfLogo||''});
  save(); pfLogo=''; document.getElementById('pf-name').value=''; document.getElementById('pf-company').value=''; document.getElementById('pf-slogan').value=''; document.getElementById('pf-prev').textContent='—'; renderPresetList();
}
document.getElementById('pf-logo').addEventListener('change',function(e){ var f=e.target.files&&e.target.files[0]; if(!f)return; var rd=new FileReader(); rd.onload=function(){ pfLogo=rd.result; document.getElementById('pf-prev').innerHTML='<img src="'+pfLogo+'">'; }; rd.readAsDataURL(f); });
function normBilling(){ if(!Array.isArray(S.receipts))S.receipts=[]; if(!Array.isArray(S.presets))S.presets=[]; if(typeof S.seq!=='number')S.seq=0; if(!S.cur||!S.receipts.filter(function(r){return r.id===S.cur;})[0])S.cur=(S.receipts[0]&&S.receipts[0].id)||null; if(!Array.isArray(S.phrasePresets))S.phrasePresets=[]; }
function _purgeLocal(){ try{ localStorage.removeItem(SK); localStorage.removeItem(SK+'_ts'); }catch(e){} }
(function(){
  function _msg(h,p){ var m=document.getElementById('main'); if(m&&!loaded)m.innerHTML='<div class="empty"><div class="e-ic">\u2601\ufe0f</div><h3>'+h+'</h3><p>'+p+'</p></div>'; var rl=document.getElementById('rlist'); if(rl&&!loaded)rl.innerHTML=''; }
  _msg('Cargando tus datos\u2026','Conectando con tu cuenta de Firebase.');
  var _sub=false, _first=true;
  function applyRemote(d){
    var hasCloud = d && d.data && typeof d.data==='object' && Array.isArray(d.data.receipts) && d.data.receipts.length>0;
    if(_first){
      _first=false;
      if(hasCloud){ S=d.data; normBilling(); loaded=true; renderSidebar(); renderSheet(); _purgeLocal(); try{importFromCalc();}catch(e){} return; }
      var old=null; try{ old=JSON.parse(localStorage.getItem(SK)); }catch(e){}
      if(old && typeof old==='object' && Array.isArray(old.receipts) && old.receipts.length){ S=old; normBilling(); loaded=true; renderSidebar(); renderSheet(); try{importFromCalc();}catch(e){} cloudPush(); return; }
      if(d && d.data && typeof d.data==='object') S=d.data;
      normBilling(); loaded=true; renderSidebar(); renderSheet(); try{importFromCalc();}catch(e){} return;
    }
    if(!d||!d.data||typeof d.data!=='object')return;
    if((d.updated||0)<=myTs)return;
    S=d.data; normBilling(); renderSidebar(); renderSheet();
  }
  function startCloud(){
    try{ window.DPCloud.onAuth(function(_u){
      if(!_u||_sub)return; _sub=true;
      if(window.DPCloud.watchState){ window.DPCloud.watchState('billing', applyRemote); }
      else { window.DPCloud.loadState('billing').then(function(data){ applyRemote(data?{data:data,updated:Date.now()}:null); }).catch(function(){ loaded=true; renderSidebar(); renderSheet(); }); }
    }); }catch(e){}
    setTimeout(function(){ if(!loaded) _msg('Inicia sesi\u00f3n para ver tus datos','Vuelve al inicio de la suite e inicia sesi\u00f3n. Si ya lo hiciste, recarga con Ctrl+Shift+R.'); }, 8000);
  }
  var w=0;(function c(){ if(window.DPCloud&&window.DPCloud.onAuth){ startCloud(); } else if(w<10000){ w+=150; setTimeout(c,150); } else { _msg('No se pudo conectar con Firebase','Recarga la p\u00e1gina (Ctrl+Shift+R).'); } })();
})();
</script>

<script>
/* Ayuda contextual de la app (icono ? en el banner superior) */
(function(){
  if(window.DPHelp) return;
  var C={"title": "3DBilling", "accent": "#F4B740", "tagline": "Recibos en PDF", "sections": [{"h": "Qué es", "p": "Crea recibos que agrupan varios pedidos, con cabecera y logo, total automático y exportación a PDF."}, {"h": "Primeros pasos", "steps": ["Añade tus datos y tu logo en la cabecera.", "Añade líneas o pedidos con su importe.", "Revisa el total calculado.", "Exporta el recibo a PDF."]}, {"h": "Funciones clave", "defs": [["Cabecera con logo", "Personaliza el encabezado del recibo."], ["Varias líneas", "Agrupa múltiples pedidos en un mismo recibo."], ["Total automático", "Se suma solo al añadir importes."], ["Exportar PDF", "Documento listo para enviar."]]}]};
  var CSS=".dph-veil{position:fixed;inset:0;z-index:99998;display:none;align-items:center;justify-content:center;padding:20px;background:rgba(6,8,15,.66);-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px)}.dph-veil.open{display:flex}.dph-modal{width:min(660px,96vw);max-height:88vh;overflow:auto;background:#12141d;color:#e7eaf2;border:1px solid rgba(255,255,255,.1);border-radius:16px;box-shadow:0 30px 90px rgba(0,0,0,.6);font-family:'Outfit',system-ui,-apple-system,sans-serif;font-size:14px;line-height:1.55}[data-theme=light] .dph-modal{background:#fff;color:#1b1e27;border-color:rgba(0,0,0,.1)}.dph-hd{position:sticky;top:0;display:flex;align-items:center;gap:11px;padding:15px 18px;background:inherit;border-bottom:1px solid rgba(255,255,255,.09);border-radius:16px 16px 0 0}[data-theme=light] .dph-hd{border-color:rgba(0,0,0,.09)}.dph-ic{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff}.dph-ti{font-weight:700;font-size:16px}.dph-tg{font-size:12px;opacity:.7}.dph-x{margin-left:auto;border:none;background:transparent;color:inherit;opacity:.55;font-size:22px;cursor:pointer;line-height:1;padding:0 4px}.dph-x:hover{opacity:1}.dph-bd{padding:4px 18px 20px}.dph-sec{margin-top:15px}.dph-h{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;opacity:.6;margin-bottom:5px}.dph-p{margin:0 0 3px}.dph-bd ul,.dph-bd ol{margin:4px 0 0;padding-left:20px}.dph-bd li{margin:3px 0}.dph-def{display:flex;gap:10px;margin:5px 0}.dph-def b{flex-shrink:0;min-width:130px}";
  var HDIC="<svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"9.3\"/><path d=\"M9.3 9.2a2.8 2.8 0 0 1 5.4 1c0 1.9-2.7 2.2-2.7 4\"/><circle cx=\"12\" cy=\"17.3\" r=\".6\" fill=\"currentColor\"/></svg>";
  function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function render(){
    var h='<div class="dph-modal" role="dialog" aria-modal="true" aria-label="Ayuda">';
    h+='<div class="dph-hd"><span class="dph-ic" style="background:'+(C.accent||'#5b8cff')+'">'+HDIC+'</span><div><div class="dph-ti">'+esc(C.title)+'</div><div class="dph-tg">'+esc(C.tagline||'')+'</div></div><button class="dph-x" aria-label="Cerrar" title="Cerrar">&times;</button></div>';

      h+='</div>';
    });

  }
  var veil=null;

    var st=document.createElement('style'); st.textContent=CSS; document.head.appendChild(st);

  }
  function open(){ ensure(); veil.innerHTML=render(); var x=veil.querySelector('.dph-x'); if(x)x.addEventListener('click',close); veil.classList.add('open'); }

})();
