<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>3DStock — SILAB3D</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@1&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script type="module" src="../../firebase/dpcloud.js"></script>
<style>
:root{ --bg:#0A0B12; --panel:#0E1018; --glass:rgba(255,255,255,.04); --border:rgba(255,255,255,.09); --t1:#E8EBF4; --t2:#8A90A6; --t3:#5C6274; --ac:#22D3EE; --ac2:#0EA5C4; }
[data-theme=light]{ --bg:#F5F6FA; --panel:#FFFFFF; --glass:rgba(0,0,0,.03); --border:rgba(0,0,0,.10); --t1:#1A1C24; --t2:#5A6172; --t3:#AEB4C2; }
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Outfit',system-ui,sans-serif;background:var(--bg);color:var(--t1)}
button{font-family:inherit;cursor:pointer}
input,select{font-family:inherit}
.appbar{position:fixed;top:0;left:0;right:0;height:52px;z-index:9500;display:flex;align-items:center;gap:9px;padding:0 14px;background:rgba(10,11,18,.82);-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);border-bottom:1px solid rgba(255,255,255,.08)}
[data-theme=light] .appbar{background:rgba(255,255,255,.86);border-bottom:1px solid rgba(0,0,0,.08)}
.ab-ic-btn{width:34px;height:34px;border-radius:9px;border:1px solid var(--border);background:transparent;color:var(--t1);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ab-ic-btn:hover{background:var(--glass)}
.ab-app{display:flex;align-items:center;gap:8px;flex-shrink:0}
.ab-appic{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:rgba(34,211,238,.14);border:1px solid rgba(34,211,238,.32)}
.ab-name{font-weight:700;font-size:15px;letter-spacing:-.2px}
.ab-back{display:flex;align-items:center;gap:6px;height:32px;padding:0 12px 0 9px;border-radius:9px;border:1px solid var(--border);background:transparent;color:var(--t1);font:500 12.5px 'Outfit',sans-serif;flex-shrink:0}
.ab-back:hover{background:var(--glass)}
.ab-sp{flex:1}
.ab-upd{font-size:11px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ab-theme{width:34px;height:34px;border-radius:9px;border:1px solid var(--border);background:transparent;color:var(--t1);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ab-theme:hover{background:var(--glass)}
.layout{position:fixed;top:52px;left:0;right:0;bottom:0;display:flex}
.side{width:230px;flex-shrink:0;border-right:1px solid var(--border);background:var(--panel);display:flex;flex-direction:column;padding:14px 12px;overflow-y:auto;transition:margin-left .25s ease}
body.side-off .side{margin-left:-231px}
.nav-h{font-size:10.5px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--t2);margin:6px 4px 8px}
.nav{display:flex;flex-direction:column;gap:3px}
.nav a{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;color:var(--t2);font-size:13.5px;font-weight:500;cursor:pointer;transition:background .15s,color .15s}
.nav a:hover{background:var(--glass);color:var(--t1)}
.nav a.on{background:rgba(34,211,238,.10);color:var(--ac);border:1px solid rgba(34,211,238,.22)}
.nav a svg{flex-shrink:0}
.badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 5px;border-radius:9px;background:#F4B740;color:#3a2400;font-size:10.5px;font-weight:800;margin-left:auto}
.side-note{margin-top:auto;font-size:11px;color:var(--t3);line-height:1.5;padding:12px 4px 0;border-top:1px solid var(--border)}
.main{flex:1;overflow:auto}
.wrap{max-width:980px;margin:0 auto;padding:24px 22px 60px}
.h1{font-family:'DM Serif Display',serif;font-style:italic;font-size:26px;margin-bottom:4px}
.h-sub{color:var(--t2);font-size:13px;margin-bottom:18px}
.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.kpi{background:var(--glass);border:1px solid var(--border);border-radius:13px;padding:13px 15px;text-align:center}
.kpi .v{font-size:20px;font-weight:800}
.kpi .l{font-size:11px;color:var(--t2)}
.toolrow{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.inp{flex:1;min-width:160px;background:var(--glass);border:1px solid var(--border);border-radius:10px;padding:9px 12px;font-size:13.5px;color:var(--t1);outline:none}
.inp:focus{border-color:var(--ac)}
.selx{background:var(--glass);border:1px solid var(--border);border-radius:10px;padding:9px 12px;font-size:13px;color:var(--t1);outline:none}
select.selx{color:var(--t1)}option{background:#161922;color:#E8EBF4}
[data-theme=light] option{background:#fff;color:#1A1C24}
.card{background:var(--glass);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.row{display:flex;align-items:center;gap:12px;padding:11px 14px;border-bottom:1px solid var(--border)}
.row:last-child{border-bottom:none}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.dot.av{background:#34D399;box-shadow:0 0 8px rgba(52,211,153,.5)}
.dot.no{background:#FF6B6B}
.thumb{width:38px;height:38px;border-radius:9px;object-fit:cover;background:#fff;flex-shrink:0}
.rmain{flex:1;min-width:0}
.rname{font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rsub{font-size:11.5px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rprice{font-size:13.5px;font-weight:700;flex-shrink:0}
.rprice s{color:var(--t3);font-weight:400;font-size:11px;margin-right:5px}
.star{width:32px;height:32px;border-radius:9px;border:1px solid var(--border);background:transparent;color:var(--t3);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px}
.star:hover{border-color:#F4B740;color:#F4B740}
.star.on{background:rgba(244,183,64,.14);border-color:rgba(244,183,64,.4);color:#F4B740}
.lnk{width:32px;height:32px;border-radius:9px;border:1px solid var(--border);color:var(--t3);display:flex;align-items:center;justify-content:center;flex-shrink:0;text-decoration:none}
.lnk:hover{color:var(--ac);border-color:var(--ac)}
.chip{display:inline-flex;align-items:center;font-size:10px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;padding:3px 9px;border-radius:20px;flex-shrink:0}
.c-repuesto{background:rgba(52,211,153,.14);color:#34D399;border:1px solid rgba(52,211,153,.35)}
.c-agotado{background:rgba(255,107,107,.12);color:#FF6B6B;border:1px solid rgba(255,107,107,.35)}
.c-precio{background:rgba(244,183,64,.12);color:#F4B740;border:1px solid rgba(244,183,64,.35)}
.c-nuevo{background:rgba(77,159,255,.12);color:#4D9FFF;border:1px solid rgba(77,159,255,.35)}
.c-retirado{background:rgba(255,255,255,.07);color:var(--t2);border:1px solid var(--border)}
.rdate{font-size:11px;color:var(--t3);flex-shrink:0;white-space:nowrap}
.row.unseen{background:rgba(34,211,238,.05);box-shadow:inset 3px 0 0 var(--ac)}
.empty{text-align:center;color:var(--t2);font-size:13.5px;padding:34px 14px;line-height:1.6}
.btn{height:36px;padding:0 16px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--t1);font:600 12.5px 'Outfit',sans-serif}
.btn:hover{background:var(--glass)}
.btn.pri{border:none;background:linear-gradient(120deg,var(--ac),var(--ac2));color:#06272e}
.sec-h{font-size:14px;font-weight:700;margin:22px 0 10px}
.note{font-size:12px;color:var(--t3);line-height:1.55;margin-top:10px}
.cat-h{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;font-size:15px;font-weight:800;margin:18px 2px 8px}
.cat-h .cat-n{font-size:11.5px;color:var(--t2);font-weight:500}
.sub-h{font-size:10.5px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;padding:8px 14px;border-bottom:1px solid var(--border);background:rgba(255,255,255,.02)}
.sub-h.ok{color:#34D399}.sub-h.ko{color:#FF6B6B}
@media(max-width:760px){
  .side{position:fixed;top:52px;bottom:0;left:0;z-index:60;width:78vw;max-width:280px;margin-left:0;transform:translateX(0);transition:transform .25s ease;box-shadow:8px 0 30px rgba(0,0,0,.4)}
  body.side-off .side{transform:translateX(-101%);margin-left:0}
  .wrap{padding:16px 12px 50px}
  .kpis{grid-template-columns:repeat(3,1fr);gap:8px}
  .ab-name{display:none}.ab-bktx{display:none}.ab-back{padding:0 9px}.ab-upd{display:none}
  .row{flex-wrap:wrap}.rmain{flex:1 1 55%}
}
</style>
</head>
<body>
<div class="appbar">
  <button class="ab-ic-btn" onclick="document.body.classList.toggle('side-off')" title="Mostrar u ocultar el menú"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg></button>
  <span class="ab-app"><span class="ab-appic"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#22D3EE" stroke-width="1.7"><circle cx="12" cy="12" r="8.6"/><circle cx="12" cy="12" r="3.1"/><path d="M20.6 12c0 4.6-8.6 4.6-8.6 0" stroke-linecap="round"/></svg></span><span class="ab-name">3DStock</span></span>
  <button class="ab-back" onclick="dpHome()" title="Volver a 3DProject"><svg width="12" height="12" viewBox="0 0 13 13" fill="none"><path d="M8 2.5L3.5 6.5L8 10.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg> <span class="ab-bktx">3DProject</span></button>
  <span class="ab-sp"></span>
  <span class="ab-upd" id="updChip"></span>
  <button class="ab-theme" id="dpThemeBtn" onclick="dpToggleTheme()" title="Cambiar tema" aria-label="Tema"></button>
</div>
<div class="layout">
  <aside class="side" id="side">
    <div class="nav-h">Navegación</div>
    <nav class="nav" id="nav">
      <a data-v="cat" onclick="go('cat')"><svg width="17" height="17" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="7.8"/><circle cx="11" cy="11" r="2.8"/><path d="M18.8 11c0 4.2-7.8 4.2-7.8 0" stroke-linecap="round"/></svg> Catálogo EU</a>
      <a data-v="log" onclick="go('log')"><svg width="17" height="17" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5h14M4 11h14M4 17h9"/><circle cx="18.2" cy="17" r="1.2" fill="currentColor" stroke="none"/></svg> Registro</a>
      <a data-v="avi" onclick="go('avi')"><svg width="17" height="17" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 3a5.5 5.5 0 0 0-5.5 5.5c0 4.2-1.6 5.5-1.6 5.5h14.2s-1.6-1.3-1.6-5.5A5.5 5.5 0 0 0 11 3z"/><path d="M9.3 17.5a1.9 1.9 0 0 0 3.4 0"/></svg> Avisos <span id="aviBadge"></span></a>
    </nav>
    <div class="side-note">Datos de <b>store.sunlu.com</b> (filamentos con envío a Europa). Se capturan automáticamente cada 6 horas mediante GitHub Actions.</div>
  </aside>
  <main class="main"><div class="wrap" id="view"></div></main>
</div>
<script>
/* ===== tema + shell ===== */
function tic(t){return t==='dark'
 ?'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4.3"/><path d="M12 2.5v2M12 19.5v2M2.5 12h2M19.5 12h2M5 5l1.4 1.4M17.6 17.6L19 19M19 5l-1.4 1.4M6.4 17.6L5 19"/></svg>'
 :'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>';}
function applyTheme(t){t=(t==='light')?'light':'dark';document.documentElement.setAttribute('data-theme',t);try{localStorage.setItem('dp3-theme',t);}catch(e){}var b=document.getElementById('dpThemeBtn');if(b)b.innerHTML=tic(t);if(window.self!==window.top){try{window.parent.postMessage({__dp3:true,type:'theme',theme:t},'*');}catch(e){}}}
window.dpToggleTheme=function(){applyTheme((document.documentElement.getAttribute('data-theme')||'dark')==='dark'?'light':'dark');};
window.dpHome=function(){if(window.self!==window.top){try{window.parent.postMessage({__dp3:true,type:'home'},'*');}catch(e){}}else{window.location.href='../../index.html';}};
window.addEventListener('message',function(e){var d=e.data;if(d&&d.__dp3&&d.type==='theme'&&d.theme){applyTheme(d.theme);}});
(function(){var p=null;try{p=new URLSearchParams(location.search).get('dptheme');}catch(e){}var s=null;try{s=localStorage.getItem('dp3-theme');}catch(e){}applyTheme(p||s||'dark');})();

/* ===== estado ===== */
var S={watch:{},lastSeen:0};
var view='cat', Q='', LQ='', LT='all', AQ='';
var SOND=false;
var LIVE=false, liveBusy=false;
var DATA=null, CH=[];
var loaded=false, saveT=null, myTs=0;
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function norm(){ if(!S||typeof S!=='object')S={}; if(!S.watch||typeof S.watch!=='object')S.watch={}; if(typeof S.lastSeen!=='number')S.lastSeen=0; }
function save(){ if(!loaded)return; clearTimeout(saveT); saveT=setTimeout(cloudPush,600); }
function cloudPush(){ try{ if(window.DPCloud&&window.DPCloud.currentUser&&window.DPCloud.currentUser()){ myTs=Date.now(); window.DPCloud.saveState('3dstock',S,myTs).catch(function(e){console.warn('[3DStock] guardado falló:',e&&(e.message||e));}); } }catch(e){} }

/* ===== datos ===== */
function fetchData(){ var v=Date.now();
  return Promise.all([
    fetch('../../data/sunlu/latest.json?v='+v).then(function(r){return r.ok?r.json():null;}).catch(function(){return null;}),
    fetch('../../data/sunlu/changes.json?v='+v).then(function(r){return r.ok?r.json():null;}).catch(function(){return null;})
  ]).then(function(res){ DATA=res[0]; CH=Array.isArray(res[1])?res[1]:[]; updChip(); });
}
function hasData(){ return DATA && Array.isArray(DATA.products) && DATA.products.length>0; }
function allVariants(){ var out=[]; if(!hasData())return out;
  DATA.products.forEach(function(p){ (p.variants||[]).forEach(function(v){ out.push({pid:p.id,handle:p.handle,ptitle:p.title,img:p.img,vid:String(v.id),sku:v.sku,vt:v.vt,price:v.price,cap:v.cap,av:v.av}); }); });
  return out;
}
function fmtD(ts){ try{ var d=new Date(ts); return d.toLocaleString('es-ES',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'}); }catch(e){ return ''; } }
function updChip(){ var el=document.getElementById('updChip'); if(!el)return; el.textContent = (DATA&&DATA.fetched_at)?((LIVE?'En vivo: ':'Actualizado: ')+fmtD(DATA.fetched_at)):''; }
function unseenWatched(){ return CH.filter(function(c){ return S.watch[String(c.vid)] && c.ts>S.lastSeen; }); }
function aviBadge(){ var el=document.getElementById('aviBadge'); if(!el)return; var n=unseenWatched().length; el.innerHTML=n?'<span class="badge">'+(n>99?'99+':n)+'</span>':''; }

/* ===== acciones ===== */
function go(v){ view=v; document.querySelectorAll('#nav a').forEach(function(a){a.classList.toggle('on',a.getAttribute('data-v')===v);}); if(window.innerWidth<=760)document.body.classList.add('side-off'); render(); }
function toggleWatch(vid){ vid=String(vid); if(S.watch[vid])delete S.watch[vid]; else S.watch[vid]=true; save(); render(); }
function markSeen(){ S.lastSeen=Date.now(); save(); render(); }
function setQ(v){ Q=v; renderBody(); } function setLQ(v){ LQ=v; renderBody(); } function setLT(v){ LT=v; renderBody(); } function setAQ(v){ AQ=v; renderBody(); }

/* ===== render ===== */
var TYPES={repuesto:'Repuesto',agotado:'Agotado',precio:'Precio',nuevo:'Nuevo',retirado:'Retirado'};
function starBtn(vid){ var on=!!S.watch[String(vid)]; return '<button class="star'+(on?' on':'')+'" title="'+(on?'Quitar aviso':'Avisarme de cambios')+'" onclick="toggleWatch(\''+vid+'\')">'+(on?'★':'☆')+'</button>'; }
function prodRow(v,withStar){
  var price=v.price?('$'+v.price):''; var capHtml=(v.cap&&v.cap!==v.price&&Number(v.cap)>Number(v.price))?('<s>$'+esc(v.cap)+'</s>'):'';
  return '<div class="row"><span class="dot '+(v.av?'av':'no')+'" title="'+(v.av?'Disponible':'Agotado')+'"></span>'
    +(v.img?'<img class="thumb" src="'+esc(v.img)+'" loading="lazy" alt="">':'')
    +'<div class="rmain"><div class="rname">'+esc(v.vt)+'</div><div class="rsub">'+esc(v.ptitle)+(v.sku?(' · '+esc(v.sku)):'')+'</div></div>'
    +'<span class="rprice">'+capHtml+esc(price)+'</span>'
    +(withStar?starBtn(v.vid):'')
    +'<a class="lnk" href="https://store.sunlu.com/es-es/products/'+esc(v.handle)+'" target="_blank" rel="noopener" title="Ver en la tienda"><svg width="12" height="12" viewBox="0 0 11 11" fill="none"><path d="M2 9L9 2M9 2H4.5M9 2V6.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg></a></div>';
}
function chRow(c,unseen){
  var det='';
  if(c.type==='precio')det='de $'+esc(c.from)+' a $'+esc(c.to);
  else if(c.price)det='$'+esc(c.price);
  return '<div class="row'+(unseen?' unseen':'')+'"><span class="chip c-'+esc(c.type)+'">'+(TYPES[c.type]||esc(c.type))+'</span>'
    +'<div class="rmain"><div class="rname">'+esc(c.variant)+'</div><div class="rsub">'+esc(c.product)+(det?(' · '+det):'')+'</div></div>'
    +'<span class="rdate">'+fmtD(c.ts)+'</span></div>';
}
function noData(){ return '<div class="card"><div class="empty">Aún no hay datos capturados.<br>La GitHub Action se ejecuta al hacer <b>push</b> del repositorio y después cada 6 horas.<br>Tras la primera ejecución verás aquí el catálogo completo.</div></div>'; }
function render(){ if(!loaded)return; aviBadge(); updChip();
  var h='';
  if(view==='cat'){ h='<div class="h1">Catálogo EU</div><div class="h-sub">Filamentos de Sunlu con envío a Europa y su disponibilidad actual. Usa el <b>sondeo</b> para verlos por categorías (disponibles y agotados) y marca ★ para recibir avisos.</div>'; }
  else if(view==='log'){ h='<div class="h1">Registro de cambios</div><div class="h-sub">Absolutamente todos los cambios detectados: reposiciones, agotamientos, precios, altas y retiradas.</div>'; }
  else { h='<div class="h1">Avisos</div><div class="h-sub">Cambios en tus filamentos vigilados y configuración de qué vigilar.</div>'; }
  h+='<div id="vbody"></div>';
  document.getElementById('view').innerHTML=h;
  renderBody();
}
function renderBody(){ var el=document.getElementById('vbody'); if(!el)return;
  if(view==='cat')el.innerHTML=catHTML();
  else if(view==='log')el.innerHTML=logHTML();
  else el.innerHTML=aviHTML();
}
function catHTML(){
  if(!hasData())return '<div class="toolrow">'+liveBtnHTML()+'</div><div class="note" id="liveStatus" style="margin:0 0 10px"></div>'+noData();
  var vs=allVariants();
  var nAv=vs.filter(function(v){return v.av;}).length;
  var q=Q.trim().toLowerCase();
  var list=q?vs.filter(function(v){ return (v.vt+' '+v.ptitle+' '+v.sku).toLowerCase().indexOf(q)>=0; }):vs;
  var h='<div class="kpis"><div class="kpi"><div class="v">'+vs.length+'</div><div class="l">Referencias</div></div>'
    +'<div class="kpi"><div class="v" style="color:#34D399">'+nAv+'</div><div class="l">Disponibles</div></div>'
    +'<div class="kpi"><div class="v" style="color:#FF6B6B">'+(vs.length-nAv)+'</div><div class="l">Agotadas</div></div></div>';
  h+='<div class="toolrow"><input class="inp" placeholder="Buscar filamento, color o SKU…" value="'+esc(Q)+'" oninput="setQ(this.value)">'
    +'<button class="btn'+(SOND?'':' pri')+'" onclick="toggleSondeo()">'+(SOND?'Ver listado simple':'⟲ Sondeo por categorías')+'</button>'+liveBtnHTML()+'</div>'+'<div class="note" id="liveStatus" style="margin:0 0 10px"></div>';
  if(SOND){ h+=sondeoHTML(list); return h; }
  h+='<div class="card">'+(list.length?list.map(function(v){return prodRow(v,true);}).join(''):'<div class="empty">Sin resultados para esa búsqueda.</div>')+'</div>';
  return h;
}
function toggleSondeo(){ if(!SOND){ SOND=true; fetchData().then(function(){ renderBody(); }); } else { SOND=false; renderBody(); } }
var PROXIES=[
  {wrap:true, u:function(u){return 'https://api.allorigins.win/get?url='+encodeURIComponent(u);}},
  {u:function(u){return 'https://api.codetabs.com/v1/proxy?quest='+encodeURIComponent(u);}},
  {u:function(u){return 'https://api.allorigins.win/raw?url='+encodeURIComponent(u);}},
  {u:function(u){return 'https://corsproxy.io/?url='+encodeURIComponent(u);}},
  {u:function(u){return 'https://r.jina.ai/'+u;}}
];
function setStatus(m){ var el=document.getElementById('liveStatus'); if(el)el.textContent=m||''; }
function fetchTO(url,ms){ var ac=(typeof AbortController!=='undefined')?new AbortController():null; var tm=ac?setTimeout(function(){try{ac.abort();}catch(e){}},ms):null;
  return fetch(url,ac?{signal:ac.signal}:{}).then(function(r){ if(tm)clearTimeout(tm); return r; },function(e){ if(tm)clearTimeout(tm); throw e; }); }
function pfetchJSON(url,pi){ pi=pi||0; if(pi>=PROXIES.length)return Promise.reject(new Error('Ningún proxy respondió'));
  var P=PROXIES[pi];
  return fetchTO(P.u(url),20000).then(function(r){ if(!r.ok)throw 0; return r.text(); }).then(function(tx){
    if(P.wrap){ var w=JSON.parse(tx); tx=(w&&w.contents)||''; }
    var j=JSON.parse(tx);
    if(!j||typeof j!=='object'||!j.products)throw 0;
    return j;
  }).catch(function(){ return pfetchJSON(url,pi+1); });
}
function liveFetchAll(page,acc,lim){ page=page||1; acc=acc||[]; lim=lim||60;
  setStatus('Sondeando la tienda… (página '+page+')');
  return pfetchJSON('https://store.sunlu.com/products.json?limit='+lim+'&page='+page).then(function(j){
    var arr=(j&&j.products)||[]; acc=acc.concat(arr);
    if(arr.length<lim||page>=12)return acc;
    return liveFetchAll(page+1,acc,lim);
  });
}
function cleanVt(t){ return String(t||'').replace(/ship to europe\s*\/?\s*/i,'').replace(/^\s*\/\s*/,'').trim()||'Único'; }
function liveSnapshot(products){ var items=[];
  products.forEach(function(p){ if(String(p.product_type||'')!=='3D Printer Filaments')return;
    var opts=p.options||[]; var idx=-1;
    for(var i=0;i<opts.length&&idx<0;i++){ var vals=opts[i].values||[]; for(var j=0;j<vals.length;j++){ if(/europe/i.test(String(vals[j]))){ idx=i; break; } } }
    var vars=p.variants||[]; var evs=(idx<0)?vars:vars.filter(function(v){ return /europe/i.test(String(v['option'+(idx+1)]||'')); });
    if(!evs.length)return;
    items.push({ id:p.id, handle:p.handle, title:p.title, img:(p.images&&p.images[0]&&p.images[0].src)||'',
      variants:evs.map(function(v){ return { id:v.id, sku:v.sku||'', vt:cleanVt(v.title), price:String(v.price||''), cap:String(v.compare_at_price||''), av:!!v.available }; }) });
  });
  items.sort(function(a,b){ return a.id-b.id; });
  return items;
}
function runLiveSondeo(){ if(liveBusy)return;
  liveBusy=true; renderBody(); setStatus('Sondeando la tienda en vivo…');
  liveFetchAll().catch(function(){ setStatus('Proxies lentos: reintentando con páginas más pequeñas…'); return liveFetchAll(1,[],20); })
  .then(function(prods){
    var items=liveSnapshot(prods);
    if(!items.length)throw new Error('Sondeo vacío');
    DATA={ fetched_at:new Date().toISOString(), products:items };
    LIVE=true; SOND=true; liveBusy=false; render();
  }).catch(function(e){
    liveBusy=false; renderBody();
    setStatus('No se pudo sondear en vivo: ninguno de los 5 proxies CORS respondió. Suele ser temporal — reintenta en 30–60 segundos.');
  });
}
var GH_REPO='SILAB3D/WEB';
function ghHeaders(){ return {'Authorization':'Bearer '+S.ghToken,'Accept':'application/vnd.github+json'}; }
function cfgGh(){
  var msg='Token de GitHub (fine-grained) con permiso Actions: write sobre '+GH_REPO+'.\n\nCon él se habilita el botón ⇪ Captura oficial: lanza el workflow de GitHub, que también actualiza el Registro de cambios (el sondeo en vivo no lo necesita).\n\nDeja el campo vacío y acepta para borrarlo.';
  var v=prompt(msg, S.ghToken||''); if(v==null)return; v=v.trim();
  if(v)S.ghToken=v; else delete S.ghToken;
  save(); renderBody();
}
function runDispatch(){ if(liveBusy)return; liveBusy=true; renderBody(); setStatus('Lanzando la captura oficial en GitHub…');
  var prev=(DATA&&DATA.fetched_at)||null;
  fetch('https://api.github.com/repos/'+GH_REPO,{headers:ghHeaders()})
    .then(function(r){ if(!r.ok)throw new Error('Token o repositorio no válidos (HTTP '+r.status+')'); return r.json(); })
    .then(function(repo){ return fetch('https://api.github.com/repos/'+GH_REPO+'/actions/workflows/sunlu-watch.yml/dispatches',{method:'POST',headers:ghHeaders(),body:JSON.stringify({ref:(repo&&repo.default_branch)||'main'})}); })
    .then(function(r){ if(r.status!==204){
        var hint='';
        if(r.status===403)hint=' — el token no tiene permiso: crea uno fine-grained con Resource owner = SILAB3D, acceso al repo WEB y permiso Actions: Read and write (o un token clásico con scopes repo + workflow).';
        else if(r.status===404)hint=' — el workflow sunlu-watch.yml aún no existe en la rama principal del repo: haz push primero.';
        else if(r.status===401)hint=' — token inválido o caducado.';
        throw new Error('No se pudo lanzar el workflow (HTTP '+r.status+')'+hint);
      }
      setStatus('Captura lanzada. Esperando datos nuevos (1–3 min)…'); return waitNew(prev,0); })
    .then(function(okk){ liveBusy=false;
      if(okk){ LIVE=false; SOND=true; render(); setStatus('Datos actualizados con la captura oficial.'); }
      else { renderBody(); setStatus('La captura se lanzó correctamente, pero aún no llegan datos nuevos aquí. Si trabajas en local, haz git pull; en la web espera un par de minutos y recarga.'); } })
    .catch(function(e){ liveBusy=false; renderBody(); setStatus('Error: '+((e&&e.message)||e)); });
}
function waitNew(prev,n){ if(n>=14)return Promise.resolve(false);
  return new Promise(function(res){ setTimeout(res,15000); }).then(function(){ return fetchData(); }).then(function(){
    if(DATA&&DATA.fetched_at&&DATA.fetched_at!==prev)return true;
    setStatus('Esperando datos nuevos… ('+((n+1)*15)+' s)');
    return waitNew(prev,n+1);
  });
}
function liveBtnHTML(){ var h='<button class="btn'+(hasData()?'':' pri')+'" '+(liveBusy?'disabled style="opacity:.6"':'')+' onclick="runLiveSondeo()" title="Consulta la tienda ahora mismo y muestra disponibles y agotados al instante">'+(liveBusy?'Sondeando…':'▶ Sondeo en vivo (ahora)')+'</button>';
  if(S.ghToken)h+='<button class="btn" '+(liveBusy?'disabled style="opacity:.6"':'')+' onclick="runDispatch()" title="Lanza el workflow de GitHub: tarda unos minutos y actualiza también el Registro de cambios">⇪ Captura oficial</button>';
  h+='<button class="btn" style="padding:0 12px" onclick="cfgGh()" title="Configurar token de GitHub para la captura oficial">⚙</button>';
  return h; }
function matCat(t){ t=String(t||'').toLowerCase();
  if(/mystery|blind box|bundle|box –|box -/.test(t))return 'Packs y cajas';
  if(/petg/.test(t))return 'PETG';
  if(/tpu/.test(t))return 'TPU';
  if(/\basa\b/.test(t))return 'ASA';
  if(/\babs\b/.test(t))return 'ABS';
  if(/nylon|polyamide|\bpa6|\bpa12|\bpa\b/.test(t))return 'Nylon / PA';
  if(/polycarbonate|\bpc\b/.test(t))return 'PC';
  if(/polypropylene|\bpp\b/.test(t))return 'PP';
  if(/pva|hips|support/.test(t))return 'Soporte (PVA/HIPS)';
  if(/carbon/.test(t))return 'Fibra de carbono';
  if(/silk/.test(t))return 'PLA Silk';
  if(/matte|mate\b/.test(t))return 'PLA Mate';
  if(/marble|wood|glow|rainbow|galaxy|sparkle|luminous/.test(t))return 'PLA especial';
  if(/high[ -]?speed|meta\b/.test(t))return 'PLA alta velocidad';
  if(/pla\+|pla plus|pla 2\.0/.test(t))return 'PLA+';
  if(/pla/.test(t))return 'PLA';
  return 'Otros';
}
function sondeoHTML(list){

  var names=Object.keys(groups).sort(function(a,b){ var la=last.indexOf(a),lb=last.indexOf(b); if(la>=0||lb>=0)return (la<0?-1:la)-(lb<0?-1:lb)||a.localeCompare(b); return a.localeCompare(b); });
  var h='<div class="h-sub" style="margin:2px 0 6px">'+(LIVE?'<b style="color:var(--ac)">Datos en vivo consultados ahora mismo.</b> El registro de cambios sigue aliment\u00e1ndose de la captura autom\u00e1tica. ':'')+'Sondeo completo: '+list.length+' referencias agrupadas por categoría, separando <b style="color:#34D399">disponibles</b> y <b style="color:#FF6B6B">agotadas</b>. Marca ★ en cualquier fila para vigilarla y recibir sus cambios en <b>Avisos</b>.</div>';

    h+='<div class="cat-h">'+esc(cn)+' <span class="cat-n"><b style="color:#34D399">'+av.length+' disponible'+(av.length===1?'':'s')+'</b> · <b style="color:#FF6B6B">'+no.length+' agotado'+(no.length===1?'':'s')+'</b></span></div>';

    h+='</div>';
  });
  return h;
}
