<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>3DStock — SILAB3D</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@1&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script type="module" src="../../firebase/dpcloud.js"></script>
<style>
:root{ --bg:#0A0B12; --panel:#0E1018; --glass:rgba(255,255,255,.04); --border:rgba(255,255,255,.09); --t1:#E8EBF4; --t2:#8A90A6; --t3:#5C6274; --ac:#22D3EE; --ac2:#0EA5C4; }
[data-theme=light]{ --bg:#F5F6FA; --panel:#FFFFFF; --glass:rgba(0,0,0,.03); --border:rgba(0,0,0,.10); --t1:#1A1C24; --t2:#5A6172; --t3:#AEB4C2; }
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Outfit',system-ui,sans-serif;background:var(--bg);color:var(--t1)}
button{font-family:inherit;cursor:pointer}
input,select{font-family:inherit}
.appbar{position:fixed;top:0;left:0;right:0;height:52px;z-index:9500;display:flex;align-items:center;gap:9px;padding:0 14px;background:rgba(10,11,18,.82);-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);border-bottom:1px solid rgba(255,255,255,.08)}
[data-theme=light] .appbar{background:rgba(255,255,255,.86);border-bottom:1px solid rgba(0,0,0,.08)}
.ab-ic-btn{width:34px;height:34px;border-radius:9px;border:1px solid var(--border);background:transparent;color:var(--t1);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ab-ic-btn:hover{background:var(--glass)}
.ab-app{display:flex;align-items:center;gap:8px;flex-shrink:0}
.ab-appic{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:rgba(34,211,238,.14);border:1px solid rgba(34,211,238,.32)}
.ab-name{font-weight:700;font-size:15px;letter-spacing:-.2px}
.ab-back{display:flex;align-items:center;gap:6px;height:32px;padding:0 12px 0 9px;border-radius:9px;border:1px solid var(--border);background:transparent;color:var(--t1);font:500 12.5px 'Outfit',sans-serif;flex-shrink:0}
.ab-back:hover{background:var(--glass)}
.ab-sp{flex:1}
.ab-upd{font-size:11px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ab-theme{width:34px;height:34px;border-radius:9px;border:1px solid var(--border);background:transparent;color:var(--t1);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ab-theme:hover{background:var(--glass)}
.layout{position:fixed;top:52px;left:0;right:0;bottom:0;display:flex}
.side{width:230px;flex-shrink:0;border-right:1px solid var(--border);background:var(--panel);display:flex;flex-direction:column;padding:14px 12px;overflow-y:auto;transition:margin-left .25s ease}
body.side-off .side{margin-left:-231px}
.nav-h{font-size:10.5px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--t2);margin:6px 4px 8px}
.nav{display:flex;flex-direction:column;gap:3px}
.nav a{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;color:var(--t2);font-size:13.5px;font-weight:500;cursor:pointer;transition:background .15s,color .15s}
.nav a:hover{background:var(--glass);color:var(--t1)}
.nav a.on{background:rgba(34,211,238,.10);color:var(--ac);border:1px solid rgba(34,211,238,.22)}
.nav a svg{flex-shrink:0}
.badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 5px;border-radius:9px;background:#F4B740;color:#3a2400;font-size:10.5px;font-weight:800;margin-left:auto}
.side-note{margin-top:auto;font-size:11px;color:var(--t3);line-height:1.5;padding:12px 4px 0;border-top:1px solid var(--border)}
.main{flex:1;overflow:auto}
.wrap{max-width:1360px;margin:0 auto;padding:26px 30px 64px}
.h1{font-family:'DM Serif Display',serif;font-style:italic;font-size:26px;margin-bottom:4px}
.h-sub{color:var(--t2);font-size:13px;margin-bottom:16px}
.topcard{background:var(--glass);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:14px}
.tc-r{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.tc-r+.tc-r{margin-top:10px}
.tc-meta{font-size:11.5px;color:var(--t2)}
.tc-sp{flex:1}
.seg{display:inline-flex;border:1px solid var(--border);border-radius:10px;overflow:hidden;flex-shrink:0}
.seg button{border:none;background:transparent;height:36px;padding:0 14px;color:var(--t2);font:600 12.5px 'Outfit',sans-serif}
.seg button.on{background:rgba(34,211,238,.13);color:var(--ac)}
.seg button+button{border-left:1px solid var(--border)}
.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:14px}
.kpi{background:var(--glass);border:1px solid var(--border);border-radius:13px;padding:12px 15px;text-align:center}
.kpi .v{font-size:19px;font-weight:800}
.kpi .l{font-size:11px;color:var(--t2)}
.toolrow{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.inp{flex:1;min-width:170px;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:9px 12px;font-size:13.5px;color:var(--t1);outline:none}
.inp:focus{border-color:var(--ac)}
.selx{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:9px 12px;font-size:13px;color:var(--t1);outline:none}
select.selx{color:var(--t1)}option{background:#161922;color:#E8EBF4}
[data-theme=light] option{background:#fff;color:#1A1C24}
.card{background:var(--glass);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.row{display:flex;align-items:center;gap:12px;padding:11px 14px;border-bottom:1px solid var(--border)}
.row:last-child{border-bottom:none}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.dot.av{background:#34D399;box-shadow:0 0 8px rgba(52,211,153,.5)}
.dot.no{background:#FF6B6B}
.thumb{width:38px;height:38px;border-radius:9px;object-fit:cover;background:#fff;flex-shrink:0}
.rmain{flex:1;min-width:0}
.rname{font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rsub{font-size:11.5px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rprice{font-size:13.5px;font-weight:700;flex-shrink:0}
.rprice .ravg{display:block;font-size:10px;color:var(--t3);font-weight:500;text-align:right}
.star{width:32px;height:32px;border-radius:9px;border:1px solid var(--border);background:transparent;color:var(--t3);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px}
.star:hover{border-color:#F4B740;color:#F4B740}
.star.on{background:rgba(244,183,64,.14);border-color:rgba(244,183,64,.4);color:#F4B740}
.lnk{width:32px;height:32px;border-radius:9px;border:1px solid var(--border);color:var(--t3);display:flex;align-items:center;justify-content:center;flex-shrink:0;text-decoration:none}
.lnk:hover{color:var(--ac);border-color:var(--ac)}
.chip{display:inline-flex;align-items:center;font-size:10px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;padding:3px 9px;border-radius:20px;flex-shrink:0}
.c-repuesto{background:rgba(52,211,153,.14);color:#34D399;border:1px solid rgba(52,211,153,.35)}
.c-agotado{background:rgba(255,107,107,.12);color:#FF6B6B;border:1px solid rgba(255,107,107,.35)}
.c-precio{background:rgba(244,183,64,.12);color:#F4B740;border:1px solid rgba(244,183,64,.35)}
.c-nuevo{background:rgba(77,159,255,.12);color:#4D9FFF;border:1px solid rgba(77,159,255,.35)}
.c-retirado{background:rgba(255,255,255,.07);color:var(--t2);border:1px solid var(--border)}
.rdate{font-size:11px;color:var(--t3);flex-shrink:0;white-space:nowrap}
.row.unseen{background:rgba(34,211,238,.05);box-shadow:inset 3px 0 0 var(--ac)}
.empty{text-align:center;color:var(--t2);font-size:13.5px;padding:34px 14px;line-height:1.6}
.btn{height:36px;padding:0 16px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--t1);font:600 12.5px 'Outfit',sans-serif}
.btn:hover{background:var(--glass)}
.btn.pri{border:none;background:linear-gradient(120deg,var(--ac),var(--ac2));color:#06272e}
.sec-h{font-size:14px;font-weight:700;margin:22px 0 10px}
.note{font-size:12px;color:var(--t3);line-height:1.55;margin-top:8px}
.cat-h{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;font-size:15px;font-weight:800;margin:18px 2px 8px}
.cat-h .cat-n{font-size:11.5px;color:var(--t2);font-weight:500}
.cat-toggle{cursor:pointer;user-select:none}
.cat-toggle:hover{color:var(--ac)}
.cat-car{display:inline-block;font-size:11px;color:var(--t3);transition:transform .15s}
.cat-toggle.open .cat-car{transform:rotate(90deg)}
.sub-h{font-size:10.5px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;padding:8px 14px;border-bottom:1px solid var(--border);background:rgba(255,255,255,.02)}
.sub-h.ok{color:#34D399}.sub-h.ko{color:#FF6B6B}
/* monitor */
.mtable{width:100%;border-collapse:collapse;font-size:12.5px;min-width:880px}
.mtable .mdur{font-size:12px;color:var(--t1);white-space:nowrap;text-align:center}
.mtable .mav{text-align:center}
.av-ic{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%}
.av-ok{color:#34D399;background:rgba(52,211,153,.16)}
.av-no{color:#FF6B6B;background:rgba(255,107,107,.16)}
.mtable .mprice .p-lo{color:#34D399}
.mtable .mprice .p-hi{color:#FF6B6B}
.mtable .mprice .p-eq{color:var(--t1)}
.mbtn{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:9px;flex-shrink:0;text-decoration:none;transition:background .15s,transform .1s}
.mbtn:active{transform:scale(.92)}
.mbtn-shop{color:#B87CFF;background:rgba(184,124,255,.16)}
.mbtn-shop:hover{background:rgba(184,124,255,.28)}
.mbtn-sunlu{color:#4D9FFF;background:rgba(77,159,255,.16)}
.mbtn-sunlu:hover{background:rgba(77,159,255,.28)}
.mtable .mgrp{white-space:nowrap}
.mg-main{display:block;font-size:12.5px;color:var(--t1)}
.mg-sub{display:block;font-size:10.5px;color:var(--t3);margin-top:1px}
.mtable th{font-size:10px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--t2);text-align:left;padding:12px 15px;border-bottom:1px solid var(--border);background:rgba(255,255,255,.02)}
.mtable td{padding:13px 15px;border-bottom:1px solid var(--border);vertical-align:middle}
.mtable th:first-child,.mtable td:first-child{padding-left:20px}
.mtable th:last-child,.mtable td:last-child{padding-right:20px}
.mtable tr:last-child td{border-bottom:none}
.mtable .mprod{max-width:280px}
.mtable .mdate{font-size:11.5px;color:var(--t2);white-space:nowrap}
.mtable .mprice{font-weight:700;white-space:nowrap;text-align:right}
.mtable .mprice .ravg{display:block;font-size:10px;color:var(--t3);font-weight:500}
.mtable .macts{display:flex;align-items:center;gap:6px;justify-content:flex-end}
.buy{display:inline-flex;align-items:center;height:30px;padding:0 13px;border-radius:9px;border:none;background:linear-gradient(120deg,var(--ac),var(--ac2));color:#06272e;font:700 11.5px 'Outfit',sans-serif;text-decoration:none;flex-shrink:0}
.buy:hover{filter:brightness(1.08)}
.diagbox{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:12px;font-size:11.5px;line-height:1.6;white-space:pre-wrap;word-break:break-word;max-height:260px;overflow:auto;margin-top:10px;color:var(--t2);font-family:ui-monospace,Consolas,monospace}
@media(max-width:760px){
  .side{position:fixed;top:52px;bottom:0;left:0;z-index:60;width:78vw;max-width:280px;margin-left:0;transform:translateX(0);transition:transform .25s ease;box-shadow:8px 0 30px rgba(0,0,0,.4)}
  body.side-off .side{transform:translateX(-101%);margin-left:0}
  .wrap{padding:18px 16px 50px}
  .ab-name{display:none}.ab-bktx{display:none}.ab-back{padding:0 9px}.ab-upd{display:none}
  .row{flex-wrap:wrap}.rmain{flex:1 1 55%}
  .seg button{padding:0 11px}
}
</style>
</head>
<body>
<div class="appbar">
  <button class="ab-ic-btn" onclick="document.body.classList.toggle('side-off')" title="Mostrar u ocultar el menú"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg></button>
  <span class="ab-app"><span class="ab-appic"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#22D3EE" stroke-width="1.7"><circle cx="12" cy="12" r="8.6"/><circle cx="12" cy="12" r="3.1"/><path d="M20.6 12c0 4.6-8.6 4.6-8.6 0" stroke-linecap="round"/></svg></span><span class="ab-name">3DStock</span></span>
  <button class="ab-back" onclick="dpHome()" title="Volver a 3DProject"><svg width="12" height="12" viewBox="0 0 13 13" fill="none"><path d="M8 2.5L3.5 6.5L8 10.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg> <span class="ab-bktx">3DProject</span></button>
  <span class="ab-sp"></span>
  <span class="ab-upd" id="updChip"></span>
  <button class="ab-theme" onclick="window.DPHelp&&DPHelp.open()" title="Cómo usar esta app" aria-label="Ayuda" style="width:34px;height:34px;padding:0;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9.3"/><path d="M9.3 9.2a2.8 2.8 0 0 1 5.4 1c0 1.9-2.7 2.2-2.7 4"/><circle cx="12" cy="17.3" r=".6" fill="currentColor"/></svg></button>
  <button class="ab-theme" id="dpThemeBtn" onclick="dpToggleTheme()" title="Cambiar tema" aria-label="Tema"></button>
</div>
<div class="layout">
  <aside class="side" id="side">
    <div class="nav-h">Navegación</div>
    <nav class="nav" id="nav">
      <a data-v="cat" onclick="go('cat')"><svg width="17" height="17" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="7.8"/><circle cx="11" cy="11" r="2.8"/><path d="M18.8 11c0 4.2-7.8 4.2-7.8 0" stroke-linecap="round"/></svg> Catálogo EU</a>
      <a data-v="mon" onclick="go('mon')"><svg width="17" height="17" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="4" width="16" height="14" rx="2"/><path d="M3 9h16M8.5 9v9M14 9v9"/></svg> Mi panel cromático</a>
      <a data-v="log" onclick="go('log')"><svg width="17" height="17" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5h14M4 11h14M4 17h9"/><circle cx="18.2" cy="17" r="1.2" fill="currentColor" stroke="none"/></svg> Registro</a>
      <a data-v="avi" onclick="go('avi')"><svg width="17" height="17" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 3a5.5 5.5 0 0 0-5.5 5.5c0 4.2-1.6 5.5-1.6 5.5h14.2s-1.6-1.3-1.6-5.5A5.5 5.5 0 0 0 11 3z"/><path d="M9.3 17.5a1.9 1.9 0 0 0 3.4 0"/></svg> Avisos <span id="aviBadge"></span></a>
    </nav>
    <div class="side-note">Datos de <b>store.sunlu.com</b> (filamentos con envío a Europa). Captura automática cada 6 h; el registro conserva los últimos <b>6 meses</b>.</div>
  </aside>
  <main class="main"><div class="wrap" id="view"></div></main>
</div>
<script>
/* ===== tema + shell ===== */
function tic(t){return t==='dark'
 ?'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4.3"/><path d="M12 2.5v2M12 19.5v2M2.5 12h2M19.5 12h2M5 5l1.4 1.4M17.6 17.6L19 19M19 5l-1.4 1.4M6.4 17.6L5 19"/></svg>'
 :'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>';}
function applyTheme(t){t=(t==='light')?'light':'dark';document.documentElement.setAttribute('data-theme',t);try{localStorage.setItem('dp3-theme',t);}catch(e){}var b=document.getElementById('dpThemeBtn');if(b)b.innerHTML=tic(t);if(window.self!==window.top){try{window.parent.postMessage({__dp3:true,type:'theme',theme:t},'*');}catch(e){}}}
window.dpToggleTheme=function(){applyTheme((document.documentElement.getAttribute('data-theme')||'dark')==='dark'?'light':'dark');};
window.dpHome=function(){if(window.self!==window.top){try{window.parent.postMessage({__dp3:true,type:'home'},'*');}catch(e){}}else{window.location.href='../../index.html';}};
window.addEventListener('message',function(e){var d=e.data;if(d&&d.__dp3&&d.type==='theme'&&d.theme){applyTheme(d.theme);}});
(function(){var p=null;try{p=new URLSearchParams(location.search).get('dptheme');}catch(e){}var s=null;try{s=localStorage.getItem('dp3-theme');}catch(e){}applyTheme(p||s||'dark');})();

/* ===== estado ===== */
var S={watch:{},lastSeen:0};
var view='cat', Q='', LQ='', LT='all', AQ='';
var SOND=true, ONLYAV=false, showDiag=false;
var LIVE=false, liveBusy=false;
var DATA=null, CH=[];
var loaded=false, saveT=null, myTs=0;
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function eurF(p){ var n=Number(String(p==null?'':p).replace(',','.')); if(isNaN(n))return ''; return n.toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2})+' €'; }
function normTxt(s){ var x=String(s==null?'':s).toLowerCase(); try{ x=x.normalize('NFD').replace(/[\u0300-\u036f]/g,''); }catch(e){} return x; }
function kwMatch(q,txt){ var toks=normTxt(q).split(/\s+/).filter(Boolean); if(!toks.length)return true; var h=normTxt(txt); for(var i=0;i<toks.length;i++){ if(h.indexOf(toks[i])<0)return false; } return true; }
function vHay(v){ return v.vt; }
function jsq(s){ return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
function norm(){ if(!S||typeof S!=='object')S={}; if(!S.watch||typeof S.watch!=='object')S.watch={}; if(typeof S.lastSeen!=='number')S.lastSeen=0; }
function save(){ if(!loaded)return; clearTimeout(saveT); saveT=setTimeout(cloudPush,600); }
function cloudPush(){ try{ if(window.DPCloud&&window.DPCloud.currentUser&&window.DPCloud.currentUser()){ myTs=Date.now(); window.DPCloud.saveState('3dstock',S,myTs).catch(function(e){console.warn('[3DStock] guardado falló:',e&&(e.message||e));}); } }catch(e){} }

/* ===== diagnóstico ===== */
var DIAG=[];
function diag(msg){ var line='['+new Date().toLocaleTimeString('es-ES')+'] '+msg; DIAG.unshift(line); if(DIAG.length>80)DIAG.pop(); try{console.log('[3DStock]',msg);}catch(e){} var el=document.getElementById('diagBox'); if(el)el.textContent=DIAG.join('\n'); }
function toggleDiag(){ showDiag=!showDiag; renderBody(); }
function setStatus(m){ var el=document.getElementById('liveStatus'); if(el)el.textContent=m||''; }

/* ===== datos ===== */
function fetchData(){ var v=Date.now();
  return Promise.all([
    fetch('../../data/sunlu/latest.json?v='+v).then(function(r){return r.ok?r.json():null;}).catch(function(){return null;}),
    fetch('../../data/sunlu/changes.json?v='+v).then(function(r){return r.ok?r.json():null;}).catch(function(){return null;})
  ]).then(function(res){ if(!LIVE)DATA=res[0]; CH=Array.isArray(res[1])?res[1]:[]; updChip();
    try{ console.log('[3DStock] datos automáticos:', (res[0]&&res[0].products?res[0].products.length:0),'productos ·', (res[0]&&res[0].fetched_at)||'sin capturar','·', CH.length,'cambios'); }catch(e){} });
}
function hasData(){ return DATA && Array.isArray(DATA.products) && DATA.products.length>0; }
function allVariants(){ if(!hasData())return []; var out=[],pos={};
  DATA.products.forEach(function(p){ (p.variants||[]).forEach(function(v){
    var row={pid:p.id,handle:p.handle,ptitle:p.title,img:p.img,vid:String(v.id),sku:v.sku,vt:v.vt,price:v.price,cap:v.cap,avg:v.avg,av:v.av};
    var sku=(v.sku==null?'':String(v.sku)).trim().toLowerCase();
    var key=sku?('s:'+sku):('v:'+row.vid);
    if(pos[key]===undefined){ pos[key]=out.length; out.push(row); return; }
    var cur=out[pos[key]];
    var better=(!!S.watch[row.vid]&&!S.watch[cur.vid]) || (!S.watch[cur.vid]&&!cur.av&&row.av);
    if(better)out[pos[key]]=row;
  }); });

function _firstIdx(t,res){ var best=-1,cat=null; for(var i=0;i<res.length;i++){ var m=res[i][1].exec(t); if(m&&(best<0||m.index<best)){ best=m.index; cat=res[i][0]; } } return cat; }
function matCat(txt){ var t=String(txt||'').toLowerCase();
  if(/mystery|blind box|bundle/.test(t))return 'Packs y cajas';
  if(/resin/.test(t))return 'Resinas (no FDM)';
  var cf=/carbon|(\-|\s)cf\b/.test(t);
  if(cf){ if(/petg/.test(t))return 'PETG-CF'; if(/nylon|polyamide|\bpa6|\bpa12|\bpa\b/.test(t))return 'PA-CF'; if(/pla/.test(t))return 'PLA-CF'; return 'Fibra de carbono'; }
  if(/rainbow/.test(t))return 'PLA Rainbow';
  if(/silk/.test(t))return 'PLA Silk';
  if(/matte/.test(t)||/\bmate\b/.test(t))return 'PLA Mate';
  if(/high[\s-]?speed/.test(t))return 'PLA Alta velocidad';
  if(/\bmeta\b/.test(t))return 'PLA Meta';
  if(/luminous|glow/.test(t))return 'PLA Luminoso';
  if(/wood/.test(t))return 'PLA Madera';
  if(/marble/.test(t))return 'PLA Mármol';
  if(/galaxy|sparkle|glitter/.test(t))return 'PLA Especial';
  var base=_firstIdx(t,[
    ['PLA+',/pla\s*\+|pla\s*plus|pla\s*2\.0/],
    ['PLA',/\bpla\b/],
    ['PETG',/petg/],
    ['TPU',/tpu/],
    ['ASA',/\basa\b/],
    ['ABS',/\babs\b/],
    ['Soporte (PVA/HIPS)',/pva|hips|\bsupport\b/],
    ['Nylon / PA',/nylon|polyamide|\bpa6\b|\bpa12\b|\bpa\b/],
    ['PC',/polycarbonate|\bpc\b/],
    ['PP',/polypropylene|\bpp\b/]
  ]);
  return base||'Otros';
}

function trySource(src,url,ms){ var t0=Date.now();
  return fetchTO(src.u(url),ms).then(function(r){ if(!r.ok)throw {e:'HTTP '+r.status}; return r.text(); })
    .then(function(tx){ var j=src.p(tx); if(!j||typeof j!=='object'||!j.products)throw {e:'respuesta sin products'}; diag('OK '+src.n+' — '+j.products.length+' productos ('+(Date.now()-t0)+' ms)'); return {src:src,json:j}; })
    .catch(function(err){ var e=(err&&err.e)||((err&&err.name==='AbortError')?('timeout '+ms+' ms'):((err&&err.message)||'error/CORS')); diag('FALLO '+src.n+' — '+e); throw err; });
}
function raceSources(url,ms){ return new Promise(function(res,rej){ var pend=SOURCES.length, won=false;
  SOURCES.forEach(function(src){ trySource(src,url,ms).then(function(r){ if(!won){won=true;res(r);} },function(){ pend--; if(pend===0&&!won)rej(new Error('ninguna fuente respondió')); }); });
}); }
function liveFetchAll(){ DIAG=[]; diag('Iniciando sondeo en vivo…'); setStatus('Probando '+SOURCES.length+' fuentes en paralelo…');
  return raceSources('https://store.sunlu.com/products.json?limit=250&page=1',9000).then(function(win){
    var src=win.src, all=(win.json.products||[]).slice(); diag('Fuente elegida: '+src.n);
    function next(page){ setStatus('Descargando catálogo… (página '+page+', vía '+src.n+')');
      return trySource(src,'https://store.sunlu.com/products.json?limit=250&page='+page,12000).then(function(r){
        var arr=r.json.products||[]; all=all.concat(arr);
        if(arr.length<250||page>=12){ diag('Fin: '+all.length+' productos'); return all; }
        return next(page+1);
      },function(){ diag('Fin anticipado en página '+page+' ('+all.length+' productos)'); return all; });
    }
    if((win.json.products||[]).length<250){ diag('Fin: '+all.length+' productos (1 página)'); return all; }
    return next(2);
  });
}
function cleanVt(t){ return String(t||'').replace(/ship to europe\s*\/?\s*/i,'').replace(/^\s*\/\s*/,'').trim()||'Único'; }
function isFilament(p){ var ty=String(p.product_type||'').toLowerCase(); var tg=(p.tags||[]).map(String).join(' | ').toLowerCase();
  if(!(/filament/.test(ty)||tg.indexOf('3d printer filament')>=0))return false;
  var ti=String(p.title||'').toLowerCase();
  if(/\b(australia|usa|us|canada|au|ca)\s*only\b/.test(ti)&&!/europe/.test(ti))return false;
  return true; }
function liveSnapshot(products){ var items=[];
  products.forEach(function(p){ if(!isFilament(p))return;
    var opts=p.options||[]; var idx=-1;
    for(var i=0;i<opts.length&&idx<0;i++){ var vals=(opts[i].values||[]).map(String); if(/ship/i.test(String(opts[i].name||''))||vals.some(function(v){return /ship to/i.test(v);}))idx=i; }
    if(idx<0){ for(var k=0;k<opts.length&&idx<0;k++){ if((opts[k].values||[]).some(function(v){return /europe/i.test(String(v));}))idx=k; } }
    var vars=p.variants||[]; var evs=(idx<0)?vars:vars.filter(function(v){ return /europe/i.test(String(v['option'+(idx+1)]||'')); });
    if(!evs.length)return;
    items.push({ id:p.id, handle:p.handle, title:p.title, img:(p.images&&p.images[0]&&p.images[0].src)||'',
      variants:evs.map(function(v){ return { id:v.id, sku:v.sku||'', vt:cleanVt(v.title), price:String(v.price||''), cap:String(v.compare_at_price||''), av:!!v.available }; }) });
  });
  items.sort(function(a,b){ return a.id-b.id; });
  return items;
}
function runUpdate(){ if(liveBusy)return;
  liveBusy=true; showDiag=true; renderBody();
  if(S.ghToken)fireOfficial();
  liveFetchAll().then(function(prods){
    diag('Filtrando filamentos con envío a Europa…');
    var items=liveSnapshot(prods);
    diag('Resultado: '+items.length+' referencias EU tras filtrar.');
    if(!items.length)throw {e:'0 referencias tras filtrar'};
    DATA={ fetched_at:new Date().toISOString(), products:items };
    LIVE=true; liveBusy=false; render();
    setStatus('Actualizado en vivo: '+items.length+' referencias.'+(S.ghToken?' La captura oficial sigue en segundo plano.':''));
  }).catch(function(e){
    liveBusy=false; renderBody();
    var m=(e&&e.e)||(e&&e.message)||'error';
    diag('SONDEO FALLIDO: '+m);
    setStatus('No se pudo actualizar en vivo ('+m+'). Suele ser temporal: reintenta en 30–60 s. La captura automática cada 6 h no depende de esto.');
  });
}
/* ===== captura oficial (GitHub, opcional, en segundo plano) ===== */
var GH_REPO='SILAB3D/WEB';
function ghHeaders(){ return {'Authorization':'Bearer '+S.ghToken,'Accept':'application/vnd.github+json'}; }
function cfgGh(){
  var msg='Token de GitHub (fine-grained, Resource owner: SILAB3D, permiso Actions: Read and write sobre '+GH_REPO+').\n\nSi lo configuras, al pulsar «Actualizar ahora» se lanza además la captura oficial (workflow) en segundo plano, que alimenta el Registro de cambios.\n\nDeja el campo vacío y acepta para borrarlo.';
  var v=prompt(msg, S.ghToken||''); if(v==null)return; v=v.trim();
  if(v)S.ghToken=v; else delete S.ghToken;
  save(); renderBody();
}
function fireOfficial(){
  diag('Lanzando captura oficial en GitHub (segundo plano)…');
  fetch('https://api.github.com/repos/'+GH_REPO,{headers:ghHeaders()})
    .then(function(r){ if(!r.ok)throw new Error('token/repo HTTP '+r.status); return r.json(); })
    .then(function(repo){ return fetch('https://api.github.com/repos/'+GH_REPO+'/actions/workflows/sunlu-watch.yml/dispatches',{method:'POST',headers:ghHeaders(),body:JSON.stringify({ref:(repo&&repo.default_branch)||'main'})}); })
    .then(function(r){ if(r.status===204)diag('Captura oficial lanzada: el Registro se actualizará en la web en unos minutos (en local: git pull).');
      else if(r.status===403)diag('Captura oficial: 403 — el token no tiene permiso Actions:write (o Resource owner incorrecto).');
      else if(r.status===404)diag('Captura oficial: 404 — el workflow aún no está en la rama principal (haz push).');
      else diag('Captura oficial: HTTP '+r.status); })
    .catch(function(e){ diag('Captura oficial: '+((e&&e.message)||e)); });
}

/* ===== nube ===== */
(function(){
  function _msg(hh,pp){ if(loaded)return; var el=document.getElementById('view'); if(el)el.innerHTML='<div class="empty" style="padding:60px 20px"><div style="font-size:40px">☁️</div><h3 style="margin:12px 0 6px;color:var(--t1)">'+hh+'</h3><p>'+pp+'</p></div>'; }
  _msg('Cargando tus datos…','Conectando con tu cuenta de Firebase.');
  var _sub=false,_first=true;
  function applyRemote(d){
    if(_first){ _first=false;
      if(d&&d.data&&typeof d.data==='object')S=d.data;
      norm(); loaded=true;
      fetchData().then(function(){ go(view); });
      setInterval(function(){ fetchData().then(function(){ if(loaded&&!liveBusy)refreshLists(); }); }, 600000);
      return;
    }
    if(!d||!d.data||typeof d.data!=='object')return;
    if((d.updated||0)<=myTs)return;
    S=d.data; norm(); refreshLists();
  }
  function startCloud(){
    try{ window.DPCloud.onAuth(function(_u){ if(!_u||_sub)return; _sub=true;
      if(window.DPCloud.watchState){ window.DPCloud.watchState('3dstock', applyRemote); }
      else { window.DPCloud.loadState('3dstock').then(function(data){ applyRemote(data?{data:data,updated:Date.now()}:null); }).catch(function(){ applyRemote(null); }); }
    }); }catch(e){}
    setTimeout(function(){ if(!loaded)_msg('Inicia sesión para ver tus datos','Vuelve al inicio de la suite e inicia sesión. Si ya lo hiciste, recarga con Ctrl+Shift+R.'); },8000);
  }
  var w=0;(function c(){ if(window.DPCloud&&window.DPCloud.onAuth){ startCloud(); } else if(w<10000){ w+=150; setTimeout(c,150); } else { _msg('No se pudo conectar con Firebase','Recarga la página (Ctrl+Shift+R).'); } })();
})();

<script>
/* Ayuda contextual de la app (icono ? en el banner superior) */
(function(){
  if(window.DPHelp) return;
  var C={"title": "3DStock", "accent": "#22D3EE", "tagline": "Vigilancia de stock de filamentos Sunlu", "sections": [{"h": "Qué es", "p": "Vigila el stock de filamentos Sunlu con envío a Europa: registro de reposiciones, agotamientos y precios, capturado cada 6 horas, con avisos por filamento."}, {"h": "Pestañas", "defs": [["Catálogo", "Todos los filamentos por categorías plegables."], ["Registro", "Historial de cambios (nuevo, repuesto, agotado, precio)."], ["Mi panel cromático", "Los que vigilas, con tiempos medios de disponibilidad y ausencia."], ["Avisos", "Novedades de tus filamentos vigilados."]]}, {"h": "Primeros pasos", "steps": ["En el Catálogo, marca con ★ los filamentos a vigilar.", "Revisa «Mi panel cromático» para disponibilidad y tiempos.", "Consulta «Avisos» para las novedades.", "Pulsa «Comprar» para abrir el producto en shop.app."]}, {"h": "Funciones clave", "defs": [["Buscador", "Filtra por palabras del título (texto en amarillo)."], ["Precio promedio", "Media histórica frente al precio actual."], ["Sondeo en vivo", "Consulta el estado ahora mismo."]]}, {"h": "Nota", "p": "Los datos se capturan cada 6 horas mediante una tarea automática."}]};
  var CSS=".dph-veil{position:fixed;inset:0;z-index:99998;display:none;align-items:center;justify-content:center;padding:20px;background:rgba(6,8,15,.66);-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px)}.dph-veil.open{display:flex}.dph-modal{width:min(660px,96vw);max-height:88vh;overflow:auto;background:#12141d;color:#e7eaf2;border:1px solid rgba(255,255,255,.1);border-radius:16px;box-shadow:0 30px 90px rgba(0,0,0,.6);font-family:'Outfit',system-ui,-apple-system,sans-serif;font-size:14px;line-height:1.55}[data-theme=light] .dph-modal{background:#fff;color:#1b1e27;border-color:rgba(0,0,0,.1)}.dph-hd{position:sticky;top:0;display:flex;align-items:center;gap:11px;padding:15px 18px;background:inherit;border-bottom:1px solid rgba(255,255,255,.09);border-radius:16px 16px 0 0}[data-theme=light] .dph-hd{border-color:rgba(0,0,0,.09)}.dph-ic{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff}.dph-ti{font-weight:700;font-size:16px}.dph-tg{font-size:12px;opacity:.7}.dph-x{margin-left:auto;border:none;background:transparent;color:inherit;opacity:.55;font-size:22px;cursor:pointer;line-height:1;padding:0 4px}.dph-x:hover{opacity:1}.dph-bd{padding:4px 18px 20px}.dph-sec{margin-top:15px}.dph-h{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;opacity:.6;margin-bottom:5px}.dph-p{margin:0 0 3px}.dph-bd ul,.dph-bd ol{margin:4px 0 0;padding-left:20px}.dph-bd li{margin:3px 0}.dph-def{display:flex;gap:10px;margin:5px 0}.dph-def b{flex-shrink:0;min-width:130px}";
  var HDIC="<svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"9.3\"/><path d=\"M9.3 9.2a2.8 2.8 0 0 1 5.4 1c0 1.9-2.7 2.2-2.7 4\"/><circle cx=\"12\" cy=\"17.3\" r=\".6\" fill=\"currentColor\"/></svg>";
  function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function render(){
    var h='<div class="dph-modal" role="dialog" aria-modal="true" aria-label="Ayuda">';

    (C.sections||[]).forEach(function(s){
      h+='<div class="dph-sec"><div class="dph-h">'+esc(s.h)+'</div>';

      if(s.list){ h+='<ul>'; s.list.forEach(function(x){ h+='<li>'+esc(x)+'</li>'; }); h+='</ul>'; }
      if(s.defs){ s.defs.forEach(function(d){ h+='<div class="dph-def"><b>'+esc(d[0])+'</b><span>'+esc(d[1])+'</span></div>'; }); }
      h+='</div>';
    });
    h+='</div></div>';
    return h;
  }
  var veil=null;
  function ensure(){ if(veil) return;
    var st=document.createElement('style'); st.textContent=CSS; document.head.appendChild(st);
    veil=document.createElement('div'); veil.className='dph-veil';
    veil.addEventListener('click',function(e){ if(e.target===veil) close(); });
    document.body.appendChild(veil);
    document.addEventListener('keydown',function(e){ if(e.key==='Escape') close(); });
  }
  function open(){ ensure(); veil.innerHTML=render(); var x=veil.querySelector('.dph-x'); if(x)x.addEventListener('click',close); veil.classList.add('open'); }

  window.DPHelp={ open:open, close:close };
})();
